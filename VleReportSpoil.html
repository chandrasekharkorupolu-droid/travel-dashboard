<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>body { background-color: #f8fafc; padding: 20px; font-family: 'Segoe UI', Tahoma, sans-serif; }</style>
</head>
<body>
  <div class="card shadow-sm border-0 border-top border-4 border-danger">
    <div class="card-body p-4">
      <h5 class="fw-bold text-danger mb-4">⚠️ Report Spoiled / Damaged Stamp</h5>
      
      <div class="mb-3">
        <label class="form-label fw-bold text-secondary">Spoiled Serial Number</label>
        <input type="text" id="spoilSerial" class="form-control form-control-lg" placeholder="Ex: AP-A0001">
      </div>
      
      <div class="mb-4">
        <label class="form-label fw-bold text-secondary">Reason for Damage</label>
        <input type="text" id="spoilReason" class="form-control form-control-lg" placeholder="Ex: Printer jam, torn during print...">
      </div>
      
      <button id="btnReportSpoil" class="btn btn-danger w-100 fw-bold py-2 fs-5" onclick="submitSpoil()">Submit Damage Report</button>
    </div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby4S9U-tUh14QeZDI17UsOIOoEi5DMgORTWYllh1knGoeZQS_IJoavZWZ6RDWsD5uls/exec";
    let loggedInId = localStorage.getItem("userId") || "";
    let loggedInUser = localStorage.getItem("userName") || "";

    function submitSpoil() {
        var serial = document.getElementById('spoilSerial').value; 
        var reason = document.getElementById('spoilReason').value;
        if(!serial || !reason) { alert("దయచేసి సీరియల్ నెంబర్ మరియు కారణం ఎంటర్ చేయండి!"); return; }
        
        var btn = document.getElementById('btnReportSpoil'); 
        btn.innerText = "⏳ Submitting..."; btn.disabled = true;
        
        fetch(SCRIPT_URL, { 
            method: "POST", 
            body: JSON.stringify({ action: 'vleReportSpoil', vleId: loggedInId, vleName: loggedInUser, spoilSerial: serial, spoilReason: reason }) 
        })
        .then(res => res.json()).then(res => { 
            btn.innerText = "Submit Damage Report"; btn.disabled = false; 
            if(res.success) { alert("✅ " + res.message); document.getElementById('spoilSerial').value = ''; document.getElementById('spoilReason').value = ''; } 
            else alert("❌ Error: " + res.message); 
        }).catch(err => { btn.innerText = "Submit Damage Report"; btn.disabled = false; alert("Network Error!"); });
    }
  </script>
</body>
</html>
