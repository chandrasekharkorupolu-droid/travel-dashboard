<!DOCTYPE html>
<html lang="en">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Report Spoiled Stamp</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  
  <style>
    /* 🌟 Master Clean Background 🌟 */
    body { 
        background: #f4f7fe; 
        font-family: 'Inter', 'Segoe UI', Tahoma, sans-serif; 
        padding: 40px 20px; 
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: flex-start;
    }

    /* 🌟 Premium Solid Card (Red Theme for Damage) 🌟 */
    .premium-card {
        background: #ffffff;
        border: none;
        border-radius: 24px;
        box-shadow: 0 15px 35px rgba(112, 144, 176, 0.12), 0 5px 15px rgba(112, 144, 176, 0.05);
        width: 100%;
        max-width: 550px;
        position: relative;
        animation: slideUp 0.4s ease-out;
        border-top: 6px solid #ef4444; /* Red Border */
    }

    @keyframes slideUp { 
        from { transform: translateY(20px); opacity: 0; } 
        to { transform: translateY(0); opacity: 1; } 
    }

    /* 🌟 Header Section 🌟 */
    .card-header-custom {
        padding: 25px 30px 15px 30px;
        border-bottom: 2px solid #f8fafc;
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .title-icon {
        background: #fef2f2;
        padding: 10px;
        border-radius: 12px;
        font-size: 20px;
        color: #ef4444;
    }

    .card-title {
        color: #0f172a;
        font-weight: 900;
        font-size: 20px;
        margin: 0;
        letter-spacing: -0.5px;
    }

    /* 🌟 Form Body & Inputs 🌟 */
    .card-body-custom { padding: 30px; }

    .form-group { margin-bottom: 25px; }
    
    .form-label-custom {
        display: block;
        font-size: 13px;
        font-weight: 800;
        color: #475569;
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .form-control-custom {
        width: 100%;
        background: #f8fafc;
        border: 2px solid #e2e8f0;
        border-radius: 12px;
        font-size: 15px;
        font-weight: 700;
        color: #1e293b;
        padding: 14px 16px;
        transition: all 0.3s ease;
        outline: none;
    }

    .form-control-custom:focus {
        background: #ffffff;
        border-color: #ef4444;
        box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.15); /* Red Glow */
        transform: translateY(-1px);
    }

    .form-control-custom::placeholder { color: #94a3b8; font-weight: 500; }

    textarea.form-control-custom {
        resize: none;
        min-height: 100px;
    }

    /* 🌟 Submit Button 🌟 */
    .btn-submit {
        width: 100%;
        background: linear-gradient(135deg, #ef4444, #dc2626); /* Red Gradient */
        color: white;
        border: none;
        border-radius: 12px;
        padding: 16px;
        font-size: 15px;
        font-weight: 800;
        letter-spacing: 1px;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 8px 15px rgba(239, 68, 68, 0.25);
        margin-top: 10px;
    }

    .btn-submit:hover {
        background: linear-gradient(135deg, #dc2626, #b91c1c);
        transform: translateY(-2px);
        box-shadow: 0 12px 20px rgba(239, 68, 68, 0.35);
    }

    .btn-submit:active {
        transform: translateY(1px);
        box-shadow: 0 4px 8px rgba(239, 68, 68, 0.25);
    }

    .btn-submit:disabled {
        background: #94a3b8;
        box-shadow: none;
        cursor: not-allowed;
        transform: none;
    }

    /* 🌟 Custom Alert Modal 🌟 */
    .modal-content-innovative {
        background: #ffffff;
        border: none;
        border-radius: 20px;
        box-shadow: 0 25px 50px -12px rgba(0,0,0,0.3);
        text-align: center;
        padding: 30px;
    }
    
    .icon-circle { width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; font-size: 35px; }
    .icon-circle.success { background-color: #ecfdf5; color: #10b981; } 
    .icon-circle.error { background-color: #fef2f2; color: #ef4444; }

    .btn-modal {
        border-radius: 10px; padding: 12px 30px; font-weight: 800; font-size: 15px; transition: all 0.3s ease; border: none; width: 100%;
    }
    .btn-modal.success { background: #10b981; color: white; }
    .btn-modal.error { background: #ef4444; color: white; }

/* 📱 MOBILE RESPONSIVE STYLES (మొబైల్ కోసం ప్రత్యేకమైన సెట్టింగ్స్) 📱 */
    @media (max-width: 768px) {
        body {
            padding: 20px 10px; /* మొబైల్ లో పైన, సైడ్స్ గ్యాప్ తగ్గింపు */
        }
        .premium-card {
            border-radius: 20px; /* కార్డ్ మూలల తగ్గింపు */
        }
        .card-header-custom {
            padding: 20px 20px 15px 20px; /* హెడర్ లోపల గ్యాప్ తగ్గింపు */
        }
        .title-icon {
            font-size: 18px;
            padding: 8px;
        }
        .card-title {
            font-size: 18px; /* మొబైల్ లో టైటిల్ సైజ్ సెట్టింగ్ */
        }
        .card-body-custom {
            padding: 20px; /* ఫామ్ చుట్టూ ఉన్న గ్యాప్ తగ్గింపు */
        }
        .form-control-custom {
            padding: 12px 14px;
            font-size: 14px;
        }
        .btn-submit {
            padding: 14px;
            font-size: 14px;
        }
        
        /* 🌟 అలర్ట్ (Popup) బాక్స్ మొబైల్ సెట్టింగ్స్ 🌟 */
        .modal-content-innovative {
            padding: 25px 20px;
            margin: 10px;
        }
        .icon-circle {
            width: 60px;
            height: 60px;
            font-size: 30px;
            margin-bottom: 15px;
        }
        #alertTitle {
            font-size: 20px !important;
        }
        .alert-message-text {
            font-size: 14px;
            margin-bottom: 20px;
        }
        .btn-modal {
            width: 100%; /* బటన్ మొబైల్ స్క్రీన్ కి తగ్గట్టు ఫుల్ విడ్త్ */
            padding: 12px 20px;
            font-size: 15px;
        }
    }
  </style>

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-GF2VXY76KN"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-GF2VXY76KN');
</script>
</head>
<body>

  <div class="modal fade" id="customAlertModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered modal-sm">
      <div class="modal-content modal-content-innovative">
        <div id="alertIconContainer" class="icon-circle success">✅</div>
        <h4 id="alertTitle" class="fw-bold text-dark mb-2" style="font-size: 22px;">Success!</h4>
        <p id="alertMessage" class="text-secondary mb-4" style="font-size: 14px; font-weight: 600;">Message goes here.</p>
        <button type="button" id="alertBtn" class="btn-modal success" data-bs-dismiss="modal">OK, Got it!</button>
      </div>
    </div>
  </div>

  <div class="premium-card">
    <div class="card-header-custom">
      <div class="title-icon">⚠️</div>
      <h2 class="card-title">Report Spoiled / Damaged Stamp</h2>
    </div>
    
    <div class="card-body-custom">
      <div class="form-group">
        <label class="form-label-custom">Spoiled Serial Number</label>
        <input type="text" id="spoilSerial" class="form-control-custom" placeholder="Ex: AP-A0001" oninput="this.value = this.value.toUpperCase()">
      </div>
      
      <div class="form-group">
        <label class="form-label-custom">Reason for Damage</label>
        <textarea id="spoilReason" class="form-control-custom" placeholder="Ex: Printer jam, torn during print..."></textarea>
      </div>
      
      <button id="btnReportSpoil" class="btn-submit" onclick="submitSpoil()">Submit Damage Report</button>
    </div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby4S9U-tUh14QeZDI17UsOIOoEi5DMgORTWYllh1knGoeZQS_IJoavZWZ6RDWsD5uls/exec";
    let loggedInId = localStorage.getItem("userId") || "";
    let loggedInUser = localStorage.getItem("userName") || "";

    // 🌟 పాతకాలపు alert() బదులు మన కొత్త స్మూత్ అలర్ట్ 🌟
    function customAlert(msg, isSuccess) {
        let safeMsg = msg ? String(msg) : (isSuccess ? "Report Submitted Successfully." : "Action Failed!");
        const iconContainer = document.getElementById("alertIconContainer");
        const title = document.getElementById("alertTitle");
        const message = document.getElementById("alertMessage");
        const btn = document.getElementById("alertBtn");

        if (isSuccess) {
            iconContainer.className = "icon-circle success"; iconContainer.innerHTML = "✅"; 
            title.innerText = "Success!"; 
            btn.className = "btn-modal success"; btn.innerText = "OK, Great!";
        } else {
            iconContainer.className = "icon-circle error"; iconContainer.innerHTML = "❌"; 
            title.innerText = "Validation Failed"; 
            btn.className = "btn-modal error"; btn.innerText = "Try Again";
        }
        
        message.innerHTML = safeMsg.replace(/\n/g, '<br>');
        var alertModal = new bootstrap.Modal(document.getElementById('customAlertModal'));
        alertModal.show();
    }

    function submitSpoil() {
        var serial = document.getElementById('spoilSerial').value.trim(); 
        var reason = document.getElementById('spoilReason').value.trim();
        
        if(!serial) { customAlert("దయచేసి స్పాయిల్ అయిన సీరియల్ నెంబర్ ఎంటర్ చేయండి!", false); return; } 
        if(!reason) { customAlert("దయచేసి డ్యామేజ్ అవ్వడానికి కారణం రాయండి!", false); return; }
        
        var btn = document.getElementById('btnReportSpoil'); 
        btn.innerText = "⏳ Submitting..."; 
        btn.disabled = true;
        
        fetch(SCRIPT_URL, { 
            method: "POST", 
            body: JSON.stringify({ action: 'vleReportSpoil', vleId: loggedInId, vleName: loggedInUser, spoilSerial: serial, spoilReason: reason }) 
        })
        .then(res => res.json())
        .then(res => { 
            btn.innerText = "Submit Damage Report"; 
            btn.disabled = false; 
            if(res.success) { 
                customAlert(res.message, true); 
                document.getElementById('spoilSerial').value = ''; 
                document.getElementById('spoilReason').value = ''; 
            } else { 
                customAlert("Error: " + res.message, false); 
            } 
        })
        .catch(err => { 
            btn.innerText = "Submit Damage Report"; 
            btn.disabled = false; 
            customAlert("Network Error! Please check your connection.", false); 
        });
    }
  </script>
</body>
</html>
