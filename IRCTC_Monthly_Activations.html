<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRCTC Month-wise Activations</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body { 
            background-color: #f1f5f9; 
            margin: 0; 
            padding: 0 0 40px 0; 
            min-height: 100vh; 
            width: max-content;
            min-width: 100vw;
        }

        /* Top Controls */
        .top-controls {
            display: flex; justify-content: space-between; align-items: center; background-color: #ffffff; 
            padding: 12px 20px; border-bottom: 2px solid #e2e8f0; box-shadow: 0 2px 8px rgba(0,0,0,0.05); 
            position: sticky; top: 0; left: 0; z-index: 1000;
            width: 100vw;
            box-sizing: border-box;
        }
        .page-heading { font-size: 18px; color: #ea580c; font-weight: 800; display: flex; align-items: center; gap: 8px; text-transform: uppercase;}
        
        .filter-group { display: flex; gap: 10px; align-items: center; }
        .filter-label { font-size: 13px; font-weight: 800; color: #64748b; margin-right: 5px; }
        .filter-group select { padding: 6px 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 13px; outline: none; background-color: #f8fafc; font-weight: 700; cursor: pointer; color: #334155;}
        
        .btn-action { background-color: #f1f5f9; color: #475569; border: 1px solid #cbd5e1; padding: 6px 12px; border-radius: 6px; font-size: 13px; font-weight: 800; cursor: pointer; transition: 0.2s; box-shadow: 0 2px 0 #e2e8f0; display: flex; align-items: center; gap: 5px;}
        .btn-action:active { transform: translateY(2px); box-shadow: 0 0 0 transparent; }
        .btn-action:hover { background-color: #e2e8f0; color: #1e293b;}

        /* Report Container */
        .report-wrapper { 
            background-color: #ffffff; 
            margin: 15px; border-radius: 8px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.05); 
            border: 1px solid #e2e8f0; 
            padding-bottom: 20px;
        }
        
        .report-header { text-align: center; border-bottom: 2px dashed #cbd5e1; background-color: #ffffff; padding-top: 15px; padding-bottom: 10px;}
        .report-header h2 { color: #1e293b; font-size: 20px; font-weight: 900; margin-bottom: 3px; text-transform: uppercase; letter-spacing: 1px; }
        .report-header p { color: #475569; font-size: 13px; font-weight: 700; }

        .table-container { width: 100%; padding: 0 15px; margin-top: 10px; }
        table { width: max-content; border-collapse: separate; border-spacing: 0; text-align: center; min-width: 100%;}
        
        /* Sticky Headers */
        thead tr:nth-child(1) th { position: sticky; top: 56px; z-index: 100; height: 50px; border-bottom: 1px solid rgba(255,255,255,0.2); }
        thead tr:nth-child(2) th { position: sticky; top: 106px; z-index: 99; height: 40px; border-bottom: 2px solid #cbd5e1;}

        th { font-size: 10.5px; text-transform: uppercase; padding: 4px 6px; font-weight: 800; color: white; border-right: 1px solid rgba(255,255,255,0.2); letter-spacing: 0px; }
        td { padding: 8px 6px; font-size: 13px; color: #333; border-bottom: 1px solid #e2e8f0; font-weight: 700; white-space: nowrap; }
        
        .th-tot, .th-act25, .th-yet, .th-inact, .th-tot-act { white-space: normal !important; min-width: 65px; max-width: 75px; line-height: 1.2; }
        .th-dist { background-color: #0f172a; min-width: 130px; white-space: nowrap; } 
        .th-tot { background-color: #1e293b; }
        .th-act25 { background-color: #334155; }
        .th-tot-act { background-color: #1d4ed8; } 
        .th-yet { background-color: #9f1239; } 
        .th-inact { background-color: #0f172a; }

        .th-sub-part { background-color: #f1f5f9; color: #1e293b; border-right: 1px solid #cbd5e1; font-weight: 800; font-size: 9.5px !important; padding: 3px !important; white-space: normal !important; min-width: 45px;}
        .th-sub-old { background-color: #f8fafc; color: #475569; border-right: 1px solid #cbd5e1; font-weight: 700; font-size: 9.5px !important; padding: 3px !important; white-space: normal !important; min-width: 35px;}
        .th-sub-new { background-color: #ffffff; color: #0f766e; border-right: 1px solid #cbd5e1; font-weight: 700; font-size: 9.5px !important; padding: 3px !important; white-space: normal !important; min-width: 35px;}
        .th-sub-uniq { background-color: #eff6ff; color: #1d4ed8; border-right: 1px solid #cbd5e1; font-weight: 800; font-size: 9.5px !important; padding: 3px !important; white-space: normal !important; min-width: 45px;}

        /* Sticky Left District Column */
        thead tr:nth-child(1) th:first-child { position: sticky; left: 0; z-index: 105; border-right: 1px solid rgba(255,255,255,0.2); background-color: #0f172a; }
        td:first-child { position: sticky; left: 0; background-color: #ffffff; z-index: 10; font-weight: 900; color: #0f172a; border-right: 1px solid #cbd5e1; text-align: left; padding-left: 12px; cursor: pointer; box-shadow: 2px 0 5px rgba(0,0,0,0.05);}
        td:first-child:hover { background-color: #f1f5f9 !important; color: #1d4ed8; }

        tbody tr:nth-child(even) td:first-child { background-color: #f8fafc; }
        tbody tr:hover td { filter: brightness(0.95); }

        /* Sticky Bottom Row */
        tfoot tr.total-row td { background-color: #f1f5f9 !important; font-weight: 900; border-top: 2px solid #1e293b; font-size: 13px; position: sticky; bottom: 0; z-index: 20;}
        tfoot tr.total-row td:first-child { position: sticky; left: 0; z-index: 30; background-color: #e2e8f0 !important; color: #1e293b;}

        /* 📸 ఇమేజ్ డౌన్‌లోడ్ అయ్యేటప్పుడు వాడే క్లాస్ 📸 */
        .capture-mode {
            height: auto !important; 
            overflow: visible !important; 
            padding: 20px !important; 
            background-color: #ffffff !important; 
            border: none !important; 
            box-shadow: none !important;
        }
        .capture-mode .table-container { overflow: visible !important; }
        .capture-mode thead tr:nth-child(1) th, .capture-mode thead tr:nth-child(2) th,
        .capture-mode th:first-child, .capture-mode td:first-child, .capture-mode tfoot tr.total-row td { 
            position: static !important; 
            box-shadow: none !important;
        }

        /* Charts */
        .charts-container { display: flex; gap: 20px; margin-top: 20px; padding: 20px; flex-wrap: wrap; justify-content: center; background-color: #f8fafc; border-top: 1px dashed #cbd5e1; }
        .chart-box { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.02); flex: 1; min-width: 400px; max-width: 600px; display: flex; flex-direction: column;}
        .chart-title { text-align: center; font-size: 14px; font-weight: 800; color: #475569; margin-bottom: 15px; text-transform: uppercase;}
        .canvas-wrapper { position: relative; height: 300px; width: 100%; }

        .loader-row td { text-align: center; padding: 40px !important; font-size: 15px; color: #1e293b; font-weight: 700; }
        .spinner { display: inline-block; width: 22px; height: 22px; border: 3px solid #cbd5e1; border-top-color: #1e293b; border-radius: 50%; animation: spin 1s linear infinite; vertical-align: middle; margin-right: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }


/* ========================================================================= */
        /* 📱 MOBILE RESPONSIVENESS FOR MONTH-WISE ACTIVATIONS (Added by Chandra) 📱 */
        /* ========================================================================= */
        @media (max-width: 768px) {
            
            body { 
                padding: 10px; 
                width: 100vw;
                min-width: 100%;
                overflow-x: hidden; /* అడ్డంగా పేజీ కదలకుండా లాక్ */
            }

            /* 1. టాప్ కంట్రోల్స్ & ఫిల్టర్స్ */
            .top-controls {
                flex-direction: column;
                align-items: stretch;
                padding: 15px;
                position: relative; /* స్టికీ ఎఫెక్ట్ తీసేసాను */
                gap: 12px;
                width: 100%;
            }

            .page-heading {
                justify-content: center;
                font-size: 16px;
                text-align: center;
                margin-bottom: 5px;
            }

            .filter-group {
                flex-direction: column;
                width: 100%;
                align-items: stretch;
                gap: 8px;
            }

            .filter-group select, .btn-action {
                width: 100%;
                justify-content: center;
                text-align: center;
                padding: 8px;
            }

            .filter-label {
                margin-bottom: 2px;
            }

            /* 2. రిపోర్ట్ హెడర్ & టేబుల్ సెట్టింగ్స్ */
            .report-wrapper {
                margin: 10px 0; /* కార్డ్ మార్జిన్ తగ్గింపు */
            }

            .report-header h2 { font-size: 16px; margin-bottom: 5px; line-height: 1.4;}
            .report-header p { font-size: 11px; }

            .table-container {
                padding: 0 10px;
                max-height: 500px;
                overflow-y: auto;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }

            table {
                min-width: 900px; /* మొబైల్ లో కాలమ్స్ కట్ అవ్వకుండా ఉండేలా కనీస వెడల్పు */
            }

            th, td {
                font-size: 9.5px !important;
                padding: 8px 4px !important;
            }

            /* మొబైల్ లో స్క్రోలింగ్ ఇబ్బంది లేకుండా స్టికీ ఎఫెక్ట్ తీసేసాను */
            thead tr:nth-child(1) th:first-child,
            td:first-child, 
            tfoot tr.total-row td:first-child {
                position: static !important;
                border-right: 1px solid #e2e8f0 !important;
                text-align: center !important;
                padding-left: 5px !important;
            }

            /* 3. చార్ట్స్ (గ్రాఫ్స్) సెట్టింగ్స్ */
            .charts-container {
                flex-direction: column; /* పక్కపక్కన కాకుండా కిందకి వస్తాయి */
                padding: 10px;
                gap: 15px;
            }

            .chart-box {
                min-width: 100%; /* ఒక కార్డ్ స్క్రీన్ మొత్తం ఆక్రమిస్తుంది */
                padding: 10px;
            }

            .canvas-wrapper {
                height: 250px; /* గ్రాఫ్ ఎత్తు కొంచెం తగ్గించాను */
            }
        }
    </style>

<body>

    <div class="top-controls">
        <div class="page-heading">📅 Month-wise Activations</div>
        <div class="filter-group">
            <span class="filter-label">Filter:</span>
            <select id="districtType" onchange="updateDistrictsDropdown()">
                <option value="old" selected>Old Districts</option>
                <option value="new">New Districts</option>
            </select>
            <select id="districtName" onchange="renderTable()">
                <option value="All">All Districts</option>
            </select>
            <button class="btn-action" onclick="resetFilters()">↺ Reset</button>
            <button class="btn-action" onclick="refreshData()" style="color: #2563eb; border-color: #bfdbfe; background-color: #eff6ff;">🔄 Refresh Data</button>
            <button class="btn-action" id="downloadBtn" onclick="downloadReportImage()">📸 Download Image</button>
            <button class="btn-action" id="fullscreenBtn" onclick="toggleFullScreen()">⛶ Full Screen</button>
        </div>
    </div>

    <div id="printableReport" class="report-wrapper">
        <div class="report-header">
            <h2>CSC AP – IRCTC Month-wise Activations (FY 26-27)</h2>
            <p id="reportDate">Report Generated on: Loading...</p>
        </div>

        <div class="table-container">
            <table id="dataTable">
                <thead id="tableHead"></thead>
                <tbody id="tableBody">
                    <tr class="loader-row"><td colspan="40"><div class="spinner"></div>Loading Data... Please Wait</td></tr>
                </tbody>
                <tfoot id="tableFooter"></tfoot>
            </table>
        </div>

        <div class="charts-container" id="chartsArea" style="display: none;">
            <div class="chart-box">
                <div class="chart-title">Month-over-Month Participation Trend</div>
                <div class="canvas-wrapper"><canvas id="trendChart"></canvas></div>
            </div>
            <div class="chart-box">
                <div class="chart-title">Old vs New VLE Activations</div>
                <div class="canvas-wrapper"><canvas id="breakdownChart"></canvas></div>
            </div>
        </div>
    </div>

    <script>
        const apiURL = "https://script.google.com/macros/s/AKfycby4S9U-tUh14QeZDI17UsOIOoEi5DMgORTWYllh1knGoeZQS_IJoavZWZ6RDWsD5uls/exec";
        
        let globalActData = [];
        let oldDistrictsSet = new Set();
        let newDistrictsSet = new Set();
        let columnsToShow = []; 
        let trendChartInstance = null;
        let breakdownChartInstance = null;
        
        let dmAssignedOldDistrict = ""; // 🌟 DM Old District

        function setReportDate() {
            const options = { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' };
            document.getElementById('reportDate').innerText = "Report Generated on: " + new Date().toLocaleDateString('en-US', options);
        }

        // 🌟 పేరు మ్యాచ్ చేసే బ్రహ్మాస్త్రం 🌟
        function isNameMatch(sheetName, loginName) {
            if (!sheetName || !loginName) return false;
            let sClean = sheetName.toLowerCase().replace(/\s+/g, ' ').trim();
            let lClean = loginName.toLowerCase().replace(/\s+/g, ' ').trim();
            if (sClean === lClean) return true;
            if (lClean.length > 5 && sClean.includes(lClean)) return true;
            if (sClean.length > 5 && lClean.includes(sClean)) return true;
            return false;
        }

        window.onload = function() {
            setReportDate();
            document.getElementById("districtType").value = "old";
            calculateDynamicColumns();
            buildTableHeader();
            fetchSheetData(); 
        };

        function calculateDynamicColumns() {
            const d = new Date();
            const currYear = d.getFullYear();
            const currMonth = d.getMonth(); 
            let fyMonthIndex = 0;
            if (currYear === 2026 && currMonth >= 3) fyMonthIndex = currMonth - 3; 
            else if (currYear === 2027 && currMonth <= 2) fyMonthIndex = currMonth + 9; 
            else if (currYear > 2027 || (currYear === 2027 && currMonth > 2)) fyMonthIndex = 11; 

            const monthDefs = [
                { label: 'APR 26', idx: 0 }, { label: 'MAY 26', idx: 1 }, { label: 'JUN 26', idx: 2 }, 
                { label: 'JUL 26', idx: 3 }, { label: 'AUG 26', idx: 4 }, { label: 'SEP 26', idx: 5 }, 
                { label: 'OCT 26', idx: 6 }, { label: 'NOV 26', idx: 7 }, { label: 'DEC 26', idx: 8 }, 
                { label: 'JAN 27', idx: 9 }, { label: 'FEB 27', idx: 10 }, { label: 'MAR 27', idx: 11 }
            ];

            columnsToShow = [];
            if (fyMonthIndex < 3) {
                for(let i=0; i<=fyMonthIndex; i++) columnsToShow.push({ type: 'month', label: monthDefs[i].label, indices: [i], color: '#334155' });
            } else if (fyMonthIndex < 6) {
                columnsToShow.push({ type: 'group', label: 'Q1 (APR-JUN)', indices: [0,1,2], color: '#1e293b' }); 
                for(let i=3; i<=fyMonthIndex; i++) columnsToShow.push({ type: 'month', label: monthDefs[i].label, indices: [i], color: '#334155' });
            } else if (fyMonthIndex < 9) {
                columnsToShow.push({ type: 'group', label: 'HALF YEARLY (APR-SEP)', indices: [0,1,2,3,4,5], color: '#1e293b' }); 
                for(let i=6; i<=fyMonthIndex; i++) columnsToShow.push({ type: 'month', label: monthDefs[i].label, indices: [i], color: '#334155' });
            } else {
                columnsToShow.push({ type: 'group', label: '9 MONTHS (APR-DEC)', indices: [0,1,2,3,4,5,6,7,8], color: '#1e293b' }); 
                for(let i=9; i<=fyMonthIndex; i++) columnsToShow.push({ type: 'month', label: monthDefs[i].label, indices: [i], color: '#334155' });
            }
        }

        function buildTableHeader() {
            let theadHtml1 = `<tr><th rowspan="2" class="th-dist" title="Double click to filter">DISTRICT ⇅</th><th rowspan="2" class="th-tot">TOTAL IRCTC IDS</th><th rowspan="2" class="th-act25">ACTIVE<br><small>(FY 25-26)</small></th>`;
            columnsToShow.forEach(col => { theadHtml1 += `<th colspan="3" style="background-color: ${col.color}; border-right: 1px solid rgba(255,255,255,0.2); text-align:center;">${col.label}</th>`; });
            theadHtml1 += `<th colspan="3" class="th-tot-act" style="text-align:center;">TOTAL ACTIVE (FY 26-27)</th><th rowspan="2" class="th-yet">YET TO ACTIVATE<br><small>(FROM FY 25-26)</small></th><th rowspan="2" class="th-inact">TOTAL INACTIVE</th></tr>`;

            let theadHtml2 = `<tr>`;
            columnsToShow.forEach(() => { theadHtml2 += `<th class="th-sub-part">PARTICIPATED</th><th class="th-sub-old">ACT. OLD</th><th class="th-sub-new">ACT. NEW</th>`; });
            theadHtml2 += `<th class="th-sub-uniq">UNIQUE TOTAL</th><th class="th-sub-old">OLD</th><th class="th-sub-new">NEW</th></tr>`;

            document.getElementById("tableHead").innerHTML = theadHtml1 + theadHtml2;
        }

        // 🌟🌟🌟 THE FAST LOADING (CACHE) FIX 🌟🌟🌟
        async function fetchSheetData() {
            document.getElementById("tableBody").innerHTML = "<tr class='loader-row'><td colspan='40'><div class='spinner'></div> Fetching Live Data...</td></tr>";
            
            try {
                let cachedData = localStorage.getItem("cscGlobalData");
                let cachedUsersData = localStorage.getItem("cscUsersData");
                
                let rawData = null;
                let usersData = null;

                if (cachedData && cachedUsersData) {
                    rawData = JSON.parse(cachedData);
                    usersData = JSON.parse(cachedUsersData);
                } else {
                    let [resData, resUsers] = await Promise.all([
                        fetch(apiURL),
                        fetch(apiURL + "?sheet=Users").catch(() => null)
                    ]);
                    
                    rawData = await resData.json();
                    usersData = resUsers ? await resUsers.json() : null;
                    
                    localStorage.setItem("cscGlobalData", JSON.stringify(rawData));
                    if(usersData) localStorage.setItem("cscUsersData", JSON.stringify(usersData));
                }

                let loggedInUserId = (localStorage.getItem("userId") || "").trim();
                let userDesignation = localStorage.getItem("userDesignation") || "State Head";

                if (userDesignation === "District Manager" && loggedInUserId !== "" && usersData && usersData.length > 0) {
                    let uHeaders = usersData[0].map(h => h.toString().toLowerCase().replace(/[^a-z0-9]/g, ''));
                    let idxUid = uHeaders.findIndex(h => h === 'userid' || h === 'user');
                    let idxDist = uHeaders.findIndex(h => h === 'district'); 

                    if (idxUid > -1 && idxDist > -1) {
                        for(let i=1; i<usersData.length; i++) {
                            let sheetUid = (usersData[i][idxUid] || '').toString().trim();
                            if (sheetUid === loggedInUserId) {
                                dmAssignedOldDistrict = (usersData[i][idxDist] || '').toString().trim();
                                break; 
                            }
                        }
                    }
                }

                if(rawData && rawData.length > 0) {
                    processActivationData(rawData);
                } else {
                    throw new Error("Empty Data Found");
                }
            } catch (error) {
                console.error("Error loading data:", error);
                document.getElementById("tableBody").innerHTML = "<tr><td colspan='40' style='color:red; text-align:center; padding: 20px;'>❌ Error connecting to Google Sheet. Please check the internet or API link.</td></tr>";
            }
        }

        function refreshData() {
            localStorage.removeItem("cscGlobalData");
            localStorage.removeItem("cscUsersData");
            dmAssignedOldDistrict = "";
            fetchSheetData();
        }

        function processActivationData(rawData) {
            let cleanHeaders = rawData[0].map(h => h.toString().toLowerCase().replace(/[^a-z0-9]/g, ''));
            let idxcscid = cleanHeaders.findIndex(h => h.includes('cscid'));
            let idxirctc = cleanHeaders.findIndex(h => h.includes('irctcid'));
            let idxolddist = cleanHeaders.findIndex(h => h.includes('olddistrict') || h === 'district');
            let idxnewdist = cleanHeaders.findIndex(h => h.includes('newdistrict'));
            let idxempname = cleanHeaders.findIndex(h => h.includes('employeename') || h.includes('empname'));
            let idx26 = cleanHeaders.findIndex(h => h.includes('202526') || h.includes('2526')); 
            
            let mIndices = []; let idx27 = -1;
            if (idx26 > -1) {
                for (let k = 1; k <= 12; k++) { if (idx26 + k < rawData[0].length) mIndices.push(idx26 + k); }
                if (idx26 + 13 < rawData[0].length) idx27 = idx26 + 13;
            }

            globalActData = []; oldDistrictsSet.clear(); newDistrictsSet.clear();

            for(let i=1; i<rawData.length; i++) {
                let row = rawData[i];
                let cscId = idxcscid > -1 ? row[idxcscid] : '';
                let irctcId = idxirctc > -1 ? row[idxirctc] : ''; 
                if(!cscId || cscId === '-') continue;

                let oldDist = idxolddist > -1 ? (row[idxolddist] || 'Unknown').trim() : 'Unknown';
                let newDist = idxnewdist > -1 ? (row[idxnewdist] || 'Unknown').trim() : 'Unknown';
                let dmNameStr = idxempname > -1 ? (row[idxempname] || '').toString().trim() : '';

                if(oldDist !== 'Unknown') oldDistrictsSet.add(oldDist);
                if(newDist !== 'Unknown') newDistrictsSet.add(newDist);

                let fy26 = idx26 > -1 ? (parseInt(row[idx26]) || 0) : 0;
                let isAct26 = fy26 > 0 ? 1 : 0;
                let monthData = []; let fy27TotalVal = 0; let hasActivatedInFY27 = false; 

                for(let k=0; k<12; k++) {
                    let colIdx = mIndices[k]; let mVal = 0;
                    if(colIdx > -1) {
                        let num = parseInt(row[colIdx]) || 0;
                        if(num > 0) { mVal = 1; fy27TotalVal += num; }
                    }
                    let part = mVal > 0 ? 1 : 0; let mOld = 0; let mNew = 0;
                    if (part > 0 && !hasActivatedInFY27) {
                        if (isAct26) { mOld = 1; } else { mNew = 1; }
                        hasActivatedInFY27 = true;
                    }
                    monthData.push({ part: part, old: mOld, new: mNew });
                }

                let fy27TotalCol = idx27 > -1 ? (parseInt(row[idx27]) || 0) : 0;
                let isAct27Unique = (fy27TotalVal > 0 || fy27TotalCol > 0) ? 1 : 0;

                globalActData.push({
                    hasIrctc: (irctcId && irctcId !== '-') ? 1 : 0, 
                    olddist: oldDist, 
                    newdist: newDist, 
                    dmname: dmNameStr, 
                    isAct26: isAct26, 
                    months: monthData, 
                    totUnique: isAct27Unique,
                    totOld: (isAct27Unique && isAct26) ? 1 : 0, 
                    totNew: (isAct27Unique && !isAct26) ? 1 : 0,
                    yetToAct: (isAct26 && !isAct27Unique) ? 1 : 0, 
                    totInact: (!isAct27Unique) ? 1 : 0
                });
            }
            updateDistrictsDropdown();
        }

        // 🌟🌟🌟 THE ABSOLUTE DISPLAY FILTERING FIX 🌟🌟🌟
        function isRowAllowedForDM(row, distType, loggedInUserName) {
            if (distType === 'old') {
                if (!dmAssignedOldDistrict) return false; 
                return row.olddist.toLowerCase() === dmAssignedOldDistrict.toLowerCase();
            } else {
                return isNameMatch(row.dmname, loggedInUserName);
            }
        }

        function updateDistrictsDropdown() {
            const type = document.getElementById("districtType").value || "old"; 
            const distDropdown = document.getElementById("districtName");
            let userDesignation = localStorage.getItem("userDesignation") || "State Head";
            let loggedInUser = localStorage.getItem("userName") || "";

            distDropdown.innerHTML = '<option value="All">All Districts</option>';
            let arr = [];
            
            if (userDesignation === "District Manager") {
                 if (type === 'old') {
                     if (dmAssignedOldDistrict) arr.push(dmAssignedOldDistrict);
                 } else {
                     let myNewDists = new Set();
                     globalActData.forEach(row => {
                         if (isNameMatch(row.dmname, loggedInUser) && row.newdist !== 'Unknown' && row.newdist !== '-') {
                             myNewDists.add(row.newdist);
                         }
                     });
                     arr = Array.from(myNewDists).sort();
                 }
            } else {
                 arr = type === "old" ? Array.from(oldDistrictsSet).sort() : Array.from(newDistrictsSet).sort();
            }
            
            arr.forEach(dist => { if(dist) distDropdown.innerHTML += `<option value="${dist}">${dist}</option>`; });
            if(globalActData.length > 0) renderTable(); 
        }

        function renderTable() {
            let distType = document.getElementById('districtType').value;
            let selectedDist = document.getElementById('districtName').value;
            let distKey = distType === 'old' ? 'olddist' : 'newdist';
            
            let userDesignation = localStorage.getItem("userDesignation") || "State Head";
            let loggedInUser = localStorage.getItem("userName") || "";
            
            let reportMap = {};
            let gt = { ids: 0, act26: 0, dynamicCols: [], totUniq: 0, totOld: 0, totNew: 0, yet: 0, inact: 0 };
            columnsToShow.forEach(() => gt.dynamicCols.push({part:0, old:0, newAct:0}));

            globalActData.forEach(row => {
                let dist = row[distKey] || "Unknown";
                if (dist === '-' || dist === '') dist = 'Unknown';

                // 🌟 DM ఫిల్టర్ అప్లై చేస్తున్నాం 🌟
                if (userDesignation === "District Manager") {
                    if (!isRowAllowedForDM(row, distType, loggedInUser)) return;
                }

                if (selectedDist !== "All" && dist !== selectedDist) return;
                
                if (!reportMap[dist]) {
                    reportMap[dist] = { ids: 0, act26: 0, dynamicCols: [], totUniq: 0, totOld: 0, totNew: 0, yet: 0, inact: 0 };
                    columnsToShow.forEach(() => reportMap[dist].dynamicCols.push({part:0, old:0, newAct:0}));
                }
                
                let d = reportMap[dist];
                d.ids += row.hasIrctc; gt.ids += row.hasIrctc; d.act26 += row.isAct26; gt.act26 += row.isAct26;
                
                columnsToShow.forEach((colDef, cIdx) => {
                    colDef.indices.forEach(mIdx => {
                        d.dynamicCols[cIdx].part += row.months[mIdx].part; d.dynamicCols[cIdx].old += row.months[mIdx].old; d.dynamicCols[cIdx].newAct += row.months[mIdx].new;
                        gt.dynamicCols[cIdx].part += row.months[mIdx].part; gt.dynamicCols[cIdx].old += row.months[mIdx].old; gt.dynamicCols[cIdx].newAct += row.months[mIdx].new;
                    });
                });

                d.totUniq += row.totUnique; gt.totUniq += row.totUnique; d.totOld += row.totOld; gt.totOld += row.totOld; d.totNew += row.totNew; gt.totNew += row.totNew; d.yet += row.yetToAct; gt.yet += row.yetToAct; d.inact += row.totInact; gt.inact += row.totInact;
            });

            let sortedDistricts = Object.keys(reportMap).sort();
            let tbodyHtml = "";
            
            if(sortedDistricts.length === 0) {
                 tbodyHtml = `<tr><td colspan="40" style="padding: 30px; color: #dc2626; font-weight: bold;">No Data Matches Filter!</td></tr>`;
                 document.getElementById("tableFooter").innerHTML = ""; document.getElementById("chartsArea").style.display = "none";
            } else {
                sortedDistricts.forEach(dist => {
                    let d = reportMap[dist];
                    tbodyHtml += `<tr>
                        <td ondblclick="filterByDistrict('${dist}')" title="Double click to filter">${dist}</td>
                        <td style="color: #0f172a; font-weight: 800; border-right: 1px solid #cbd5e1;">${d.ids}</td>
                        <td style="color: #1e293b; font-weight: 800; border-right: 1px solid #cbd5e1;">${d.act26}</td>`;
                    
                    d.dynamicCols.forEach(colData => {
                        tbodyHtml += `<td style="font-weight:800; background-color: #f1f5f9; color: #1e293b; border-right: 1px solid #cbd5e1;">${colData.part}</td><td style="background-color: #f8fafc; color: #475569; border-right: 1px solid #cbd5e1;">${colData.old}</td><td style="background-color: #ffffff; color: #0f766e; border-right: 1px solid #cbd5e1;">${colData.newAct}</td>`;
                    });
                    
                    tbodyHtml += `<td style="background-color: #eff6ff; color: #1d4ed8; font-weight: 800; border-right: 1px solid #cbd5e1;">${d.totUniq}</td><td style="background-color: #f8fafc; color: #475569; border-right: 1px solid #cbd5e1; font-weight: 700;">${d.totOld}</td><td style="background-color: #ffffff; color: #0f766e; border-right: 1px solid #cbd5e1; font-weight: 700;">${d.totNew}</td><td style="background-color: #fff1f2; color: #be123c; font-weight: 800; border-right: 1px solid #cbd5e1;">${d.yet}</td><td style="background-color: #f8fafc; color: #0f172a; font-weight: 800;">${d.inact}</td></tr>`;
                });

                let tfootHtml = `<tr class="total-row"><td>GRAND TOTAL</td><td style="color: #0f172a; border-right: 1px solid #cbd5e1;">${gt.ids}</td><td style="color: #1e293b; border-right: 1px solid #cbd5e1;">${gt.act26}</td>`;
                gt.dynamicCols.forEach(colData => {
                    tfootHtml += `<td style="background-color: #e2e8f0; color: #1e293b; font-weight: 900; border-right: 1px solid #cbd5e1;">${colData.part}</td><td style="background-color: #f8fafc; color: #475569; font-weight: 800; border-right: 1px solid #cbd5e1;">${colData.old}</td><td style="background-color: #ffffff; color: #0f766e; font-weight: 800; border-right: 1px solid #cbd5e1;">${colData.newAct}</td>`;
                });

                tfootHtml += `<td style="background-color: #eff6ff; color: #1d4ed8; border-right: 1px solid #cbd5e1;">${gt.totUniq}</td><td style="background-color: #f8fafc; color: #475569; border-right: 1px solid #cbd5e1;">${gt.totOld}</td><td style="background-color: #ffffff; color: #0f766e; border-right: 1px solid #cbd5e1;">${gt.totNew}</td><td style="background-color: #fff1f2; color: #be123c; border-right: 1px solid #cbd5e1;">${gt.yet}</td><td style="background-color: #f8fafc; color: #0f172a;">${gt.inact}</td></tr>`;
                
                document.getElementById("tableFooter").innerHTML = tfootHtml; document.getElementById("chartsArea").style.display = "flex"; renderCharts(gt);
            }
            document.getElementById("tableBody").innerHTML = tbodyHtml;
        }

        function renderCharts(gt) {
            let labels = columnsToShow.map(c => c.label);
            if(trendChartInstance) trendChartInstance.destroy();
            trendChartInstance = new Chart(document.getElementById('trendChart').getContext('2d'), {
                type: 'line', data: { labels: labels, datasets: [{ label: 'Total Participated VLEs', data: gt.dynamicCols.map(c => c.part), borderColor: '#ea580c', backgroundColor: 'rgba(234, 88, 12, 0.1)', borderWidth: 3, fill: true, tension: 0.3 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });

            if(breakdownChartInstance) breakdownChartInstance.destroy();
            breakdownChartInstance = new Chart(document.getElementById('breakdownChart').getContext('2d'), {
                type: 'bar', data: { labels: labels, datasets: [{ label: 'Old VLEs (Act. Old)', data: gt.dynamicCols.map(c => c.old), backgroundColor: '#475569' }, { label: 'New VLEs (Act. New)', data: gt.dynamicCols.map(c => c.newAct), backgroundColor: '#0f766e' }] },
                options: { responsive: true, maintainAspectRatio: false, scales: { x: { stacked: true }, y: { stacked: true } }, plugins: { legend: { position: 'top', labels: {font: {weight: 'bold'}} } } }
            });
        }

        function filterByDistrict(distName) {
            let distDropdown = document.getElementById("districtName");
            if (distDropdown.value === distName) { distDropdown.value = "All"; } else { distDropdown.value = distName; }
            renderTable();
        }

        function resetFilters() { document.getElementById("districtType").value = "old"; updateDistrictsDropdown(); }

        /* 📸 ఇమేజ్ డౌన్‌లోడ్ 100% పక్కా ఫిక్స్ 📸 */
        function downloadReportImage() {
            let el = document.getElementById('printableReport');
            let btn = document.getElementById("downloadBtn");
            let originalText = btn.innerHTML;
            btn.innerHTML = "⏳ Processing...";
            
            let originalWidth = el.style.width;
            el.style.width = el.scrollWidth + 'px';
            el.classList.add('capture-mode');

            setTimeout(() => {
                html2canvas(el, { scale: 2, backgroundColor: "#ffffff" }).then(canvas => {
                    let link = document.createElement('a'); 
                    let typeText = document.getElementById("districtType").value;
                    let d = new Date();
                    let dateStr = ("0" + d.getDate()).slice(-2) + "-" + ("0" + (d.getMonth() + 1)).slice(-2) + "-" + d.getFullYear();
                    link.download = `IRCTC_Monthwise_Activations_${typeText}_${dateStr}.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();

                    el.style.width = originalWidth;
                    el.classList.remove('capture-mode');
                    btn.innerHTML = originalText;
                });
            }, 500);
        }

        function toggleFullScreen() {
            let btn = document.getElementById("fullscreenBtn");
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
                btn.innerHTML = "✖ Exit Full Screen";
                btn.style.backgroundColor = "#ea580c"; 
                btn.style.color = "white"; 
                btn.style.borderColor = "#ea580c";
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        document.addEventListener('fullscreenchange', (event) => {
            let btn = document.getElementById("fullscreenBtn");
            if (!document.fullscreenElement) {
                btn.innerHTML = "⛶ Full Screen";
                btn.style.backgroundColor = "#f1f5f9"; 
                btn.style.color = "#475569"; 
                btn.style.borderColor = "#cbd5e1";
            }
        });
    </script>
</body>
