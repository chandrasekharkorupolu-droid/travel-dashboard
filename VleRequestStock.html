<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>body { background-color: #f8fafc; padding: 20px; font-family: 'Segoe UI', Tahoma, sans-serif; }</style>
</head>
<body>
  <div class="card shadow-sm border-0 border-top border-4 border-primary">
    <div class="card-body p-4">
      <h5 class="fw-bold text-primary mb-4">📦 Request New Stock</h5>
      
      <div class="mb-3">
        <label class="form-label fw-bold text-secondary">Stock Holding Request No (SHQ)</label>
        <input type="text" id="shqNo" class="form-control form-control-lg" placeholder="Ex: SHQ12345ABC">
      </div>
      
      <div class="mb-4">
        <label class="form-label fw-bold text-secondary">Required Quantity (Papers)</label>
        <input type="number" id="reqQty" class="form-control form-control-lg" placeholder="Ex: 100">
      </div>
      
      <button id="btnReqStock" class="btn btn-primary w-100 fw-bold py-2 fs-5" onclick="submitRequest()">Submit Request</button>
    </div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby4S9U-tUh14QeZDI17UsOIOoEi5DMgORTWYllh1knGoeZQS_IJoavZWZ6RDWsD5uls/exec";
    let loggedInId = localStorage.getItem("userId") || "";
    let loggedInUser = localStorage.getItem("userName") || "";

    function submitRequest() {
        var shqNo = document.getElementById('shqNo').value.trim(); 
        var qty = document.getElementById('reqQty').value;
        if(!shqNo) { alert("దయచేసి Stock Holding Request No ఎంటర్ చేయండి!"); return; } 
        if(!qty || qty <= 0) { alert("దయచేసి ఎన్ని పేపర్లు కావాలో ఎంటర్ చేయండి!"); return; }
        
        var btn = document.getElementById('btnReqStock'); 
        btn.innerText = "⏳ Submitting..."; btn.disabled = true;
        
        fetch(SCRIPT_URL, { 
            method: "POST", 
            body: JSON.stringify({ action: 'vleRequestStock', vleId: loggedInId, vleName: loggedInUser, quantity: qty, shqNo: shqNo }) 
        })
        .then(res => res.json()).then(res => { 
            btn.innerText = "Submit Request"; btn.disabled = false; 
            if(res.success) { 
                alert("✅ " + res.message); 
                document.getElementById('shqNo').value = ''; document.getElementById('reqQty').value = ''; 
            } else { alert("❌ Error: " + res.message); } 
        }).catch(err => { btn.innerText = "Submit Request"; btn.disabled = false; alert("Network Error!"); });
    }
  </script>
</body>
</html>
