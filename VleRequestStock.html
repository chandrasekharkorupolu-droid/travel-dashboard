<!DOCTYPE html>
<html lang="en">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Request New Stock</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  
  <style>
    /* 🌟 Master Clean Background 🌟 */
    body { 
        background: #f4f7fe; 
        font-family: 'Inter', 'Segoe UI', Tahoma, sans-serif; 
        padding: 40px 20px; 
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: flex-start;
    }

    /* 🌟 Premium Solid Card 🌟 */
    .premium-card {
        background: #ffffff;
        border: none;
        border-radius: 24px;
        box-shadow: 0 15px 35px rgba(112, 144, 176, 0.12), 0 5px 15px rgba(112, 144, 176, 0.05);
        width: 100%;
        max-width: 550px;
        position: relative;
        animation: slideUp 0.4s ease-out;
        border-top: 6px solid #6366f1;
    }

    @keyframes slideUp { 
        from { transform: translateY(20px); opacity: 0; } 
        to { transform: translateY(0); opacity: 1; } 
    }

    /* 🌟 Header Section 🌟 */
    .card-header-custom {
        padding: 25px 30px 15px 30px;
        border-bottom: 2px solid #f8fafc;
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .title-icon {
        background: #e0e7ff;
        padding: 10px;
        border-radius: 12px;
        font-size: 20px;
        color: #4f46e5;
    }

    .card-title {
        color: #0f172a;
        font-weight: 900;
        font-size: 22px;
        margin: 0;
        letter-spacing: -0.5px;
    }

    /* 🌟 Form Body & Inputs 🌟 */
    .card-body-custom { padding: 30px; }

    .form-group { margin-bottom: 25px; }
    
    .form-label-custom {
        display: block;
        font-size: 13px;
        font-weight: 800;
        color: #475569;
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    /* 🌟 Custom Input Group for Prefix (COL) 🌟 */
    .input-group-custom {
        display: flex;
        align-items: center;
        background: #f8fafc;
        border: 2px solid #e2e8f0;
        border-radius: 12px;
        overflow: hidden;
        transition: all 0.3s ease;
    }

    .input-group-custom:focus-within {
        background: #ffffff;
        border-color: #6366f1;
        box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        transform: translateY(-1px);
    }

    .input-prefix {
        background: #e2e8f0;
        color: #1e293b;
        font-weight: 900;
        padding: 14px 16px;
        font-size: 16px;
        border-right: 1px solid #cbd5e1;
    }

    .form-control-input {
        flex: 1;
        border: none;
        background: transparent;
        font-size: 16px;
        font-weight: 700;
        color: #1e293b;
        padding: 14px 16px;
        outline: none;
        letter-spacing: 1px;
    }

    .form-control-input::placeholder { color: #94a3b8; font-weight: 500; letter-spacing: normal;}

    .form-control-custom {
        width: 100%;
        background: #f8fafc;
        border: 2px solid #e2e8f0;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 700;
        color: #1e293b;
        padding: 14px 16px;
        transition: all 0.3s ease;
        outline: none;
    }

    .form-control-custom:focus {
        background: #ffffff;
        border-color: #6366f1;
        box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        transform: translateY(-1px);
    }

    .form-control-custom::placeholder { color: #94a3b8; font-weight: 500; }

    /* 🌟 Submit Button 🌟 */
    .btn-submit {
        width: 100%;
        background: linear-gradient(135deg, #6366f1, #4f46e5);
        color: white;
        border: none;
        border-radius: 12px;
        padding: 16px;
        font-size: 16px;
        font-weight: 800;
        letter-spacing: 1px;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 8px 15px rgba(99, 102, 241, 0.25);
        margin-top: 10px;
    }

    .btn-submit:hover {
        background: linear-gradient(135deg, #4f46e5, #4338ca);
        transform: translateY(-2px);
        box-shadow: 0 12px 20px rgba(99, 102, 241, 0.35);
    }

    .btn-submit:active {
        transform: translateY(1px);
        box-shadow: 0 4px 8px rgba(99, 102, 241, 0.25);
    }

    .btn-submit:disabled {
        background: #94a3b8;
        box-shadow: none;
        cursor: not-allowed;
        transform: none;
    }

    /* 🌟 Premium Alert Modal 🌟 */
    .modal-content-innovative {
        background: #ffffff;
        border: none;
        border-radius: 24px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        text-align: center;
        padding: 40px 30px;
    }
    
    .icon-circle { width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 40px; }
    .icon-circle.success { background-color: #ecfdf5; color: #10b981; box-shadow: 0 0 25px rgba(16, 185, 129, 0.2); } 
    .icon-circle.error { background-color: #fef2f2; color: #ef4444; box-shadow: 0 0 25px rgba(239, 68, 68, 0.2); }

    .alert-message-text { font-size: 16px; font-weight: 600; color: #475569; line-height: 1.6; margin-bottom: 25px; }

    .btn-modal {
        border-radius: 12px; padding: 14px 30px; font-weight: 800; font-size: 16px; transition: all 0.3s ease; border: none; width: 75%; margin: 0 auto; letter-spacing: 0.5px;
    }
    .btn-modal.success { background: linear-gradient(135deg, #10b981, #059669); color: white; box-shadow: 0 8px 15px rgba(16, 185, 129, 0.2); }
    .btn-modal.error { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; box-shadow: 0 8px 15px rgba(239, 68, 68, 0.2); }
    .btn-modal:hover { transform: translateY(-2px); }

    /* 📱 MOBILE RESPONSIVE STYLES 📱 */
    @media (max-width: 768px) {
        body { padding: 20px 10px; }
        .premium-card { border-radius: 20px; }
        .card-header-custom { padding: 20px 20px 15px 20px; }
        .title-icon { font-size: 18px; padding: 8px; }
        .card-title { font-size: 19px; }
        .card-body-custom { padding: 20px; }
        .form-control-custom, .input-prefix, .form-control-input { padding: 12px 14px; font-size: 15px; }
        .btn-submit { padding: 14px; font-size: 15px; }
        .modal-content-innovative { padding: 30px 20px; margin: 10px; }
        .icon-circle { width: 65px; height: 65px; font-size: 30px; margin-bottom: 15px; }
        #alertTitle { font-size: 22px !important; }
        .alert-message-text { font-size: 14px; margin-bottom: 20px; }
        .btn-modal { width: 100%; padding: 12px 20px; font-size: 15px; }
    }
  </style>

<script async src="https://www.googletagmanager.com/gtag/js?id=G-GF2VXY76KN"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-GF2VXY76KN');
</script>
</head>
<body>

  <div class="modal fade" id="customAlertModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content modal-content-innovative">
        <div id="alertIconContainer" class="icon-circle success">✅</div>
        <h4 id="alertTitle" class="fw-bold text-dark mb-3" style="font-size: 26px; letter-spacing: -0.5px;">Success!</h4>
        <p id="alertMessage" class="alert-message-text">Message goes here.</p>
        <button type="button" id="alertBtn" class="btn-modal success" data-bs-dismiss="modal">OK, Got it!</button>
      </div>
    </div>
  </div>

  <div class="premium-card">
    <div class="card-header-custom">
      <div class="title-icon">📦</div>
      <h2 class="card-title">Request New Stock</h2>
    </div>
    
    <div class="card-body-custom">
      <div class="form-group">
        <label class="form-label-custom">Stock Holding Request No (SHQ)</label>
        <div class="input-group-custom">
            <span class="input-prefix">COL</span>
            <input type="text" id="shqNo" class="form-control-input" placeholder="Ex: 0907202675252" maxlength="13" oninput="this.value = this.value.replace(/[^0-9]/g, '');">
        </div>
      </div>
      
      <div class="form-group">
        <label class="form-label-custom">Required Quantity (Papers)</label>
        <input type="number" id="reqQty" class="form-control-custom" placeholder="Ex: 100">
      </div>
      
      <button id="btnReqStock" class="btn-submit" onclick="submitRequest()">Submit Request</button>
    </div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby4S9U-tUh14QeZDI17UsOIOoEi5DMgORTWYllh1knGoeZQS_IJoavZWZ6RDWsD5uls/exec";
    let loggedInId = localStorage.getItem("userId") || "";
    let loggedInUser = localStorage.getItem("userName") || "";

    function customAlert(msg, isSuccess) {
        let safeMsg = msg ? String(msg) : (isSuccess ? "Request Submitted Successfully." : "Request Failed!");
        const iconContainer = document.getElementById("alertIconContainer");
        const title = document.getElementById("alertTitle");
        const message = document.getElementById("alertMessage");
        const btn = document.getElementById("alertBtn");

        if (isSuccess) {
            iconContainer.className = "icon-circle success"; iconContainer.innerHTML = "✅"; 
            title.innerText = "Superb!"; 
            title.style.color = "#0f172a";
            btn.className = "btn-modal success"; btn.innerText = "OK, Great!";
        } else {
            iconContainer.className = "icon-circle error"; iconContainer.innerHTML = "❌"; 
            title.innerText = "Oh Snap!"; 
            title.style.color = "#ef4444";
            btn.className = "btn-modal error"; btn.innerText = "Try Again";
        }
        
        message.innerHTML = safeMsg.replace(/\n/g, '<br>');
        var alertModal = new bootstrap.Modal(document.getElementById('customAlertModal'));
        alertModal.show();
    }

    function submitRequest() {
        var shqInput = document.getElementById('shqNo').value.trim(); 
        var qty = document.getElementById('reqQty').value;
        
        // 🌟 Validation: ఖచ్చితంగా 13 అంకెలు ఉండాలి 🌟
        if(shqInput.length !== 13) { 
            customAlert("దయచేసి సరైన Stock Holding Number ని ఎంటర్ చేయండి. \n(ఖచ్చితంగా 13 అంకెలు ఉండాలి!)", false); 
            return; 
        } 
        
        // సబ్మిట్ చేసేటప్పుడు COL కి నెంబర్ యాడ్ చేసి పంపిస్తున్నాం (e.g., COL0907202675252)
        var finalShqNo = "COL" + shqInput;

        if(!qty || qty <= 0) { customAlert("దయచేసి ఎన్ని పేపర్లు కావాలో కరెక్ట్ గా ఎంటర్ చేయండి!", false); return; }
        
        var btn = document.getElementById('btnReqStock'); 
        btn.innerText = "⏳ Submitting..."; 
        btn.disabled = true;
        
        fetch(SCRIPT_URL, { 
            method: "POST", 
            body: JSON.stringify({ action: 'vleRequestStock', vleId: loggedInId, vleName: loggedInUser, quantity: qty, shqNo: finalShqNo }) 
        })
        .then(res => res.json())
        .then(res => { 
            btn.innerText = "Submit Request"; 
            btn.disabled = false; 
            if(res.success) { 
                customAlert(res.message, true); 
                document.getElementById('shqNo').value = ''; 
                document.getElementById('reqQty').value = ''; 
            } else { 
                customAlert(res.message, false); 
            } 
        })
        .catch(err => { 
            btn.innerText = "Submit Request"; 
            btn.disabled = false; 
            customAlert("Network Error! Please check your connection.", false); 
        });
    }
  </script>
</body>
</html>
