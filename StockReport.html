<!DOCTYPE html>
<html lang="en">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Stamping Stationary Report</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  
  <style>
    /* 🌟 Master Clean Background 🌟 */
    body { 
        background: #f4f7fe; /* Premium soft gray-blue */
        font-family: 'Inter', 'Segoe UI', Tahoma, sans-serif; 
        padding: 30px 20px; 
        min-height: 100vh;
        color: #334155;
    }

    /* 🌟 Top KPI Stats Cards 🌟 */
    .stats-card { 
        background: #ffffff; 
        border-radius: 20px; 
        padding: 25px 20px; 
        box-shadow: 0 10px 30px rgba(112, 144, 176, 0.1), 0 5px 15px rgba(112, 144, 176, 0.05);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        transition: transform 0.3s ease;
        border-top: 5px solid transparent;
    }
    .stats-card:hover { transform: translateY(-4px); }
    .stats-card.inward { border-top-color: #6366f1; } /* Indigo */
    .stats-card.outward { border-top-color: #ef4444; } /* Red */
    .stats-card.balance { border-top-color: #10b981; } /* Green */
    
    .stats-card h6 { 
        color: #64748b; 
        font-size: 11px; 
        font-weight: 800; 
        text-transform: uppercase; 
        letter-spacing: 1px; 
        margin-bottom: 8px; 
    }
    .stats-card h2 { 
        font-size: 34px; 
        font-weight: 900; 
        margin: 0; 
        line-height: 1; 
    }

    /* 🌟 Premium Solid Cards (Table Container) 🌟 */
    .premium-card {
        background: #ffffff;
        border: none;
        border-radius: 24px;
        box-shadow: 0 15px 35px rgba(112, 144, 176, 0.12), 0 5px 15px rgba(112, 144, 176, 0.05);
        overflow: hidden;
        margin-top: 30px;
    }
    
    .card-header-custom {
        padding: 24px 30px;
        border-bottom: 2px solid #f8fafc;
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: #ffffff;
    }
    
    .card-title {
        color: #0f172a;
        font-weight: 800;
        font-size: 18px;
        margin: 0;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    /* 🌟 Table Design 🌟 */
    .table-container { padding: 0 10px 20px 10px; }
    .table { margin-bottom: 0; }
    .table thead th { 
        background: #ffffff; 
        color: #64748b; 
        font-size: 12px; 
        font-weight: 800;
        text-transform: uppercase; 
        letter-spacing: 0.5px;
        padding: 16px 20px;
        border-bottom: 2px solid #e2e8f0;
    }
    .table tbody tr td { 
        padding: 18px 20px;
        border-bottom: 1px solid #f1f5f9;
        vertical-align: middle;
        font-size: 14px;
    }
    .table-hover tbody tr { transition: all 0.2s ease; }
    .table-hover tbody tr:hover { 
        background-color: #f8fafc; 
        transform: scale(1.002);
        box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        border-radius: 12px;
    }

    /* 🌟 Buttons & Badges 🌟 */
    .btn-action { 
        font-weight: 800; 
        border: none; 
        border-radius: 10px;
        padding: 8px 16px;
        font-size: 13px;
        transition: all 0.3s ease;
    }
    .btn-outline-custom { 
        color: #6366f1; 
        background: #eff6ff; 
        font-weight: 800; 
        padding: 8px 18px; 
        border-radius: 10px; 
        border: 1px solid #c7d2fe; 
    }
    .btn-outline-custom:hover { background: #e0e7ff; color: #4f46e5; }
    
    .btn-outline-dark-custom { 
        color: #475569; 
        background: #ffffff; 
        font-weight: 800; 
        padding: 8px 18px; 
        border-radius: 10px; 
        border: 2px solid #cbd5e1; 
    }
    .btn-outline-dark-custom:hover { background: #f8fafc; color: #1e293b; border-color: #94a3b8;}

    .badge-custom { 
        background: #f3e8ff; 
        color: #7c3aed; 
        font-weight: 800; 
        padding: 8px 16px; 
        border-radius: 10px; 
        font-size: 11px; 
        text-transform: uppercase; 
        letter-spacing: 0.5px; 
        border: 1px dashed #d8b4fe;
    }
  </style>
</head>
<body>

  <div class="container-fluid p-0" id="captureArea">
    
    <!-- 🌟 Page Header & Action Buttons 🌟 -->
    <div class="d-flex justify-content-between align-items-center mb-4 px-2">
      <h4 class="fw-bold m-0" style="color: #1e293b; letter-spacing: -0.5px;">📦 E-Stamping Stationary Report</h4>
      
      <div data-html2canvas-ignore="true" class="d-flex gap-2">
        <button class="btn-action btn-outline-dark-custom" onclick="downloadImage()">📸 Download Image</button>
        <button class="btn-action btn-outline-custom" onclick="refreshLiveReport()">🔄 Refresh Live</button>
      </div>
    </div>

    <!-- 🌟 Top KPI Cards 🌟 -->
    <div class="row g-4 mb-2">
      <div class="col-md-4">
        <div class="stats-card inward">
            <h6>Total Master Inward</h6>
            <h2 id="totInward" style="color: #6366f1;">0</h2>
        </div>
      </div>
      <div class="col-md-4">
        <div class="stats-card outward">
            <h6>Total Dispatched to VLEs</h6>
            <h2 id="totOutward" style="color: #ef4444;">0</h2>
        </div>
      </div>
      <div class="col-md-4">
        <div class="stats-card balance">
            <h6>Available Stock Balance</h6>
            <h2 id="totBalance" style="color: #10b981;">0</h2>
        </div>
      </div>
    </div>

    <!-- 🌟 Premium Solid Table Card 🌟 -->
    <div class="premium-card">
      <div class="card-header-custom">
        <h3 class="card-title">📍 Districtwise Inventory Summary Matrix</h3>
        <span class="badge-custom" id="lblScope">-</span>
      </div>
      
      <div class="table-container">
        <div class="table-responsive">
          <table class="table table-hover align-middle text-center mb-0">
            <thead class="sticky-top">
              <tr>
                <th class="text-start ps-4">District Name</th>
                <th>Inward Master Stock</th>
                <th>Dispatched Stock (VLEs)</th>
                <th>Available Balance</th>
              </tr>
            </thead>
            <tbody id="summaryBody">
              <tr><td colspan="4" class="text-muted py-5 fw-bold" style="color: #6366f1 !important;">Loading Statement Matrix...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

  </div>

  <script>
    // 🌟 మీ పాత జావాస్క్రిప్ట్ లాజిక్స్ అన్నీ 100% సేఫ్ 🌟
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby4S9U-tUh14QeZDI17UsOIOoEi5DMgORTWYllh1knGoeZQS_IJoavZWZ6RDWsD5uls/exec";
    let loggedInDesig = localStorage.getItem("userDesignation") || "DM"; 
    let loggedInUserId = localStorage.getItem("userId") || ""; 
    let isDM = loggedInDesig.toUpperCase() === "DM" || loggedInDesig.toUpperCase().indexOf("DISTRICT MANAGER") !== -1;
    let loggedInDistrict = localStorage.getItem("userDistrict") || "Your District";

    document.getElementById("lblScope").innerText = isDM ? "District Filter Active: " + loggedInDistrict.toUpperCase() : "Full State Access Level";

    window.onload = function() { checkCacheAndLoad(); };

    function checkCacheAndLoad() {
       let cachedData = localStorage.getItem("eStampSummaryCache"); 
       let cacheTime = localStorage.getItem("eStampSummaryTime"); 
       let now = new Date().getTime();
       if (cachedData && cacheTime && (now - cacheTime < 300000)) { 
           renderData(JSON.parse(cachedData)); 
       } else { 
           fetchLiveReport(); 
       }
    }

    function refreshLiveReport() { 
       localStorage.removeItem("eStampSummaryCache"); 
       document.getElementById("summaryBody").innerHTML = `<tr><td colspan="4" class="py-5 fw-bold" style="color: #6366f1;">🔄 Refreshing Statement Matrix...</td></tr>`; 
       fetchLiveReport(); 
    }

    function fetchLiveReport() {
       fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "getDistrictStockSummary", role: loggedInDesig, userId: loggedInUserId }) })
       .then(res => res.json()).then(res => {
          if(res.success && res.summary) { 
             localStorage.setItem("eStampSummaryCache", JSON.stringify(res.summary)); 
             localStorage.setItem("eStampSummaryTime", new Date().getTime().toString()); 
             renderData(res.summary); 
          }
       }).catch(e => { document.getElementById("summaryBody").innerHTML = `<tr><td colspan="4" class="text-danger fw-bold py-5">❌ Network error. Click Refresh Live.</td></tr>`; });
    }

    function renderData(summary) {
       const sbody = document.getElementById("summaryBody"); sbody.innerHTML = ""; let tIn = 0, tOut = 0;
       
       let renderList = [];
       
       if(isDM) {
           renderList = Object.keys(summary); 
       } else {
           renderList = ["ANANTAPUR", "CHITTOOR", "EAST GODAVARI", "GUNTUR", "KRISHNA", "KURNOOL", "PRAKASAM", "SPSR NELLORE", "SRIKAKULAM", "VISAKHAPATNAM", "VIZIANAGARAM", "WEST GODAVARI", "YSR KADAPA"];
       }
       
       renderList.forEach(dist => {
          let dIn = (summary[dist] && summary[dist].inward) ? summary[dist].inward : 0; 
          let dOut = (summary[dist] && summary[dist].outward) ? summary[dist].outward : 0; 
          let avail = dIn - dOut;
          
          tIn += dIn; 
          tOut += dOut;
          
          sbody.innerHTML += `<tr>
            <td class="fw-bold text-start ps-4" style="color: #0f172a;">${dist}</td>
            <td class="fw-bold" style="color: #64748b; font-size: 15px;">${dIn}</td>
            <td class="text-danger fw-bold" style="font-size: 15px;">${dOut}</td>
            <td class="text-success fw-bold" style="font-size: 15px;">${avail}</td>
          </tr>`;
       });
       
       document.getElementById("totInward").innerText = tIn; 
       document.getElementById("totOutward").innerText = tOut; 
       document.getElementById("totBalance").innerText = tIn - tOut;
       
       if(sbody.innerHTML === "") { sbody.innerHTML = `<tr><td colspan="4" class="text-danger fw-bold py-5">No data found.</td></tr>`; }
    }

    function downloadImage() {
       const captureElement = document.getElementById('captureArea');
       html2canvas(captureElement, { scale: 2, backgroundColor: '#f4f7fe' }).then(canvas => {
          let link = document.createElement('a');
          link.download = 'E-Stamping_Stock_Summary.png';
          link.href = canvas.toDataURL("image/png");
          link.click();
       });
    }
  </script>
</body>
</html>
