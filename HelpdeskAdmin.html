<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f1f5f9; padding: 20px; box-sizing: border-box; }
    
    .header-section { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
    .page-title { margin: 0; color: #1e293b; font-size: 22px; font-weight: 800; display: flex; align-items: center; gap: 10px; }
    
    /* టాబ్స్ డిజైన్ */
    .tabs { display: flex; gap: 15px; }
    .tab-btn { background: white; border: 1px solid #cbd5e1; padding: 10px 20px; border-radius: 8px; font-weight: 700; color: #475569; cursor: pointer; transition: 0.2s; font-size: 14px; }
    .tab-btn:hover { background: #f8fafc; }
    .tab-btn.active-open { background: #fee2e2; color: #b91c1c; border-color: #fca5a5; }
    .tab-btn.active-closed { background: #dcfce7; color: #15803d; border-color: #86efac; }
    
    .ticket-container { background: white; border-radius: 12px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px rgba(0,0,0,0.02); overflow: hidden; animation: popIn 0.3s; }
    @keyframes popIn { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    /* టేబుల్ డిజైన్ */
    .ticket-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .ticket-table th { background: #f8fafc; padding: 15px; text-align: left; color: #475569; font-weight: 700; border-bottom: 2px solid #e2e8f0; }
    .ticket-table td { padding: 15px; border-bottom: 1px solid #f1f5f9; color: #1e293b; font-weight: 500; vertical-align: top; }
    .ticket-table tr:hover { background: #f8fafc; }

    .status-badge { padding: 5px 12px; border-radius: 20px; font-weight: 800; font-size: 11px; text-transform: uppercase; }
    .bg-open { background: #fee2e2; color: #b91c1c; border: 1px solid #fca5a5; }
    .bg-reopen { background: #fef3c7; color: #b45309; border: 1px solid #fcd34d; }
    .bg-closed { background: #dcfce7; color: #15803d; border: 1px solid #86efac; }
    
    .desc-box { background: #f1f5f9; padding: 10px; border-radius: 6px; font-size: 12px; color: #475569; margin-top: 5px; white-space: pre-wrap; word-break: break-word; max-height: 80px; overflow-y: auto; }
    
    .loader { text-align: center; padding: 50px; color: #64748b; font-weight: bold; font-size: 16px; }
  </style>

  <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-GF2VXY76KN"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-GF2VXY76KN');
</script>
  
</head>
<body>

  <div class="header-section">
    <h2 class="page-title"><span>🎧</span> VLE Helpdesk Panel</h2>
    <div class="tabs">
      <button class="tab-btn active-open" id="btnOpen" onclick="filterTickets('Open')">🔴 Open / Reopened</button>
      <button class="tab-btn" id="btnClosed" onclick="filterTickets('Closed')">🟢 Resolved Tickets</button>
      <button class="tab-btn" onclick="fetchTickets()">🔄 Refresh</button>
    </div>
  </div>

  <div class="ticket-container">
    <table class="ticket-table">
      <thead>
        <tr>
          <th width="12%">Ticket ID</th>
          <th width="15%">Date</th>
          <th width="15%">VLE Details</th>
          <th width="20%">Service & Issue</th>
          <th width="25%">Description / Attachments</th>
          <th width="13%">Status</th>
        </tr>
      </thead>
      <tbody id="ticketBody">
        <tr><td colspan="6" class="loader">⏳ Fetching tickets from Database... Please wait.</td></tr>
      </tbody>
    </table>
  </div>

  <script>
    // 🌟🌟🌟 మీ కొత్త అడ్మిన్ యాప్స్ స్క్రిప్ట్ URL ఇక్కడ పెట్టండి 🌟🌟🌟
    const SCRIPT_URL = "https://script.google.com/macros/s/YOUR_NEW_DEPLOYMENT_ID/exec";
    
    let allTickets = [];

    window.onload = function() {
      fetchTickets();
    };

    function fetchTickets() {
      document.getElementById('ticketBody').innerHTML = '<tr><td colspan="6" class="loader">⏳ Refreshing data...</td></tr>';
      
      fetch(SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify({ action: "getHelpdeskTickets" })
      })
      .then(res => res.json())
      .then(response => {
         if(response.success) {
            allTickets = response.tickets;
            filterTickets('Open'); // డిఫాల్ట్ గా ఓపెన్ టికెట్స్ చూపిస్తాం
         } else {
            document.getElementById('ticketBody').innerHTML = `<tr><td colspan="6" class="loader" style="color:red;">❌ Error: ${response.message}</td></tr>`;
         }
      })
      .catch(error => {
         document.getElementById('ticketBody').innerHTML = `<tr><td colspan="6" class="loader" style="color:red;">❌ Connection Failed.</td></tr>`;
      });
    }

    function filterTickets(type) {
      // టాబ్స్ కలర్ మార్చడం
      document.getElementById('btnOpen').className = type === 'Open' ? 'tab-btn active-open' : 'tab-btn';
      document.getElementById('btnClosed').className = type === 'Closed' ? 'tab-btn active-closed' : 'tab-btn';
      
      let html = "";
      let filtered = allTickets.filter(t => {
         let stat = t.status.toUpperCase();
         if(type === 'Open') return stat === 'OPEN' || stat === 'REOPENED';
         if(type === 'Closed') return stat === 'RESOLVED' || stat === 'CLOSED';
         return false;
      });

      if(filtered.length === 0) {
         document.getElementById('ticketBody').innerHTML = `<tr><td colspan="6" class="loader">No ${type} tickets found.</td></tr>`;
         return;
      }

      filtered.forEach(t => {
         // డేట్ ఫార్మాటింగ్ (గూగుల్ షీట్ నుండి వచ్చే డేట్ ని అందంగా మార్చడం)
         let dateObj = new Date(t.date);
         let fDate = isNaN(dateObj) ? t.date : dateObj.toLocaleString('en-IN', {day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit'});

         // బ్యాడ్జ్ కలర్
         let statClass = 'bg-open';
         if(t.status.toUpperCase() === 'REOPENED') statClass = 'bg-reopen';
         if(t.status.toUpperCase() === 'RESOLVED') statClass = 'bg-closed';

         // డిస్క్రిప్షన్ లో అటాచ్‌మెంట్ లింక్స్ ఉంటే వాటిని క్లిక్ చేసేలా మార్చడం
         let desc = t.desc;
         if(desc.includes("View File: https://")) {
            desc = desc.replace(/(https:\/\/[^\s]+)/g, '<a href="$1" target="_blank" style="color:#2563eb; font-weight:bold; text-decoration:underline;">📎 View Attachment</a>');
         }

         html += `
         <tr>
            <td><b style="color:#1e3a8a; font-size:14px;">${t.ticketId}</b></td>
            <td style="color:#64748b; font-size:12px;">${fDate}</td>
            <td>
               <b>${t.cscId}</b><br>
               <span style="color:#64748b; font-size:11px;">${t.district}</span>
            </td>
            <td>
               <span style="background:#f1f5f9; padding:2px 6px; border-radius:4px; font-size:11px; font-weight:bold;">${t.service}</span><br>
               <div style="margin-top:5px;">${t.category}</div>
            </td>
            <td>
               <div class="desc-box">${desc}</div>
            </td>
            <td>
               <span class="status-badge ${statClass}">${t.status}</span>
               ${type === 'Open' ? `<button onclick="alert('త్వరలో ఇక్కడి నుండి టికెట్ రిప్లై ఇచ్చే ఆప్షన్ క్రియేట్ చేద్దాం!')" style="margin-top:10px; background:#1e3a8a; color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer; font-size:11px; width:100%;">Update Action</button>` : ''}
            </td>
         </tr>`;
      });
      document.getElementById('ticketBody').innerHTML = html;
    }
  </script>
</body>
</html>
