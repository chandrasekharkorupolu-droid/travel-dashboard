<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    body { background-color: #f0f9ff; font-family: 'Segoe UI', Tahoma, sans-serif; padding: 15px; margin: 0; height: 100vh; display: flex; flex-direction: column; }
    
    .controls-bar { background: white; border-radius: 10px; padding: 12px 15px; box-shadow: 0 4px 10px rgba(2, 132, 199, 0.05); border: 1px solid #bae6fd; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 15px; margin-bottom: 15px; flex-shrink: 0; }
    .filter-group { display: flex; align-items: center; gap: 10px; flex-wrap: wrap;}
    
    /* 🌟 Airways Blue Theme for Controls 🌟 */
    .title-sec { font-size: 16px; font-weight: 900; color: #0284c7; display: flex; align-items: center; gap: 8px; text-transform: uppercase; white-space: nowrap; }
    .dist-select { border: 1px solid #7dd3fc; border-radius: 6px; padding: 6px 10px; font-size: 13px; font-weight: bold; outline: none; min-width: 140px; color: #0f172a; background-color: white; cursor: pointer; }
    .period-select { border: 2px solid #0284c7; color: #0369a1; background-color: #e0f2fe; }
    
    .btn-custom { font-size: 13px; font-weight: 800; padding: 6px 15px; border-radius: 6px; transition: 0.2s; display: flex; align-items: center; gap: 6px; border: 1px solid transparent; cursor: pointer; height: 35px;}
    .btn-img { background: #e0e7ff; color: #0284c7; border-color: #7dd3fc; font-size: 14px;} .btn-img:hover:not(:disabled) { background: #7dd3fc; color: #0c4a6e; }
    .btn-img:disabled { opacity: 0.7; cursor: not-allowed; }
    .btn-full { background: #f8fafc; color: #0f172a; border-color: #94a3b8; } .btn-full:hover { background: #e2e8f0; }
    .btn-exit-full { background: #fee2e2 !important; color: #dc2626 !important; border-color: #fca5a5 !important; } .btn-exit-full:hover { background: #fecaca !important; }

    .content-wrapper { flex: 1; display: flex; justify-content: center; overflow-y: auto; padding-bottom: 20px;}

    /* 🎨 పోస్టర్ బేస్ డిజైన్ 🎨 */
    .poster-board { 
        width: 800px; 
        min-height: 500px; 
        height: max-content; 
        box-shadow: 0 10px 30px rgba(2, 132, 199, 0.2); 
        padding: 30px 30px 40px 30px; 
        color: white; 
        position: relative; 
        overflow: hidden;
        margin: 0 auto;
        transition: all 0.5s ease-in-out; 
    }

    .poster-board::before { content: ''; position: absolute; top: -50px; right: -50px; width: 200px; height: 200px; background: rgba(255,255,255,0.05); border-radius: 50%; z-index:1;}
    .poster-board::after { content: ''; position: absolute; bottom: -50px; left: -50px; width: 300px; height: 300px; background: rgba(255,255,255,0.05); border-radius: 50%; z-index:1;}

    /* 🌟 స్మార్ట్ లోగో అప్లోడ్ సెక్షన్ (CORS ఎర్రర్స్ రావు) 🌟 */
    .logo-box { position: absolute; top: 25px; z-index: 10; cursor: pointer; transition: 0.2s;}
    .logo-box:hover { transform: scale(1.05); }
    .logo-box.left { left: 30px; }
    .logo-box.right { right: 30px; }
    
    .poster-logo { height: 50px; max-width: 140px; background: white; padding: 4px 8px; border-radius: 6px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); object-fit: contain;}
    .logo-placeholder { background: white; padding: 12px 15px; border-radius: 6px; font-size: 11px; font-weight: bold; color: #0284c7; border: 2px dashed #7dd3fc; box-shadow: 0 4px 10px rgba(0,0,0,0.3); transition: 0.2s;}
    .logo-placeholder:hover { background: #e0f2fe; }

    /* పోస్టర్ హెడ్డింగ్ */
    .poster-header { text-align: center; margin-bottom: 50px; position: relative; z-index: 2; margin-top: 10px;} 
    .brand-title { font-size: 18px; font-weight: 900; letter-spacing: 2px; margin: 0; text-transform: uppercase;}
    .main-title { font-size: 38px; font-weight: 900; color: #ffffff; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); margin: 5px 0 0 0;}
    .congrats-title { font-size: 22px; font-weight: 900; color: #fde047; text-shadow: 1px 1px 3px rgba(0,0,0,0.5); margin: 5px 0 15px 0; letter-spacing: 2px;}
    .month-badge { display: inline-block; background: #0284c7; color: white; padding: 5px 20px; border-radius: 20px; font-weight: 900; font-size: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.4); text-transform: uppercase; border: 2px solid rgba(255,255,255,0.5);}

    /* 📸 ఫోటో అప్లోడ్ (Placard) 📸 */
    .podium-container { display: flex; justify-content: center; align-items: flex-end; gap: 20px; margin-bottom: 40px; position: relative; z-index: 2;}
    .podium-wrapper { display: flex; flex-direction: column; align-items: center; flex: 1; max-width: 220px; position: relative;}
    
    .photo-area { position: relative; z-index: 5; margin-bottom: -30px; cursor: pointer; transition: 0.2s;}
    .photo-area:hover { transform: scale(1.05); }
    .vle-photo { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 4px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.4); background: #cbd5e1;}
    .rank-badge { position: absolute; bottom: 0px; right: -5px; width: 35px; height: 35px; border-radius: 50%; background: white; color: black; font-size: 16px; font-weight: 900; display: flex; justify-content: center; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.3); border: 2px solid white;}
    
    .podium-card { padding: 40px 15px 20px 15px; text-align: center; width: 100%; box-shadow: 0 8px 20px rgba(0,0,0,0.2); transition: all 0.3s; position: relative; z-index: 2;}
    .vle-name { font-size: 17px; font-weight: 900; color: #ffffff; margin-bottom: 5px; line-height: 1.2;}
    .vle-dist { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.8); margin-bottom: 8px; text-transform: uppercase;}
    .vle-cscid { font-size: 11px; font-weight: bold; color: #fbbf24; font-family: monospace; margin-bottom: 15px; letter-spacing: 1px; background: rgba(0,0,0,0.3); padding: 3px 8px; border-radius: 4px; display: inline-block; }
    .vle-txns { background: white; color: #0f172a; font-size: 22px; font-weight: 900; padding: 8px 10px; border-radius: 8px; display: inline-block; width: 100%; box-sizing: border-box;}

    .wrapper-rank1 { transform: scale(1.1); z-index: 10; margin-bottom: 20px;} 
    .wrapper-rank1 .vle-photo { width: 120px; height: 120px; border-color: #fbbf24;}
    .wrapper-rank1 .rank-badge { background: #fbbf24; border-color: #f59e0b; color: #78350f; width: 40px; height: 40px; font-size: 20px;}
    .wrapper-rank1 .podium-card { border: 2px solid #fbbf24; }
    .wrapper-rank1 .vle-txns { background: #fbbf24; color: #78350f;}
    .wrapper-rank1 .photo-area::before { content: '👑'; font-size: 45px; position: absolute; top: -35px; left: calc(50% - 22px); z-index: 15; text-shadow: 0 4px 10px rgba(0,0,0,0.3); pointer-events:none;}

    .wrapper-rank2 .podium-card { border: 2px solid #e2e8f0; }
    .wrapper-rank2 .rank-badge { background: #e2e8f0; border-color: #cbd5e1; color: #334155;}
    .wrapper-rank3 .podium-card { border: 2px solid #fca5a5; }
    .wrapper-rank3 .rank-badge { background: #fca5a5; border-color: #f87171; color: #7f1d1d;}

    /* టాప్ 5 గ్రిడ్ */
    .runners-title { text-align: center; font-size: 16px; font-weight: 900; color: #fbbf24; text-transform: uppercase; margin-bottom: 15px; position: relative; z-index: 2; border-bottom: 1px dashed rgba(255,255,255,0.3); padding-bottom: 10px;}
    .runners-grid { display: flex; justify-content: center; gap: 15px; position: relative; z-index: 2; width: 100%;}
    
    .runner-item { display: flex; justify-content: space-between; align-items: center; transition: 0.2s; padding: 12px 15px; border: 1px solid rgba(255,255,255,0.3); flex: 1; max-width: 350px;}
    .r-left { display: flex; align-items: center; gap: 12px;}
    .r-rank { font-size: 18px; font-weight: 900; color: #fbbf24; width: 30px;}
    .r-details { display: flex; flex-direction: column;}
    .r-name { font-size: 15px; font-weight: 800; color: white; margin-bottom: 3px; line-height: 1.2;}
    .r-sub-info { display: flex; flex-direction: column; gap: 2px; }
    .r-dist { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.8); text-transform: uppercase;}
    .r-cscid { font-size: 11px; font-weight: bold; color: #fbbf24; font-family: monospace; letter-spacing: 1px;}
    .r-txns { font-size: 18px; font-weight: 900; color: #ffffff; background: rgba(0,0,0,0.3); padding: 5px 12px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.3);}

    .footer-text { text-align: center; font-size: 11px; color: rgba(255,255,255,0.7); margin-top: 30px; font-weight: 600;}
    .loader { text-align: center; color: white; padding: 50px; font-size: 20px; font-weight: bold; }

    /* =========================================
       🌟 THEMES (Shapes & Colors) 🌟 
       ========================================= */
    .theme-default { background: linear-gradient(135deg, #0f172a 0%, #0369a1 100%); border-radius: 15px; border: 4px solid #f0f9ff;}
    .theme-default .brand-title { color: #7dd3fc; }
    .theme-default .podium-card { background: rgba(255, 255, 255, 0.1); border-radius: 12px; }
    .theme-default .runner-item { background: rgba(255,255,255,0.1); border-radius: 8px; }

    .theme-may { background: linear-gradient(135deg, #4c1d95 0%, #be185d 100%); border-radius: 0px; border: 4px solid #fbcfe8;}
    .theme-may .brand-title { color: #fbcfe8; }
    .theme-may .podium-card { background: rgba(0, 0, 0, 0.3); border-radius: 0px; clip-path: polygon(15% 0, 100% 0, 100% 85%, 85% 100%, 0 100%, 0 15%); }
    .theme-may .runner-item { background: rgba(0,0,0,0.2); border-radius: 0px; clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px); border: none; border-left: 4px solid #fbcfe8;}

    .theme-jun { background: linear-gradient(135deg, #064e3b 0%, #0f766e 100%); border-radius: 40px; border: 4px solid #a7f3d0;}
    .theme-jun .brand-title { color: #a7f3d0; }
    .theme-jun .podium-card { background: rgba(255, 255, 255, 0.15); border-radius: 40px 40px 10px 10px; }
    .theme-jun .runner-item { background: rgba(255,255,255,0.1); border-radius: 30px; padding: 10px 20px;}

    .theme-jul { background: linear-gradient(135deg, #7f1d1d 0%, #b45309 100%); border-radius: 20px; border: 4px solid #fde68a;}
    .theme-aug { background: linear-gradient(135deg, #312e81 0%, #701a75 100%); border-radius: 20px; border: 4px solid #e9d5ff;}
    .theme-jul .brand-title { color: #fde68a; } .theme-aug .brand-title { color: #e9d5ff; }
    .theme-jul .podium-card, .theme-aug .podium-card { background: rgba(0, 0, 0, 0.4); border-radius: 40px 0px 40px 0px; }
    .theme-jul .runner-item, .theme-aug .runner-item { background: rgba(0,0,0,0.3); border-radius: 20px 0px 20px 0px; border:none; border-bottom: 2px solid rgba(255,255,255,0.5);}

    .theme-neon { background: linear-gradient(135deg, #020617 0%, #082f49 100%); border-radius: 5px; border: 2px solid #38bdf8;}
    .theme-neon .brand-title { color: #38bdf8; letter-spacing: 4px;}
    .theme-neon .podium-card { background: transparent; border-radius: 0px; box-shadow: inset 0 0 15px rgba(56, 189, 248, 0.3); }
    .theme-neon .runner-item { background: transparent; border-radius: 0px; border: 1px solid rgba(56, 189, 248, 0.5); }
    .theme-neon .r-txns { background: #0c4a6e; color: #38bdf8; border-color: #0284c7;}


/* 📱 MOBILE RESPONSIVE STYLES (మొబైల్ కోసం ప్రత్యేకమైన సెట్టింగ్స్) 📱 */
    @media (max-width: 768px) {
        body { 
            height: auto; 
            overflow-y: auto; 
            padding: 10px; 
        }

        /* 🌟 Top Controls (ఫిల్టర్స్ & బటన్స్) 🌟 */
        .controls-bar {
            flex-direction: column;
            gap: 15px;
            padding: 15px;
            align-items: stretch;
            height: auto;
        }
        
        .filter-group { 
            width: 100%; 
            flex-direction: column; 
            gap: 10px; 
        }
        
        .title-sec {
            width: 100%;
            justify-content: center;
            text-align: center;
            margin-right: 0 !important;
            margin-bottom: 5px;
            font-size: 16px;
            white-space: normal;
        }

        .filter-label { display: none; } /* మొబైల్ లో లేబుల్స్ హైడ్ చేశాం */
        
        .dist-select, .period-select, .btn-custom {
            width: 100% !important;
            max-width: 100%;
            height: 42px !important; 
            font-size: 13px;
            justify-content: center;
            margin-left: 0 !important; /* పక్కకు వెళ్లకుండా సెంటర్ చేస్తాం */
        }

        #fsBtn { display: none !important; } /* మొబైల్ కి ఫుల్ స్క్రీన్ వద్దు */

        /* 🌟 Poster Area (Horizontal Scroll for HD Quality) 🌟 */
        .content-wrapper { 
            padding: 10px; 
            overflow-x: auto; 
            -webkit-overflow-scrolling: touch; 
            justify-content: flex-start; /* సెంటర్ అలైన్మెంట్ తీసేసి స్క్రోల్ అవ్వడానికి లెఫ్ట్ కి మార్చాం */
        }
        .poster-board {
            margin: 0; /* స్క్రోల్ ఫ్రీ గా అవ్వడానికి మార్జిన్ ఆటో తీసేశాం */
        }
    }

  </style>

<body>

  <div class="controls-bar" data-html2canvas-ignore="true">
    <div class="filter-group">
      <div class="title-sec me-3">✈️ AIRWAYS: POSTER MAKER</div>
      <select id="distTypeDropdown" class="dist-select" onchange="processData()">
          <option value="OLD">Old Districts</option>
          <option value="NEW">New Districts</option>
      </select>
      <select id="distDropdown" class="dist-select" onchange="renderPoster()">
          <option value="">All AP (State Level)</option>
      </select>
    </div>

    <div class="filter-group">
      <span class="filter-label">Month:</span>
      <select id="periodDropdown" class="dist-select period-select" onchange="processData()">
          <option value="apr">APR-2026</option>
          <option value="may">MAY-2026</option>
          <option value="jun" selected>JUN-2026</option>
          <option value="jul">JUL-2026</option>
          <option value="aug">AUG-2026</option>
          <option value="sep">SEP-2026</option>
          <option value="oct">OCT-2026</option>
          <option value="nov">NOV-2026</option>
          <option value="dec">DEC-2026</option>
          <option value="jan">JAN-2027</option>
          <option value="feb">FEB-2027</option>
          <option value="mar">MAR-2027</option>
          <option value="srv2627">FY 26-27</option>
      </select>
      
      <button id="dlBtn" class="btn-custom btn-img ms-2" onclick="downloadPoster()">📸 Download Poster</button>
      <button id="fsBtn" class="btn-custom btn-full ms-1" onclick="toggleFullScreen()">⛶ Fullscreen</button>
    </div>
  </div>

  <div class="content-wrapper">
    <div class="poster-board theme-default" id="posterArea">
        
        <!-- 🌟 ఇక్కడే లోగోల మ్యాజిక్ జరుగుతుంది 🌟 -->
        <div class="logo-box left" onclick="document.getElementById('file-csc').click();" title="Click to upload CSC Logo">
            <img id="img-csc" src="" style="display:none;" class="poster-logo">
            <div id="csc-placeholder" class="logo-placeholder">➕ Upload logo.png</div>
        </div>
        <input type="file" id="file-csc" accept="image/*" style="display:none;" onchange="saveLogo(event, 'img-csc', 'csc-placeholder')">

        <div class="logo-box right" onclick="document.getElementById('file-safar').click();" title="Click to upload Safar Logo">
            <img id="img-safar" src="" style="display:none;" class="poster-logo">
            <div id="safar-placeholder" class="logo-placeholder">➕ Upload safar.png</div>
        </div>
        <input type="file" id="file-safar" accept="image/*" style="display:none;" onchange="saveLogo(event, 'img-safar', 'safar-placeholder')">

        <div class="poster-header">
            <h4 class="brand-title">🏆 CSC <span id="scopeText">ANDHRA PRADESH</span> 🏆</h4>
            <h1 class="main-title">AIRWAYS STARS OF THE MONTH</h1>
            <div class="congrats-title">🎉 CONGRATULATIONS 🎉</div>
            <div class="month-badge" id="monthBadgeText">JUN-2026</div>
        </div>

        <div id="posterContent">
            <div class="loader">⏳ Generating Poster Data...</div>
        </div>

        <div class="footer-text" id="footerDate"></div>
    </div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby4S9U-tUh14QeZDI17UsOIOoEi5DMgORTWYllh1knGoeZQS_IJoavZWZ6RDWsD5uls/exec";
    let loggedInDesig = localStorage.getItem("userDesignation") || "DM"; 
    let loggedInUserId = localStorage.getItem("userId") || ""; 
    let isDM = loggedInDesig.toUpperCase() === "DM" || loggedInDesig.toUpperCase().indexOf("DISTRICT MANAGER") !== -1;
    
    // 🌟 Cache Key Updated for Airways 🌟
    const CACHE_KEY = "TRAVEL_CACHE_V6_AIRWAYS_" + loggedInUserId;
    let rawData = [];
    let finalSortedData = [];

    const defaultAvatar = "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iI2NiZDVlMSI+PHBhdGggZD0iTTEyIDJDMi40OCAyIDAgNC40OCAwIDEyczQuNDggMTAgMTAgMTAgMTAtNC40OCAxMC0xMFMyMS41MiAyIDEyIDJ6bTAgM2MzLjMxIDAgNiA1LjA2IDYgOSAwIC4yNS0uMDIuNDktLjA2LjczLTEuMy0xLjk2LTMuNjMtMy4yMy01Ljk0LTMuNjMtMi4zMSAwLTQuNjQgMS4yNy01Ljk0IDMuMjMtLjA0LS4yNC0uMDYtLjQ4LS4wNi0uNzMgMC0zLjk0IDIuNjktOSA2LTl6bTAgMTMuNWMtMi41NiAwLTQuODEtMS4yNy02LjI1LTMuMjMgMS40NC0yLjAxIDMuNzUtMy4yNyA2LjI1LTMuMjdzNC44MSAxLjI2IDYuMjUgMy4yN2MtMS40NCAxLjk2LTMuNjkgMy4yMy02LjI1IDMuMjN6Ii8+PC9zdmc+";

    window.onload = async function() {
        const dateOptions = { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' };
        document.getElementById('footerDate').innerText = "Generated by CSC AP on: " + new Date().toLocaleDateString('en-US', dateOptions);
        
        let savedCsc = localStorage.getItem('saved_img-csc');
        if(savedCsc) {
            document.getElementById('img-csc').src = savedCsc;
            document.getElementById('img-csc').style.display = 'block';
            document.getElementById('csc-placeholder').style.display = 'none';
        }
        let savedSafar = localStorage.getItem('saved_img-safar');
        if(savedSafar) {
            document.getElementById('img-safar').src = savedSafar;
            document.getElementById('img-safar').style.display = 'block';
            document.getElementById('safar-placeholder').style.display = 'none';
        }

        let cachedObj = await getCachedData(CACHE_KEY);
        if(cachedObj && cachedObj.data && cachedObj.data.length > 0 && (Date.now() - cachedObj.timestamp < 10800000)) {
            rawData = cachedObj.data;
            processData();
        } else {
            fetchDataFromServer();
        }
    };

    window.saveLogo = function(event, imgId, placeholderId) {
        let file = event.target.files[0];
        if(file) {
            let reader = new FileReader();
            reader.onload = function(e) {
                let base64Data = e.target.result;
                document.getElementById(imgId).src = base64Data;
                document.getElementById(imgId).style.display = 'block';
                document.getElementById(placeholderId).style.display = 'none';
                localStorage.setItem('saved_' + imgId, base64Data);
            };
            reader.readAsDataURL(file);
        }
    }

    const DB_NAME = "CscTravelDB"; const STORE_NAME = "ReportsData";
    function openDB() { return new Promise((res, rej) => { let req = indexedDB.open(DB_NAME, 1); req.onupgradeneeded = (e) => { let db = e.target.result; if (!db.objectStoreNames.contains(STORE_NAME)) db.createObjectStore(STORE_NAME); }; req.onsuccess = (e) => res(e.target.result); req.onerror = (e) => rej(e.target.error); }); }
    async function getCachedData(key) { try { let db = await openDB(); return new Promise((res) => { let tx = db.transaction(STORE_NAME, "readonly"); let req = tx.objectStore(STORE_NAME).get(key); req.onsuccess = () => res(req.result); req.onerror = () => res(null); }); } catch(e) { return null; } }
    async function saveToCache(key, dataObj) { try { let db = await openDB(); let tx = db.transaction(STORE_NAME, "readwrite"); tx.objectStore(STORE_NAME).put({ data: dataObj, timestamp: Date.now() }, key); } catch(e) { console.error(e); } }

    function fetchDataFromServer() {
        // 🌟 Changed service to "AIRWAYS" 🌟
        fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "getTravelVlePerformance", service: "AIRWAYS", role: loggedInDesig, userId: loggedInUserId }) })
        .then(res => res.json()).then(res => { 
            if(res.success && res.data) { 
                rawData = res.data; 
                saveToCache(CACHE_KEY, rawData); 
                processData(); 
            } else { document.getElementById("posterContent").innerHTML = "<div class='loader'>⚠️ No Data Found.</div>"; }
        }).catch(e => { document.getElementById("posterContent").innerHTML = "<div class='loader text-danger'>📶 Network Error. Please refresh.</div>"; });
    }
    
    function toProperCase(str) { if (!str || str.trim() === "") return "Unknown"; return str.toLowerCase().replace(/\b\w/g, s => s.toUpperCase()); }

    function processData() {
        let isNew = document.getElementById("distTypeDropdown").value === "NEW";
        let periodKey = document.getElementById("periodDropdown").value;
        
        let posterElement = document.getElementById("posterArea");
        if(periodKey === "srv2627") posterElement.className = "poster-board theme-default";
        else if(periodKey === "may") posterElement.className = "poster-board theme-may";
        else if(periodKey === "jun") posterElement.className = "poster-board theme-jun";
        else if(periodKey === "jul") posterElement.className = "poster-board theme-jul";
        else if(periodKey === "aug") posterElement.className = "poster-board theme-aug";
        else if(["sep","oct","nov","dec"].includes(periodKey)) posterElement.className = "poster-board theme-neon";
        else posterElement.className = "poster-board theme-apr"; 

        let distSet = new Set();
        finalSortedData = [];

        rawData.forEach(r => {
            if (isNew && isDM && !r.isMyNewDist) return; 
            let distName = toProperCase((isNew ? r.newDist : r.oldDist).trim());
            if(distName === "Unknown") return;
            distSet.add(distName);

            let txns = parseFloat(r[periodKey]) || 0;
            if (txns > 0) {
                finalSortedData.push({ dist: distName, name: r.vleName || "CSC VLE", cscId: r.cscId || "-", txns: txns });
            }
        });

        finalSortedData.sort((a, b) => b.txns - a.txns);

        let distArr = Array.from(distSet).sort();
        let distDropdown = document.getElementById("distDropdown");
        let currentSelection = distDropdown.value;
        distDropdown.innerHTML = '<option value="">All AP (State Level)</option>';
        distArr.forEach(d => { distDropdown.innerHTML += `<option value="${d}">${d}</option>`; });
        distDropdown.value = currentSelection;

        renderPoster();
    }

    window.toggleFullScreen = function() {
        let fsBtn = document.getElementById("fsBtn");
        if (!document.fullscreenElement && !document.webkitFullscreenElement) { 
            let req = document.documentElement.requestFullscreen || document.documentElement.webkitRequestFullscreen;
            if(req) {
                req.call(document.documentElement).then(() => {
                    fsBtn.innerHTML = "⛶ Exit Fullscreen"; 
                    fsBtn.classList.remove("btn-full");
                    fsBtn.classList.add("btn-exit-full");
                }).catch(e => { console.log(e); });
            }
        } else { 
            let exit = document.exitFullscreen || document.webkitExitFullscreen;
            if(exit) {
                exit.call(document).then(() => {
                    fsBtn.innerHTML = "⛶ Fullscreen"; 
                    fsBtn.classList.remove("btn-exit-full");
                    fsBtn.classList.add("btn-full");
                }).catch(e => { console.log(e); });
            }
        }
    };
    
    function updateFsButton() {
        let fsBtn = document.getElementById("fsBtn");
        if (document.fullscreenElement || document.webkitFullscreenElement) { 
            fsBtn.innerHTML = "⛶ Exit Fullscreen"; 
            fsBtn.classList.remove("btn-full");
            fsBtn.classList.add("btn-exit-full"); 
        } else { 
            fsBtn.innerHTML = "⛶ Fullscreen"; 
            fsBtn.classList.remove("btn-exit-full");
            fsBtn.classList.add("btn-full"); 
        }
    }
    document.addEventListener('fullscreenchange', updateFsButton);
    document.addEventListener('webkitfullscreenchange', updateFsButton);

    window.loadPhoto = function(event, imgId) {
        let file = event.target.files[0];
        if(file) {
            let reader = new FileReader();
            reader.onload = function(e) { document.getElementById(imgId).src = e.target.result; };
            reader.readAsDataURL(file);
        }
    }

    function renderPoster() {
        let dropDownVal = document.getElementById("distDropdown").value;
        let pText = document.getElementById("periodDropdown").options[document.getElementById("periodDropdown").selectedIndex].text;
        
        let filtered = finalSortedData.filter(d => (dropDownVal === "" || d.dist === dropDownVal));

        if (filtered.length === 0) {
            document.getElementById("posterContent").innerHTML = `<div class="loader" style="color:#0284c7;">⚠️ No Transactions Found.</div>`;
            return;
        }

        let scopeText = dropDownVal === "" ? "ANDHRA PRADESH" : dropDownVal.toUpperCase() + " DISTRICT";

        document.getElementById("scopeText").innerText = scopeText;
        document.getElementById("monthBadgeText").innerText = pText;

        let html = `<div class="podium-container">`;

        // Rank 2
        if(filtered[1]) {
            html += `<div class="podium-wrapper wrapper-rank2">
                        <div class="photo-area" onclick="document.getElementById('file-r2').click();">
                            <span class="upload-hint">Upload Photo</span>
                            <img id="img-r2" src="${defaultAvatar}" class="vle-photo">
                            <div class="rank-badge">2</div>
                        </div>
                        <input type="file" id="file-r2" accept="image/*" style="display:none;" onchange="loadPhoto(event, 'img-r2')">
                        <div class="podium-card">
                            <div class="vle-name">${filtered[1].name.substring(0,20)}</div>
                            <div class="vle-dist">${filtered[1].dist}</div>
                            <div class="vle-cscid">${filtered[1].cscId}</div>
                            <div class="vle-txns">${filtered[1].txns} TXNS</div>
                        </div>
                     </div>`;
        } else { html += `<div class="podium-wrapper" style="opacity:0;"></div>`; }

        // Rank 1
        if(filtered[0]) {
            html += `<div class="podium-wrapper wrapper-rank1">
                        <div class="photo-area" onclick="document.getElementById('file-r1').click();">
                            <span class="upload-hint">Upload Photo</span>
                            <img id="img-r1" src="${defaultAvatar}" class="vle-photo">
                            <div class="rank-badge">1</div>
                        </div>
                        <input type="file" id="file-r1" accept="image/*" style="display:none;" onchange="loadPhoto(event, 'img-r1')">
                        <div class="podium-card">
                            <div class="vle-name">${filtered[0].name.substring(0,20)}</div>
                            <div class="vle-dist">${filtered[0].dist}</div>
                            <div class="vle-cscid">${filtered[0].cscId}</div>
                            <div class="vle-txns">${filtered[0].txns} TXNS</div>
                        </div>
                     </div>`;
        }

        // Rank 3
        if(filtered[2]) {
            html += `<div class="podium-wrapper wrapper-rank3">
                        <div class="photo-area" onclick="document.getElementById('file-r3').click();">
                            <span class="upload-hint">Upload Photo</span>
                            <img id="img-r3" src="${defaultAvatar}" class="vle-photo">
                            <div class="rank-badge">3</div>
                        </div>
                        <input type="file" id="file-r3" accept="image/*" style="display:none;" onchange="loadPhoto(event, 'img-r3')">
                        <div class="podium-card">
                            <div class="vle-name">${filtered[2].name.substring(0,20)}</div>
                            <div class="vle-dist">${filtered[2].dist}</div>
                            <div class="vle-cscid">${filtered[2].cscId}</div>
                            <div class="vle-txns">${filtered[2].txns} TXNS</div>
                        </div>
                     </div>`;
        } else { html += `<div class="podium-wrapper" style="opacity:0;"></div>`; }

        html += `</div>`;

        // 🌟 టాప్ 5 (Rank 4 & 5) గ్రిడ్ 🌟
        if(filtered.length > 3) {
            html += `<div class="runners-title">⭐ SUPER STAR PERFORMERS ⭐</div><div class="runners-grid">`;
            let limit = filtered.length > 5 ? 5 : filtered.length; 
            for(let i=3; i<limit; i++) {
                html += `
                <div class="runner-item">
                    <div class="r-left">
                        <div class="r-rank">#${i+1}</div>
                        <div class="r-details">
                            <div class="r-name">${filtered[i].name.substring(0,22)}</div>
                            <div class="r-sub-info">
                                <div class="r-dist">${filtered[i].dist}</div>
                                <div class="r-cscid">${filtered[i].cscId}</div>
                            </div>
                        </div>
                    </div>
                    <div class="r-txns">${filtered[i].txns}</div>
                </div>`;
            }
            html += `</div>`;
        }

        document.getElementById("posterContent").innerHTML = html;
    }

    function downloadPoster() {
       let btn = document.getElementById('dlBtn');
       let originalText = btn.innerHTML;
       
       btn.innerHTML = "⏳ Generating...";
       btn.disabled = true;

       let captureArea = document.getElementById('posterArea');
       document.documentElement.classList.add("exporting");
       
       setTimeout(() => {
           html2canvas(captureArea, { scale: 3, useCORS: true, backgroundColor: null, scrollY: 0, windowWidth: captureArea.scrollWidth, windowHeight: captureArea.scrollHeight })
           .then(canvas => {
              document.documentElement.classList.remove("exporting");
              
              try {
                  let dataUrl = canvas.toDataURL("image/png");
                  let link = document.createElement('a');
                  let mText = document.getElementById("periodDropdown").options[document.getElementById("periodDropdown").selectedIndex].text;
                  link.download = `AIRWAYS_Top_Performers_${mText}.png`; 
                  link.href = dataUrl; 
                  link.click();

                  btn.innerHTML = "✅ Downloaded!";
              } catch(e) {
                  console.error(e);
                  alert("⚠️ బ్రౌజర్ సెక్యూరిటీ ఎర్రర్: దయచేసి 'Upload logo' బాక్స్ మీద క్లిక్ చేసి మీ ఇమేజ్ సెలెక్ట్ చేయండి.");
                  btn.innerHTML = "❌ Failed";
              }
              
              setTimeout(() => { btn.innerHTML = originalText; btn.disabled = false; }, 3000);
           })
           .catch(err => {
              document.documentElement.classList.remove("exporting");
              alert("⚠️ Error generating poster.");
              btn.innerHTML = originalText;
              btn.disabled = false;
           });
       }, 500); 
    }
  </script>
