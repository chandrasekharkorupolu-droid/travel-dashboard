<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRCTC Total Registrations Status</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f1f5f9; display: flex; flex-direction: column; height: 100vh; overflow: hidden; padding: 15px; gap: 12px; }

        .top-controls {
            display: flex; justify-content: space-between; align-items: center; background-color: #ffffff; 
            padding: 12px 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; flex-shrink: 0;
        }
        .page-heading { font-size: 18px; color: #ea580c; font-weight: 800; display: flex; align-items: center; gap: 8px; text-transform: uppercase;}
        
        .filter-group { display: flex; gap: 10px; align-items: center; }
        .filter-label { font-size: 13px; font-weight: 800; color: #64748b; margin-right: 5px; }
        .filter-group select { padding: 8px 12px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 13px; outline: none; background-color: #f8fafc; font-weight: 700; cursor: pointer; color: #334155;}
        
        .btn-action { background-color: #f1f5f9; color: #475569; border: 1px solid #cbd5e1; padding: 8px 12px; border-radius: 6px; font-size: 13px; font-weight: 800; cursor: pointer; transition: 0.2s; box-shadow: 0 2px 0 #e2e8f0; display: flex; align-items: center; gap: 5px;}
        .btn-action:active { transform: translateY(2px); box-shadow: 0 0 0 transparent; }
        .btn-action:hover { background-color: #e2e8f0; color: #1e293b;}

        .report-wrapper { 
            flex: 1; 
            background-color: #ffffff; 
            border-radius: 8px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.05); 
            border: 1px solid #e2e8f0; 
            overflow: auto; 
            position: relative;
        }
        
        .report-header { 
            text-align: center; 
            border-bottom: 2px dashed #cbd5e1; 
            background-color: #ffffff;
            position: sticky; 
            top: 0; 
            left: 0;
            padding-top: 15px;
            padding-bottom: 10px;
            z-index: 100;
            height: 70px;
            width: 100%;
        }
        .report-header h2 { color: #1e293b; font-size: 20px; font-weight: 900; margin-bottom: 3px; text-transform: uppercase; letter-spacing: 1px; }
        .report-header p { color: #ea580c; font-size: 13px; font-weight: 700; }

        .table-container { 
            width: 100%; 
            padding: 0 20px;
        }
        table { width: 100%; border-collapse: separate; border-spacing: 0; min-width: 1000px; }
        
        th { 
            background-color: #ea580c; 
            color: #ffffff; 
            font-size: 11px; 
            text-transform: uppercase; 
            padding: 12px 10px; 
            text-align: center; 
            font-weight: 800; 
            letter-spacing: 0.5px;
            position: sticky; 
            top: 70px; 
            z-index: 90; 
        }
        td { padding: 10px; font-size: 12px; color: #334155; border-bottom: 1px solid #f1f5f9; text-align: center; font-weight: 600;}

        th:first-child { position: sticky; left: 20px; top: 70px; z-index: 95; background-color: #ea580c; border-right: 1px solid #c2410c; }
        td:first-child { position: sticky; left: 20px; background-color: #ffffff; z-index: 10; font-weight: 800; color: #0f172a; border-right: 1px solid #e2e8f0; text-align: left; padding-left: 15px; cursor: pointer;}
        td:first-child:hover { background-color: #fff7ed !important; color: #ea580c; }
        
        tbody tr:nth-child(even) td { background-color: #f8fafc; }
        tbody tr:nth-child(even) td:first-child { background-color: #f8fafc; }
        tbody tr:hover td { background-color: #fff7ed !important; }

        tr.total-row td { background-color: #fff7ed !important; font-weight: 900; color: #ea580c; border-top: 2px solid #ea580c; font-size: 13px; position: sticky; bottom: 0; z-index: 20;}
        tr.total-row td:first-child { background-color: #fff7ed !important; position: sticky; left: 20px; z-index: 30; }

        .charts-container { display: flex; gap: 20px; margin-top: 30px; padding: 0 20px 20px 20px; flex-wrap: wrap; justify-content: center;}
        .chart-box { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.02); flex: 1; min-width: 400px; max-width: 600px; display: flex; flex-direction: column;}
        .chart-title { text-align: center; font-size: 14px; font-weight: 800; color: #475569; margin-bottom: 15px; text-transform: uppercase;}
        .canvas-wrapper { position: relative; height: 300px; width: 100%; }

        .loader-row td { text-align: center; padding: 40px !important; font-size: 15px; color: #ea580c; font-weight: 700; }
        .spinner { display: inline-block; width: 22px; height: 22px; border: 3px solid #cbd5e1; border-top-color: #ea580c; border-radius: 50%; animation: spin 1s linear infinite; vertical-align: middle; margin-right: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>

</head>
<body>

    <div class="top-controls">
        <div class="page-heading">📋 Total Registrations</div>
        <div class="filter-group">
            <span class="filter-label">Filter:</span>
            <select id="districtType" onchange="updateDistrictsDropdown()">
                <option value="old" selected>Old Districts</option>
                <option value="new">New Districts</option>
            </select>
            <select id="districtName" onchange="loadReportData()">
                <option value="All">All Districts</option>
            </select>
            <button class="btn-action" onclick="resetFilters()">↺ Reset</button>
            <button class="btn-action" onclick="refreshData()" style="color: #2563eb; border-color: #bfdbfe; background-color: #eff6ff;">🔄 Refresh Data</button>
            <button class="btn-action" onclick="downloadReportImage()" id="downloadBtn">📸 Download Image</button>
            <button class="btn-action" id="fullscreenBtn" onclick="toggleFullScreen()">⛶ Full Screen</button>
        </div>
    </div>

    <div id="printableReport" class="report-wrapper">
        <div class="report-header">
            <h2>CSC AP – IRCTC Total Registrations Status</h2>
            <p id="reportDate">Report Generated on: Loading...</p>
        </div>

        <div class="table-container" id="reportTableContainer">
            <table>
                <thead>
                    <tr>
                        <th title="Double click to filter">District ⇅</th>
                        <th>Total Registrations</th>
                        <th>FY 17-22</th>
                        <th>FY 22-23</th>
                        <th>FY 23-24</th>
                        <th>FY 24-25</th>
                        <th>FY 25-26</th>
                        <th>FY 26-27</th>
                    </tr>
                </thead>
                <tbody id="reportTableBody">
                    <tr class="loader-row"><td colspan="8"><div class="spinner"></div>Loading Data... Please Wait</td></tr>
                </tbody>
            </table>
        </div>

        <div class="charts-container" id="chartsArea" style="display: none;">
            <div class="chart-box">
                <div class="chart-title">Year-Wise Registrations Trend</div>
                <div class="canvas-wrapper">
                    <canvas id="trendBarChart"></canvas>
                </div>
            </div>
            <div class="chart-box">
                <div class="chart-title">Registrations Share by FY</div>
                <div class="canvas-wrapper">
                    <canvas id="sharePieChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        const apiURL = "https://script.google.com/macros/s/AKfycby4S9U-tUh14QeZDI17UsOIOoEi5DMgORTWYllh1knGoeZQS_IJoavZWZ6RDWsD5uls/exec";
        
        let globalVleData = [];
        let oldDistrictsSet = new Set();
        let newDistrictsSet = new Set();
        let pieChartInstance = null;
        let barChartInstance = null;
        
        let dmAssignedOldDistrict = ""; // 🌟 DM Old District

        function setReportDate() {
            const options = { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' };
            const today = new Date().toLocaleDateString('en-US', options);
            document.getElementById('reportDate').innerText = "Report Generated on: " + today;
        }

        // 🌟 పేరు మ్యాచ్ చేసే బ్రహ్మాస్త్రం 🌟
        function isNameMatch(sheetName, loginName) {
            if (!sheetName || !loginName) return false;
            let sClean = sheetName.toLowerCase().replace(/\s+/g, ' ').trim();
            let lClean = loginName.toLowerCase().replace(/\s+/g, ' ').trim();
            if (sClean === lClean) return true;
            if (lClean.length > 5 && sClean.includes(lClean)) return true;
            if (sClean.length > 5 && lClean.includes(sClean)) return true;
            return false;
        }

        window.onload = function() {
            setReportDate();
            document.getElementById("districtType").value = "old";
            fetchSheetData();
        };

        // 🌟🌟🌟 THE FAST LOADING (CACHE) FIX 🌟🌟🌟
        async function fetchSheetData() {
            document.getElementById("reportTableBody").innerHTML = "<tr class='loader-row'><td colspan='8'><div class='spinner'></div> Fetching Live Data...</td></tr>";
            
            try {
                let cachedData = localStorage.getItem("cscGlobalData");
                let cachedUsersData = localStorage.getItem("cscUsersData");
                
                let rawData = null;
                let usersData = null;

                if (cachedData && cachedUsersData) {
                    rawData = JSON.parse(cachedData);
                    usersData = JSON.parse(cachedUsersData);
                } else {
                    let [resData, resUsers] = await Promise.all([
                        fetch(apiURL),
                        fetch(apiURL + "?sheet=Users").catch(() => null)
                    ]);
                    
                    rawData = await resData.json();
                    usersData = resUsers ? await resUsers.json() : null;
                    
                    localStorage.setItem("cscGlobalData", JSON.stringify(rawData));
                    if(usersData) localStorage.setItem("cscUsersData", JSON.stringify(usersData));
                }

                let loggedInUserId = (localStorage.getItem("userId") || "").trim();
                let userDesignation = localStorage.getItem("userDesignation") || "State Head";

                if (userDesignation === "District Manager" && loggedInUserId !== "" && usersData && usersData.length > 0) {
                    let uHeaders = usersData[0].map(h => h.toString().toLowerCase().replace(/[^a-z0-9]/g, ''));
                    let idxUid = uHeaders.findIndex(h => h === 'userid' || h === 'user');
                    let idxDist = uHeaders.findIndex(h => h === 'district'); 

                    if (idxUid > -1 && idxDist > -1) {
                        for(let i=1; i<usersData.length; i++) {
                            let sheetUid = (usersData[i][idxUid] || '').toString().trim();
                            if (sheetUid === loggedInUserId) {
                                dmAssignedOldDistrict = (usersData[i][idxDist] || '').toString().trim();
                                break; 
                            }
                        }
                    }
                }

                if(rawData && rawData.length > 0) {
                    processDataOnce(rawData);
                } else {
                    throw new Error("Empty Data Found");
                }
            } catch (error) {
                console.error("Error loading data:", error);
                document.getElementById("reportTableBody").innerHTML = "<tr><td colspan='8' style='color:red; text-align:center; padding: 20px;'>❌ Error connecting to Google Sheet. Please check the internet or API link.</td></tr>";
            }
        }

        function refreshData() {
            localStorage.removeItem("cscGlobalData");
            localStorage.removeItem("cscUsersData");
            dmAssignedOldDistrict = "";
            fetchSheetData();
        }

        // 🌟 డేట్ నుండి FY కనిపెట్టే ఫంక్షన్ 🌟
        function parseDateToFY(dateStr) {
            if (!dateStr) return null;
            let s = dateStr.toString().trim().split(' ')[0]; 
            let parts = s.split(/[-/]/);
            if (parts.length === 3) {
                let p1 = parts[0], p2 = parts[1], p3 = parts[2];
                let y, m;
                if (p1.length === 4) { y = p1; m = p2; }
                else if (p3.length === 4 || p3.length === 2) { 
                    y = p3; m = p2; 
                    if(y.length === 2) y = "20" + y;
                } else return null;
                
                let monthNames = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];
                let mIndex = monthNames.findIndex(month => m.toString().toUpperCase().includes(month));
                if (mIndex > -1) m = mIndex + 1;
                else m = parseInt(m, 10);
                
                y = parseInt(y, 10);
                if (y > 2000 && y < 2100 && m >= 1 && m <= 12) {
                    let fy = m >= 4 ? y : y - 1;
                    if (fy <= 2021) return "FY 17-22";
                    if (fy === 2022) return "FY 22-23";
                    if (fy === 2023) return "FY 23-24";
                    if (fy === 2024) return "FY 24-25";
                    if (fy === 2025) return "FY 25-26";
                    if (fy >= 2026) return "FY 26-27";
                }
            }
            
            let d = new Date(dateStr);
            if (!isNaN(d.getTime())) {
                let y = d.getFullYear();
                let m = d.getMonth() + 1;
                let fy = m >= 4 ? y : y - 1;
                if (fy <= 2021) return "FY 17-22";
                if (fy === 2022) return "FY 22-23";
                if (fy === 2023) return "FY 23-24";
                if (fy === 2024) return "FY 24-25";
                if (fy === 2025) return "FY 25-26";
                if (fy >= 2026) return "FY 26-27";
            }
            return null;
        }

        function processDataOnce(rawData) {
            let cleanHeaders = rawData[0].map(h => h ? h.toString().toLowerCase().replace(/[^a-z0-9]/g, '') : '');
            
            let idxcscid = cleanHeaders.findIndex(h => h.includes('cscid'));
            let idxolddist = cleanHeaders.findIndex(h => h.includes('olddistrict') || h === 'district');
            let idxnewdist = cleanHeaders.findIndex(h => h.includes('newdistrict'));
            let idxempname = cleanHeaders.findIndex(h => h.includes('employeename') || h.includes('empname'));
            
            let idxRegFy = cleanHeaders.findIndex(h => h === 'registrationfy' || h === 'regfy');
            let idxRegDate = cleanHeaders.findIndex(h => h.includes('date') || h.includes('reg') || h.includes('created') || h.includes('activation'));

            globalVleData = [];
            oldDistrictsSet.clear();
            newDistrictsSet.clear();

            for (let i = 1; i < rawData.length; i++) {
                let row = rawData[i];
                let cscId = idxcscid > -1 ? row[idxcscid] : '';
                if (!cscId || cscId === '-') continue;

                let oldD = idxolddist > -1 ? row[idxolddist] : '';
                oldD = oldD ? oldD.toString().trim() : 'Unknown';
                let newD = idxnewdist > -1 ? row[idxnewdist] : '';
                newD = newD ? newD.toString().trim() : 'Unknown';
                let dmName = idxempname > -1 ? (row[idxempname] || '').toString().trim() : '';

                if (oldD !== 'Unknown' && oldD !== '-') oldDistrictsSet.add(oldD);
                if (newD !== 'Unknown' && newD !== '-') newDistrictsSet.add(newD);

                let regFyStr = "";
                
                // 1. డైరెక్ట్ గా కాలమ్ పేరు 'Registration FY' ఉంటే..
                if (idxRegFy > -1 && row[idxRegFy]) {
                    regFyStr = row[idxRegFy].toString().toUpperCase();
                } 
                
                // 2. వరుసలో ఎక్కడైనా "FY " అని రాసి ఉంటే పట్టుకో..
                if (!regFyStr.includes("FY")) {
                    for(let col of row) {
                        let str = (col||"").toString().toUpperCase();
                        if (str.includes("FY 17-22") || str.includes("FY 22-23") || str.includes("FY 23-24") || str.includes("FY 24-25") || str.includes("FY 25-26") || str.includes("FY 26-27")) {
                            regFyStr = str;
                            break;
                        }
                    }
                }

                // 3. డేట్ ని బట్టి ఇయర్ ని కాలిక్యులేట్ చెయ్
                if (!regFyStr || !regFyStr.includes("FY")) {
                    if (idxRegDate > -1 && row[idxRegDate]) {
                        let parsedFY = parseDateToFY(row[idxRegDate]);
                        if (parsedFY) regFyStr = parsedFY;
                    }
                }

                // 4. పైన ఏదీ వర్కవుట్ అవ్వకపోతే, ప్రతి సెల్ ని చెక్ చెయ్
                if (!regFyStr || !regFyStr.includes("FY")) {
                    for(let j=0; j<row.length; j++) {
                        let parsedFY = parseDateToFY(row[j]);
                        if (parsedFY) {
                            regFyStr = parsedFY;
                            break;
                        }
                    }
                }

                if (!regFyStr) regFyStr = "FY 17-22"; // Default fallback

                globalVleData.push({
                    district_old: oldD,
                    district_new: newD,
                    dmname: dmName,
                    fy_category: regFyStr
                });
            }
            updateDistrictsDropdown();
        }

        // 🌟🌟🌟 THE ABSOLUTE DISPLAY FILTERING FIX 🌟🌟🌟
        function isRowAllowedForDM(row, distType, loggedInUserName) {
            if (distType === 'old') {
                if (!dmAssignedOldDistrict) return false; 
                return row.district_old.toLowerCase() === dmAssignedOldDistrict.toLowerCase();
            } else {
                return isNameMatch(row.dmname, loggedInUserName);
            }
        }

        function updateDistrictsDropdown() {
            const type = document.getElementById("districtType").value || "old"; 
            const distDropdown = document.getElementById("districtName");
            let userDesignation = localStorage.getItem("userDesignation") || "State Head";
            let loggedInUser = localStorage.getItem("userName") || "";

            distDropdown.innerHTML = '<option value="All">All Districts</option>';
            
            let arr = [];
            
            if (userDesignation === "District Manager") {
                 if (type === 'old') {
                     if (dmAssignedOldDistrict) arr.push(dmAssignedOldDistrict);
                 } else {
                     let myNewDists = new Set();
                     globalVleData.forEach(row => {
                         if (isNameMatch(row.dmname, loggedInUser) && row.district_new !== 'Unknown' && row.district_new !== '-') {
                             myNewDists.add(row.district_new);
                         }
                     });
                     arr = Array.from(myNewDists).sort();
                 }
            } else {
                 arr = type === "old" ? Array.from(oldDistrictsSet).sort() : Array.from(newDistrictsSet).sort();
            }

            arr.forEach(dist => { if(dist) distDropdown.innerHTML += `<option value="${dist}">${dist}</option>`; });
            
            loadReportData(); 
        }

        function loadReportData() {
            let distType = document.getElementById('districtType').value;
            let distKey = distType === 'old' ? 'district_old' : 'district_new';
            let selectedDist = document.getElementById('districtName').value; 
            let userDesignation = localStorage.getItem("userDesignation") || "State Head";
            let loggedInUser = localStorage.getItem("userName") || "";

            let summaryMap = {};
            let gt = { total: 0, fy17_22: 0, fy22_23: 0, fy23_24: 0, fy24_25: 0, fy25_26: 0, fy26_27: 0 };

            globalVleData.forEach(row => {
                let dist = row[distKey];
                if (!dist || dist === 'Unknown' || dist === '-') return;

                // 🌟 DM ఫిల్టర్ అప్లై చేస్తున్నాం 🌟
                if (userDesignation === "District Manager") {
                    if (!isRowAllowedForDM(row, distType, loggedInUser)) return;
                }

                if (selectedDist !== "All" && dist !== selectedDist) return;

                if (!summaryMap[dist]) {
                    summaryMap[dist] = { total: 0, fy17_22: 0, fy22_23: 0, fy23_24: 0, fy24_25: 0, fy25_26: 0, fy26_27: 0 };
                }

                summaryMap[dist].total++;
                gt.total++;

                let fy = row.fy_category;
                if (fy.includes("17-22") || fy.includes("2017") || fy.includes("2021")) { summaryMap[dist].fy17_22++; gt.fy17_22++; }
                else if (fy.includes("22-23")) { summaryMap[dist].fy22_23++; gt.fy22_23++; }
                else if (fy.includes("23-24")) { summaryMap[dist].fy23_24++; gt.fy23_24++; }
                else if (fy.includes("24-25")) { summaryMap[dist].fy24_25++; gt.fy24_25++; }
                else if (fy.includes("25-26")) { summaryMap[dist].fy25_26++; gt.fy25_26++; }
                else if (fy.includes("26-27")) { summaryMap[dist].fy26_27++; gt.fy26_27++; }
                else { summaryMap[dist].fy17_22++; gt.fy17_22++; } 
            });

            let sortedDistricts = Object.keys(summaryMap).sort();
            let html = "";
            
            sortedDistricts.forEach(dist => {
                let s = summaryMap[dist];
                html += `<tr>
                    <td ondblclick="filterByDistrict('${dist}')" title="Double click to filter">${dist}</td>
                    <td style="color:#0f172a; font-weight:800; font-size:13px;">${s.total}</td>
                    <td>${s.fy17_22}</td>
                    <td>${s.fy22_23}</td>
                    <td>${s.fy23_24}</td>
                    <td>${s.fy24_25}</td>
                    <td>${s.fy25_26}</td>
                    <td style="color:#16a34a; font-weight:800;">${s.fy26_27}</td>
                </tr>`;
            });

            if(sortedDistricts.length === 0) {
                html = `<tr><td colspan="8" style="padding:30px; text-align:center; color:#dc2626; font-weight:bold;">No data found matching your filter!</td></tr>`;
                document.getElementById("chartsArea").style.display = "none";
            } else {
                html += `<tr class="total-row">
                    <td>GRAND TOTAL</td>
                    <td>${gt.total}</td>
                    <td>${gt.fy17_22}</td>
                    <td>${gt.fy22_23}</td>
                    <td>${gt.fy23_24}</td>
                    <td>${gt.fy24_25}</td>
                    <td>${gt.fy25_26}</td>
                    <td>${gt.fy26_27}</td>
                </tr>`;
                document.getElementById("chartsArea").style.display = "flex";
                renderCharts(gt);
            }

            document.getElementById("reportTableBody").innerHTML = html;
        }

        function filterByDistrict(distName) {
            let distDropdown = document.getElementById("districtName");
            if (distDropdown.value === distName) { distDropdown.value = "All"; } else { distDropdown.value = distName; }
            loadReportData();
        }

        function resetFilters() {
            document.getElementById("districtType").value = "old";
            updateDistrictsDropdown();
        }

        function renderCharts(totals) {
            let ctxBar = document.getElementById('trendBarChart').getContext('2d');
            if(barChartInstance) barChartInstance.destroy();

            barChartInstance = new Chart(ctxBar, {
                type: 'bar',
                data: {
                    labels: ['FY 17-22', 'FY 22-23', 'FY 23-24', 'FY 24-25', 'FY 25-26', 'FY 26-27'],
                    datasets: [{
                        label: 'Registrations',
                        data: [totals.fy17_22, totals.fy22_23, totals.fy23_24, totals.fy24_25, totals.fy25_26, totals.fy26_27],
                        backgroundColor: ['#94a3b8', '#3b82f6', '#8b5cf6', '#ec4899', '#f59e0b', '#16a34a']
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true } }, plugins: { legend: { display: false } } }
            });

            let ctxPie = document.getElementById('sharePieChart').getContext('2d');
            if(pieChartInstance) pieChartInstance.destroy();
            
            pieChartInstance = new Chart(ctxPie, {
                type: 'pie',
                data: {
                    labels: ['FY 17-22', 'FY 22-23', 'FY 23-24', 'FY 24-25', 'FY 25-26', 'FY 26-27'],
                    datasets: [{
                        data: [totals.fy17_22, totals.fy22_23, totals.fy23_24, totals.fy24_25, totals.fy25_26, totals.fy26_27],
                        backgroundColor: ['#94a3b8', '#3b82f6', '#8b5cf6', '#ec4899', '#f59e0b', '#16a34a'],
                        borderWidth: 2
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: {font: {family: 'Segoe UI', weight: 'bold'}} } } }
            });
        }

        function downloadReportImage() {
            let reportElement = document.getElementById('printableReport');
            let btn = document.getElementById("downloadBtn");
            let originalText = btn.innerHTML;
            
            btn.innerHTML = "⏳ Processing...";
            btn.style.opacity = "0.7";
            
            let originalOverflow = reportElement.style.overflow;
            let originalHeight = reportElement.style.height;
            
            reportElement.style.overflow = 'visible';
            reportElement.style.height = 'auto';

            setTimeout(() => {
                html2canvas(reportElement, { 
                    scale: 2, 
                    backgroundColor: "#ffffff",
                    windowWidth: reportElement.scrollWidth,
                    windowHeight: reportElement.scrollHeight
                }).then(canvas => {
                    let link = document.createElement('a'); 
                    link.download = 'IRCTC_Total_Registrations.png';
                    link.href = canvas.toDataURL('image/png');
                    link.click();

                    reportElement.style.overflow = originalOverflow;
                    reportElement.style.height = originalHeight;
                    btn.innerHTML = originalText;
                    btn.style.opacity = "1";
                });
            }, 300);
        }

        function toggleFullScreen() {
            try {
                let btn = document.getElementById("fullscreenBtn");
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen();
                    btn.innerHTML = "✖ Exit Full Screen";
                    btn.style.backgroundColor = "#ea580c"; btn.style.color = "white"; btn.style.borderColor = "#ea580c";
                } else {
                    if (document.exitFullscreen) {
                        document.exitFullscreen();
                        btn.innerHTML = "⛶ Full Screen";
                        btn.style.backgroundColor = "#f1f5f9"; btn.style.color = "#475569"; btn.style.borderColor = "#cbd5e1";
                    }
                }
            } catch (e) { console.log("Fullscreen not supported"); }
        }
    </script>
</body>
</html>
