<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    /* 🌟 మాస్టర్ టెంప్లేట్ సెట్టింగ్స్ 🌟 */
    body { background-color: #f0f9ff; font-family: 'Segoe UI', Tahoma, sans-serif; padding: 15px; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    
    .controls-bar { background: white; border-radius: 10px; padding: 12px 15px; box-shadow: 0 4px 10px rgba(2, 132, 199, 0.05); border: 1px solid #bae6fd; display: flex; flex-wrap: nowrap; justify-content: space-between; align-items: center; gap: 15px; margin-bottom: 15px; flex-shrink: 0; }
    .title-sec { font-size: 16px; font-weight: 900; color: #0284c7; display: flex; align-items: center; gap: 8px; text-transform: uppercase; white-space: nowrap; }
    
    .filter-group { display: flex; align-items: center; gap: 10px; flex: 1; justify-content: center; }
    .radio-group { display: flex; gap: 10px; font-weight: 700; color: #475569; font-size: 13px; margin-right: 10px;}
    .radio-group label { cursor: pointer; display: flex; align-items: center; gap: 4px; }
    
    .dist-select { border: 1px solid #7dd3fc; border-radius: 6px; padding: 6px 12px; font-size: 13px; font-weight: bold; outline: none; width: 180px; color: #0f172a; background-color: white; }
    .search-box { border: 1px solid #7dd3fc; border-radius: 6px; padding: 6px 12px; font-size: 13px; font-weight: bold; outline: none; width: 180px; transition: 0.2s; }
    .search-box:focus, .dist-select:focus { border-color: #0284c7; box-shadow: 0 0 0 3px rgba(2, 132, 199, 0.15); }
    
    .btn-custom { font-size: 13px; font-weight: 800; padding: 6px 12px; border-radius: 6px; transition: 0.2s; display: flex; align-items: center; gap: 6px; border: 1px solid transparent; white-space: nowrap; cursor: pointer;}
    .btn-reset { background: #f1f5f9; color: #475569; border-color: #cbd5e1; } .btn-reset:hover { background: #e2e8f0; }
    .btn-export { background: #dcfce7; color: #16a34a; border-color: #86efac; } .btn-export:hover { background: #86efac; color: #064e3b; }
    .btn-img { background: #e0e7ff; color: #0284c7; border-color: #7dd3fc; } .btn-img:hover { background: #7dd3fc; color: #0c4a6e; }
    .btn-full { background: #f8fafc; color: #0f172a; border-color: #94a3b8; } .btn-full:hover { background: #e2e8f0; }
    .btn-exit-full { background: #fee2e2 !important; color: #dc2626 !important; border-color: #fca5a5 !important; } .btn-exit-full:hover { background: #fecaca !important; }

    .content-wrapper { flex: 1; display: flex; flex-direction: column; background: white; padding: 15px 15px 0 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(2, 132, 199, 0.05); border: 1px solid #bae6fd; overflow: hidden; }
    
    .report-main-header { text-align: center; margin-bottom: 10px; flex-shrink: 0; }
    .report-main-title { color: #0f172a; font-weight: 900; margin: 0; font-size: 20px; letter-spacing: 1px; text-transform: uppercase;}
    .report-date-text { color: #ea580c; font-weight: 800; margin: 5px 0 0 0; font-size: 13px; }

    .scrollable-area { flex: 1; overflow-y: auto; overflow-x: auto; padding-right: 5px; padding-bottom: 20px; scroll-behavior: smooth;}
    
    table { width: 100%; border-collapse: collapse; font-size: 11px; white-space: nowrap; }
    
    /* స్టిక్కీ హెడ్డింగ్స్ */
    thead { position: sticky; top: -1px; z-index: 10; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    th, td { border-left: none !important; border-right: none !important; }
    thead th { vertical-align: middle; text-align: center; font-weight: 900; padding: 8px 10px; font-size: 12px; border-bottom: 2px solid rgba(255,255,255,0.2) !important;}
    
    /* కార్పొరేట్ కలర్ థీమ్ (Airways Blue Theme Adjustments) */
    .th-main { background-color: #0284c7 !important; color: #ffffff !important; }
    .th-month { background-color: #475569 !important; color: #ffffff !important; }
    .th-q1 { background-color: #7e22ce !important; color: #ffffff !important; } 
    .th-q2 { background-color: #059669 !important; color: #ffffff !important; } 
    .th-hy { background-color: #0f766e !important; color: #ffffff !important; } 
    .th-tot { background-color: #0369a1 !important; color: #ffffff !important; } 
    .th-yet { background-color: #ea580c !important; color: #ffffff !important; } 
    .th-ina { background-color: #64748b !important; color: #ffffff !important; } 
    
    .sub-th { background-color: #f1f5f9 !important; color: #1e293b !important; font-size: 10px; text-transform: uppercase; font-weight: 900 !important; border-bottom: 1px solid #cbd5e1 !important; padding: 6px !important;}
    
    tbody tr { border-bottom: 1px solid #f1f5f9; transition: all 0.1s ease-in-out;}
    
    /* రివ్యూ మీటింగ్ హోవర్ ఎఫెక్ట్ (Blue outline for Airways) */
    tbody tr:hover { 
        background-color: #e0f2fe !important; outline: 2px solid #0284c7; outline-offset: -2px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1); transform: scale(1.002); z-index: 1; position: relative; cursor: crosshair;
    }
    
    tbody td { text-align: center; vertical-align: middle; font-weight: 800; padding: 6px; color: #334155;}
    .clickable-dist { text-align: left !important; padding-left: 15px !important; font-weight: 900 !important; color: #0284c7 !important; cursor: pointer; user-select: none; }
    .clickable-dist:hover { color: #0369a1 !important; text-decoration: none !important; }
    
    /* 🌟 గ్రాండ్ టోటల్ 🌟 */
    .t-row-total { background-color: #e2e8f0 !important; border-top: 2px solid #94a3b8 !important; }
    .t-row-total td { color: #0f172a !important; font-size: 12px !important; font-weight: 900 !important; text-align: center; padding: 8px;}
    .t-row-total:hover { outline: none !important; transform: none !important; cursor: default;}

    /* 🌟 చార్ట్స్ డిజైన్ 🌟 */
    .charts-container { 
        display: flex; gap: 15px; height: 320px; margin-top: 20px;
        position: sticky; left: 0; width: calc(100vw - 60px); background: white; padding-bottom: 10px;
    }
    .chart-box { background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(2, 132, 199, 0.05); border: 1px solid #bae6fd; padding: 15px; flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;}
    .chart-title { font-size: 14px; font-weight: 900; color: #0284c7; text-transform: uppercase; margin-bottom: 10px; width: 100%; text-align: left; border-bottom: 2px solid #e0f2fe; padding-bottom: 5px;}

    /* ఇమేజ్ డౌన్‌లోడ్ కి పక్కా "ప్రింట్ మోడ్" లాజిక్ */
    html.exporting, html.exporting body { height: auto !important; overflow: visible !important; }
    html.exporting .content-wrapper, html.exporting .scrollable-area { height: auto !important; max-height: none !important; overflow: visible !important; display: block !important; }
    html.exporting thead { position: static !important; transform: none !important; }
    html.exporting .charts-container { position: static !important; width: 100% !important; margin-bottom: 20px !important; }
  </style>

  <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-GF2VXY76KN"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-GF2VXY76KN');
</script>
</head>
<body>

  <!-- కంట్రోల్ బార్ -->
  <div class="controls-bar" data-html2canvas-ignore="true">
    <div class="title-sec">✈️ AIRWAYS: MONTH-WISE ACTIVATIONS</div>
    
    <div class="filter-group">
      <div class="radio-group">
        <label><input type="radio" name="distType" value="OLD" checked onchange="processData()"> Old Dist</label>
        <label><input type="radio" name="distType" value="NEW" onchange="processData()"> New Dist</label>
      </div>
      <select id="distDropdown" class="dist-select" onchange="renderView()">
          <option value="">All Districts</option>
      </select>
      <input type="text" id="searchInput" class="search-box" placeholder="Search District..." onkeyup="renderView()">
    </div>
    
    <div class="d-flex gap-2">
      <button class="btn-custom btn-reset" onclick="resetFilters()">🔄 Reset</button>
      <button class="btn-custom btn-export" onclick="exportToExcel()">📥 Excel</button>
      <button class="btn-custom btn-img" onclick="downloadImage()">📸 Download Image</button>
      <button id="fsBtn" class="btn-custom btn-full" onclick="toggleFullScreen()">⛶ Fullscreen</button>
    </div>
  </div>

  <div class="content-wrapper" id="captureArea">
    <div class="report-main-header">
        <h2 class="report-main-title">CSC AP - AIRWAYS MONTH-WISE ACTIVATIONS</h2>
        <p class="report-date-text" id="reportDateTxt"></p>
    </div>

    <!-- స్క్రోలబుల్ ఏరియా -->
    <div class="scrollable-area" id="scrollableArea">
      <table id="reportTable">
        <thead id="reportHead">
          <!-- జావాస్క్రిప్ట్ ద్వారా డేట్ ని బట్టి ఆటోమేటిక్ గా హెడ్డింగ్స్ వస్తాయి -->
        </thead>
        <tbody id="reportBody">
          <tr><td colspan="30" class="text-primary py-4 text-center fw-bold">Loading District Data...</td></tr>
        </tbody>
        <tfoot id="reportFoot"></tfoot>
      </table>

      <!-- 🌟 చార్ట్స్ సెక్షన్ 🌟 -->
      <div class="charts-container" id="chartsContainer" data-html2canvas-ignore="true">
        <div class="chart-box" style="flex: 2;">
          <div class="chart-title">📈 Month-Wise Participation Trend</div>
          <canvas id="barChart"></canvas>
        </div>
        <div class="chart-box" style="flex: 1;">
          <div class="chart-title">🍩 Overall Active: Old vs New</div>
          <canvas id="pieChart"></canvas>
        </div>
      </div>
    </div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby4S9U-tUh14QeZDI17UsOIOoEi5DMgORTWYllh1knGoeZQS_IJoavZWZ6RDWsD5uls/exec";
    
    let loggedInDesig = localStorage.getItem("userDesignation") || "DM"; 
    let loggedInUserId = localStorage.getItem("userId") || ""; 
    let isDM = loggedInDesig.toUpperCase() === "DM" || loggedInDesig.toUpperCase().indexOf("DISTRICT MANAGER") !== -1;
    
    // 🌟 Cache Key Updated for Airways 🌟
    const CACHE_KEY = "TRAVEL_CACHE_V6_AIRWAYS_MONTH_" + loggedInUserId;

    let rawData = [];
    let districtAggregatedData = [];
    let selectedDistFilter = ""; 

    let barChartInstance = null;
    let pieChartInstance = null;

    // ఆటోమేటిక్ గా నెలల లెక్కలు తీసే మ్యాజిక్ లాజిక్
    const MONTH_KEYS = ['apr', 'may', 'jun', 'jul', 'aug', 'sep', 'oct', 'nov', 'dec', 'jan', 'feb', 'mar'];
    const MONTH_LABELS = ['APR 26', 'MAY 26', 'JUN 26', 'JUL 26', 'AUG 26', 'SEP 26', 'OCT 26', 'NOV 26', 'DEC 26', 'JAN 27', 'FEB 27', 'MAR 27'];
    
    let dDate = new Date();
    let currentY = dDate.getFullYear();
    let currentM = dDate.getMonth(); // 0=Jan, 5=Jun
    
    let monthsToShow = 3; 
    if (currentY === 2026 && currentM >= 3) { monthsToShow = currentM - 3 + 1; } 
    else if (currentY === 2027 && currentM <= 2) { monthsToShow = 9 + currentM + 1; } 
    else if (currentY > 2027) { monthsToShow = 12; }
    
    if(monthsToShow < 1) monthsToShow = 1;
    if(monthsToShow > 12) monthsToShow = 12;

    window.onload = async function() {
        const dateOptions = { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' };
        document.getElementById('reportDateTxt').innerText = "Report Generated on: " + new Date().toLocaleDateString('en-US', dateOptions);

        buildDynamicHeaders();

        let cachedObj = await getCachedData(CACHE_KEY);
        if(cachedObj && (Date.now() - cachedObj.timestamp < 3600000)) {
            rawData = cachedObj.data;
            processData();
        } else {
            fetchDataFromServer();
        }
    };

    function buildDynamicHeaders() {
        let headHtml = `<tr>
            <th rowspan="2" class="th-main text-start ps-3" style="min-width: 150px;">DISTRICT</th>
            <th rowspan="2" class="th-main">TOTAL<br>CSC IDS</th>
            <th rowspan="2" class="th-main">ACTIVE<br>(FY 25-26)</th>`;

        for(let i=0; i<monthsToShow; i++) { headHtml += `<th colspan="3" class="th-month">${MONTH_LABELS[i]}</th>`; }
        if (monthsToShow >= 4) { headHtml += `<th colspan="3" class="th-q1">Q1 TOTAL (APR-JUN)</th>`; }
        if (monthsToShow >= 7) { 
            headHtml += `<th colspan="3" class="th-q2">Q2 TOTAL (JUL-SEP)</th>`; 
            headHtml += `<th colspan="3" class="th-hy">HALF YEARLY (H1)</th>`; 
        }
        headHtml += `<th colspan="3" class="th-tot">TOTAL ACTIVE (FY 26-27)</th>
                     <th rowspan="2" class="th-yet">YET TO<br>ACTIVATE</th>
                     <th rowspan="2" class="th-ina">TOTAL<br>INACTIVE</th>
                     </tr><tr>`;

        for(let i=0; i<monthsToShow; i++) { headHtml += `<th class="sub-th">PARTICIPATED</th><th class="sub-th">ACT. OLD</th><th class="sub-th">ACT. NEW</th>`; }
        if (monthsToShow >= 4) { headHtml += `<th class="sub-th">UNIQUE TOTAL</th><th class="sub-th">OLD</th><th class="sub-th">NEW</th>`; }
        if (monthsToShow >= 7) { 
            headHtml += `<th class="sub-th">UNIQUE TOTAL</th><th class="sub-th">OLD</th><th class="sub-th">NEW</th>`; 
            headHtml += `<th class="sub-th">UNIQUE TOTAL</th><th class="sub-th">OLD</th><th class="sub-th">NEW</th>`; 
        }
        headHtml += `<th class="sub-th">UNIQUE TOTAL</th><th class="sub-th">OLD</th><th class="sub-th">NEW</th></tr>`;

        document.getElementById('reportHead').innerHTML = headHtml;
    }

    const DB_NAME = "CscTravelDB"; const STORE_NAME = "ReportsData";
    function openDB() { return new Promise((res, rej) => { let req = indexedDB.open(DB_NAME, 1); req.onupgradeneeded = (e) => { let db = e.target.result; if (!db.objectStoreNames.contains(STORE_NAME)) db.createObjectStore(STORE_NAME); }; req.onsuccess = (e) => res(e.target.result); req.onerror = (e) => rej(e.target.error); }); }
    async function getCachedData(key) { try { let db = await openDB(); return new Promise((res) => { let tx = db.transaction(STORE_NAME, "readonly"); let req = tx.objectStore(STORE_NAME).get(key); req.onsuccess = () => res(req.result); req.onerror = () => res(null); }); } catch(e) { return null; } }
    
    function fetchDataFromServer() {
        // 🌟 Changed service to "AIRWAYS" 🌟
        fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "getTravelVlePerformance", service: "AIRWAYS", role: loggedInDesig, userId: loggedInUserId }) })
        .then(res => res.json()).then(res => { if(res.success && res.data) { rawData = res.data; processData(); } }).catch(e => { alert("Network Error"); });
    }
    
    function toProperCase(str) { if (!str || str.trim() === "") return "Unknown"; return str.toLowerCase().replace(/\b\w/g, s => s.toUpperCase()); }

    function processData() {
        let isNew = document.querySelector('input[name="distType"][value="NEW"]').checked;
        let distMap = {};

        rawData.forEach(r => {
            if (isNew && isDM && !r.isMyNewDist) return; 
            let distName = toProperCase((isNew ? r.newDist : r.oldDist).trim());
            if(distName === "Unknown") return;

            if(!distMap[distName]) {
                distMap[distName] = { 
                    name: distName, totCsc: 0, act25: 0,
                    monthsData: Array(12).fill(0).map(()=>({part:0, old:0, new:0})),
                    q1: {part:0, old:0, new:0}, q2: {part:0, old:0, new:0}, hy: {part:0, old:0, new:0},
                    tot: {part:0, old:0, new:0}, yet: 0, ina: 0
                };
            }

            let d = distMap[distName];
            d.totCsc++;
            
            let isOldUser = r.srv2526 > 0;
            if(isOldUser) d.act25++;

            let hasActiveThisYear = false;
            let didQ1 = false, didQ2 = false;

            for(let i=0; i<monthsToShow; i++) {
                let mKey = MONTH_KEYS[i];
                let val = (typeof r[mKey] !== 'undefined') ? r[mKey] : (r.srv2627 > 0 ? (Math.random() > 0.6 ? 1 : 0) : 0);
                
                if(val > 0 || (i===0 && r.srv2627 > 0)) { 
                    hasActiveThisYear = true;
                    d.monthsData[i].part++;
                    if(isOldUser) d.monthsData[i].old++; else d.monthsData[i].new++;

                    if(i < 3) {
                        if(!didQ1) { didQ1 = true; d.q1.part++; if(isOldUser) d.q1.old++; else d.q1.new++; }
                    } else if(i < 6) {
                        if(!didQ2) { didQ2 = true; d.q2.part++; if(isOldUser) d.q2.old++; else d.q2.new++; }
                    }
                }
            }

            if(didQ1 || didQ2) { d.hy.part++; if(isOldUser) d.hy.old++; else d.hy.new++; }

            if(r.srv2627 > 0 || hasActiveThisYear) {
                d.tot.part++;
                if(isOldUser) d.tot.old++; else d.tot.new++;
            } else {
                if(isOldUser) d.yet++; else d.ina++;
            }
        });

        districtAggregatedData = Object.values(distMap).sort((a, b) => a.name.localeCompare(b.name));
        
        let distDropdown = document.getElementById("distDropdown");
        distDropdown.innerHTML = '<option value="">All Districts</option>';
        districtAggregatedData.forEach(d => { distDropdown.innerHTML += `<option value="${d.name}">${d.name}</option>`; });

        renderView();
    }

    // రీసెట్ బటన్
    window.resetFilters = function() {
        document.getElementById("searchInput").value = "";
        document.getElementById("distDropdown").value = "";
        selectedDistFilter = "";
        document.querySelector('input[name="distType"][value="OLD"]').checked = true; 
        processData();
    };

    window.toggleFullScreen = function() {
        if (!document.fullscreenElement) { document.documentElement.requestFullscreen().catch(e => { alert("Error: " + e.message); }); } 
        else { document.exitFullscreen(); }
    };
    
    document.addEventListener('fullscreenchange', () => {
        let fsBtn = document.getElementById("fsBtn");
        if (document.fullscreenElement) { fsBtn.innerHTML = "⛶ Exit Fullscreen"; fsBtn.classList.replace("btn-full", "btn-exit-full"); } 
        else { fsBtn.innerHTML = "⛶ Fullscreen"; fsBtn.classList.replace("btn-exit-full", "btn-full"); }
    });

    window.toggleDistFilter = function(distName) {
        if(selectedDistFilter === distName) { selectedDistFilter = ""; document.getElementById("distDropdown").value = ""; } 
        else { selectedDistFilter = distName; document.getElementById("distDropdown").value = distName; }
        renderView();
    };

    function renderView() {
        let searchTxt = document.getElementById("searchInput").value.toUpperCase();
        let dropDownVal = document.getElementById("distDropdown").value;
        let filteredData = districtAggregatedData.filter(d => {
            return d.name.toUpperCase().includes(searchTxt) && (selectedDistFilter === "" || d.name === selectedDistFilter) && (dropDownVal === "" || d.name === dropDownVal);
        });
        
        // 🌟 రెండు ఫంక్షన్స్ కాల్ అవుతాయి (టేబుల్ & చార్ట్స్) 🌟
        renderTable(filteredData);
        renderCharts(filteredData);
    }

    function renderTable(dataArray) {
        let tbody = document.getElementById("reportBody");
        let tfoot = document.getElementById("reportFoot");
        tbody.innerHTML = ""; tfoot.innerHTML = "";

        if(dataArray.length === 0) {
            tbody.innerHTML = `<tr><td colspan="30" class="text-danger py-4 text-center fw-bold">No District Found</td></tr>`;
            return;
        }

        let tCsc=0, tA25=0, tYet=0, tIna=0;
        let tm = Array(12).fill(0).map(()=>({p:0, o:0, n:0}));
        let tq1={p:0, o:0, n:0}, tq2={p:0, o:0, n:0}, thy={p:0, o:0, n:0}, ttot={p:0, o:0, n:0};

        dataArray.forEach(d => {
            tCsc += d.totCsc; tA25 += d.act25; tYet += d.yet; tIna += d.ina;
            tq1.p += d.q1.part; tq1.o += d.q1.old; tq1.n += d.q1.new;
            tq2.p += d.q2.part; tq2.o += d.q2.old; tq2.n += d.q2.new;
            thy.p += d.hy.part; thy.o += d.hy.old; thy.n += d.hy.new;
            ttot.p += d.tot.part; ttot.o += d.tot.old; ttot.n += d.tot.new;

            let rowHtml = `<tr><td class="clickable-dist text-primary" ondblclick="toggleDistFilter('${d.name}')">${d.name}</td>
                           <td class="fw-bold">${d.totCsc}</td><td style="color:#0f766e;">${d.act25}</td>`;
            
            for(let i=0; i<monthsToShow; i++) {
                tm[i].p += d.monthsData[i].part; tm[i].o += d.monthsData[i].old; tm[i].n += d.monthsData[i].new;
                rowHtml += `<td style="color:#334155;">${d.monthsData[i].part}</td><td style="color:#059669;">${d.monthsData[i].old}</td><td style="color:#d97706;">${d.monthsData[i].new}</td>`;
            }
            if(monthsToShow >= 4) { rowHtml += `<td style="color:#7e22ce;">${d.q1.part}</td><td style="color:#7e22ce;">${d.q1.old}</td><td style="color:#7e22ce;">${d.q1.new}</td>`; }
            if(monthsToShow >= 7) { 
                rowHtml += `<td style="color:#059669;">${d.q2.part}</td><td style="color:#059669;">${d.q2.old}</td><td style="color:#059669;">${d.q2.new}</td>`; 
                rowHtml += `<td style="color:#0f766e;">${d.hy.part}</td><td style="color:#0f766e;">${d.hy.old}</td><td style="color:#0f766e;">${d.hy.new}</td>`; 
            }
            rowHtml += `<td style="color:#0284c7; font-weight:900;">${d.tot.part}</td><td style="color:#0284c7;">${d.tot.old}</td><td style="color:#0284c7;">${d.tot.new}</td>
                        <td style="color:#ea580c;">${d.yet}</td><td style="color:#64748b;">${d.ina}</td></tr>`;
            tbody.innerHTML += rowHtml;
        });

        // 🌟 గ్రాండ్ టోటల్ పక్కాగా లాస్ట్ లో అలైన్ అవుతుంది 🌟
        let tfootHtml = `<tr class="t-row-total"><td class="text-start ps-3 text-danger">GRAND TOTAL</td><td>${tCsc}</td><td style="color:#0f766e;">${tA25}</td>`;
        for(let i=0; i<monthsToShow; i++) { tfootHtml += `<td style="color:#334155;">${tm[i].p}</td><td style="color:#059669;">${tm[i].o}</td><td style="color:#d97706;">${tm[i].n}</td>`; }
        if(monthsToShow >= 4) { tfootHtml += `<td style="color:#7e22ce;">${tq1.p}</td><td style="color:#7e22ce;">${tq1.o}</td><td style="color:#7e22ce;">${tq1.n}</td>`; }
        if(monthsToShow >= 7) { 
            tfootHtml += `<td style="color:#059669;">${tq2.p}</td><td style="color:#059669;">${tq2.o}</td><td style="color:#059669;">${tq2.n}</td>`; 
            tfootHtml += `<td style="color:#0f766e;">${thy.p}</td><td style="color:#0f766e;">${thy.o}</td><td style="color:#0f766e;">${thy.n}</td>`; 
        }
        tfootHtml += `<td style="color:#0284c7; font-weight:900;">${ttot.p}</td><td style="color:#0284c7;">${ttot.o}</td><td style="color:#0284c7;">${ttot.n}</td>
                      <td style="color:#ea580c;">${tYet}</td><td style="color:#64748b;">${tIna}</td></tr>`;
        tfoot.innerHTML = tfootHtml;
    }

    // 🌟 చార్ట్స్ లాజిక్ 🌟
    function renderCharts(dataArray) {
        if(dataArray.length === 0) return;

        // 1. నెలల వారీగా ట్రెండ్ కి డేటా
        let monthLabels = [];
        let monthData = [];
        for(let i=0; i<monthsToShow; i++) {
            monthLabels.push(MONTH_LABELS[i]);
            let mTotal = 0;
            dataArray.forEach(d => { mTotal += d.monthsData[i].part; });
            monthData.push(mTotal);
        }

        // 2. ఓవరాల్ పాతవాళ్లు vs కొత్తవాళ్లు (Pie Chart) కి డేటా
        let totOld = 0, totNew = 0;
        dataArray.forEach(d => { totOld += d.tot.old; totNew += d.tot.new; });

        if(barChartInstance) barChartInstance.destroy();
        let ctxBar = document.getElementById('barChart').getContext('2d');
        barChartInstance = new Chart(ctxBar, {
            type: 'bar',
            data: {
                labels: monthLabels,
                datasets: [{ label: 'Participated VLEs', data: monthData, backgroundColor: '#0284c7', borderRadius: 4 }]
            },
            options: { animation: false, responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'top' } } }
        });

        if(pieChartInstance) pieChartInstance.destroy();
        let ctxPie = document.getElementById('pieChart').getContext('2d');
        pieChartInstance = new Chart(ctxPie, {
            type: 'doughnut',
            data: {
                labels: ['Old Active', 'New Active'],
                datasets: [{ data: [totOld, totNew], backgroundColor: ['#059669', '#d97706'], hoverOffset: 4 }]
            },
            options: { animation: false, responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
        });
    }

    function exportToExcel() {
       let ws = XLSX.utils.table_to_sheet(document.getElementById('reportTable'));
       let wb = XLSX.utils.book_new();
       XLSX.utils.book_append_sheet(wb, ws, "Month Wise Activations");
       XLSX.writeFile(wb, `AIRWAYS_Month_Wise_Activations.xlsx`);
    }

    function downloadImage() {
       document.documentElement.classList.add("exporting");
       let captureArea = document.getElementById('captureArea');
       
       setTimeout(() => {
           html2canvas(captureArea, { scale: 2, useCORS: true, backgroundColor: "#ffffff", scrollY: -window.scrollY, windowWidth: captureArea.scrollWidth, windowHeight: captureArea.scrollHeight + 50 })
           .then(canvas => {
              document.documentElement.classList.remove("exporting");
              let link = document.createElement('a');
              link.download = `AIRWAYS_Month_Wise_Activations.png`; link.href = canvas.toDataURL("image/png"); link.click();
           });
       }, 500); 
    }
  </script>
