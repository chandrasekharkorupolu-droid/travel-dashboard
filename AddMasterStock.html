<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f1f5f9; padding: 25px; box-sizing: border-box; display: flex; justify-content: center; }
    .form-box { background: #ffffff; border-radius: 12px; border: 1px solid #e2e8f0; box-shadow: 0 10px 25px rgba(139, 92, 246, 0.08); padding: 30px; width: 100%; max-width: 550px; animation: popIn 0.3s ease-out; border-top: 5px solid #8b5cf6; }
    @keyframes popIn { from { transform: translateY(15px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    
    .title-row { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 2px solid #f5f3ff; }
    .title-row h2 { margin: 0; color: #5b21b6; font-size: 20px; font-weight: 800; }
    
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 13px; font-weight: 700; color: #475569; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
    
    .custom-input, .custom-select { width: 100%; padding: 12px 15px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 15px; color: #1e293b; box-sizing: border-box; outline: none; background: #f8fafc; transition: 0.2s; font-weight: 600; }
    .custom-input:focus, .custom-select:focus { border-color: #8b5cf6; background: #ffffff; box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.15); }
    
    .row-2 { display: flex; gap: 15px; }
    .row-2 .form-group { flex: 1; }
    
    .qty-box { background: #f5f3ff; border: 1px dashed #c4b5fd; padding: 15px; border-radius: 8px; text-align: center; margin-bottom: 20px; }
    .qty-box span { font-size: 13px; color: #6d28d9; font-weight: 800; display: block; margin-bottom: 5px; }
    .qty-box input { background: transparent; border: none; font-size: 26px; font-weight: 900; color: #4c1d95; text-align: center; width: 100px; outline: none; }
    
    .submit-btn { width: 100%; background: #8b5cf6; color: white; border: none; padding: 14px; border-radius: 8px; font-weight: 800; font-size: 15px; cursor: pointer; transition: 0.2s; text-transform: uppercase; letter-spacing: 1px; }
    .submit-btn:hover { background: #7c3aed; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3); }

    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
    .modal-content { background: white; padding: 30px; border-radius: 12px; text-align: center; width: 320px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 5px solid #8b5cf6; }
  </style>
</head>
<body>

  <div class="modal-overlay" id="alertModal">
    <div class="modal-content">
      <div id="alertIcon" style="font-size: 45px; margin-bottom: 10px;">✅</div>
      <h3 id="alertTitle" style="margin: 0 0 10px 0; color: #4c1d95;">Success</h3>
      <p id="alertMsg" style="color: #475569; font-size: 14px; margin-bottom: 20px;">Message</p>
      <button onclick="document.getElementById('alertModal').style.display='none'" style="background: #8b5cf6; color: white; border: none; padding: 10px 30px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%;">OK</button>
    </div>
  </div>

  <div class="form-box">
    <div class="title-row">
      <span style="font-size: 28px;">📥</span>
      <h2>Add DM Master Stock</h2>
    </div>

    <div class="row-2">
      <div class="form-group">
        <label>District</label>
        <select id="districtName" class="custom-select">
          <option value="">Select District</option>
          <option value="Anantapur">Anantapur</option>
          <option value="Chittoor">Chittoor</option>
          <option value="East Godavari">East Godavari</option>
          <option value="Guntur">Guntur</option>
          <option value="Krishna">Krishna</option>
          <option value="Kurnool">Kurnool</option>
          <option value="Prakasam">Prakasam</option>
          <option value="SPSR Nellore">SPSR Nellore</option>
          <option value="Srikakulam">Srikakulam</option>
          <option value="Visakhapatnam">Visakhapatnam</option>
          <option value="Vizianagaram">Vizianagaram</option>
          <option value="West Godavari">West Godavari</option>
          <option value="YSR Kadapa">YSR Kadapa</option>
        </select>
      </div>
      <div class="form-group">
        <label>DM Name</label>
        <input type="text" id="dmName" class="custom-input" placeholder="Enter DM Name">
      </div>
    </div>

    <div class="row-2">
      <div class="form-group">
        <label>Start Serial No.</label>
        <input type="text" id="startSerial" class="custom-input" placeholder="Ex: AP-A0001" oninput="this.value = this.value.toUpperCase()">
      </div>
      <div class="form-group">
        <label>End Serial No.</label>
        <input type="text" id="endSerial" class="custom-input" placeholder="Ex: AP-A1000" oninput="this.value = this.value.toUpperCase()">
      </div>
    </div>

    <div class="qty-box">
      <span>TOTAL RECEIVED QUANTITY</span>
      <input type="number" id="totalQty" value="0" min="1" readonly style="cursor: not-allowed;">
    </div>

    <button class="submit-btn" id="btnSubmit" onclick="addMasterStock()">📥 Save Master Stock</button>
  </div>

  <script>
    // 🌟 మీ క్రొత్త SCRIPT_URL ఇక్కడ పేస్ట్ చేయండి 🌟
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyAevLoiZZG_ZO2gG0aeHsqpRmlK5l0c__tE6jZe6iFRgTyG-Jn20s5XRze8pa0fSrZ/exec";
    
    document.getElementById('endSerial').addEventListener('blur', function() {
       let start = document.getElementById('startSerial').value;
       let end = this.value;
       let startNum = parseInt(start.replace(/[^0-9]/g, ''));
       let endNum = parseInt(end.replace(/[^0-9]/g, ''));
       if(!isNaN(startNum) && !isNaN(endNum) && endNum >= startNum) {
           document.getElementById('totalQty').value = (endNum - startNum) + 1;
       } else {
           document.getElementById('totalQty').value = 0;
       }
    });

    function addMasterStock() {
      let district = document.getElementById('districtName').value;
      let dmName = document.getElementById('dmName').value.trim();
      let startSerial = document.getElementById('startSerial').value.trim();
      let endSerial = document.getElementById('endSerial').value.trim();
      let qty = document.getElementById('totalQty').value;

      if(!district || !dmName || !startSerial || !endSerial || qty <= 0) {
         showAlert("⚠️", "Validation Failed", "దయచేసి అన్ని వివరాలు సరిగ్గా నింపండి.");
         return;
      }

      let btn = document.getElementById('btnSubmit');
      btn.innerHTML = "⏳ Saving... Please wait";
      btn.style.opacity = "0.7";
      btn.style.pointerEvents = "none";

      let payload = { action: "addMasterStock", district: district, dmName: dmName, startSerial: startSerial, endSerial: endSerial, quantity: qty };

      fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) })
      .then(res => res.json())
      .then(res => {
         btn.innerHTML = "📥 Save Master Stock";
         btn.style.opacity = "1";
         btn.style.pointerEvents = "auto";
         
         if(res.success) {
            showAlert("🎉", "Saved Successfully!", res.message);
            // 🌟 ఇక్కడ అన్నీ ఖాళీ అయ్యేలా మార్చాను 🌟
            document.getElementById('districtName').value = "";
            document.getElementById('dmName').value = "";
            document.getElementById('startSerial').value = "";
            document.getElementById('endSerial').value = "";
            document.getElementById('totalQty').value = "0";
         } else {
            showAlert("❌", "Error", res.message);
         }
      })
      .catch(err => {
         btn.innerHTML = "📥 Save Master Stock";
         btn.style.opacity = "1";
         btn.style.pointerEvents = "auto";
         showAlert("🌐", "Network Error", "సర్వర్‌కి కనెక్ట్ అవ్వడం లేదు.");
      });
    }

    function showAlert(icon, title, msg) {
      document.getElementById('alertIcon').innerText = icon;
      document.getElementById('alertTitle').innerText = title;
      document.getElementById('alertMsg').innerText = msg;
      document.getElementById('alertModal').style.display = 'flex';
    }
  </script>
</body>
</html>
