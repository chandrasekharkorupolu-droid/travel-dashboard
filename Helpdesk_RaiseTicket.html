<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Raise a Ticket</title>
    <style>
        :root { --primary-gold: #d69e2e; --hover-gold: #b7791f; --text-dark: #374151; --border-color: #e5e7eb; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #ffffff; color: var(--text-dark); margin: 0; padding: 40px 20px; display: flex; justify-content: center; }
        .helpdesk-card { width: 100%; max-width: 700px; border-radius: 10px; box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08); border-top: 6px solid var(--primary-gold); animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .card-header { padding: 20px 30px; border-bottom: 1px solid var(--border-color); text-align: center; }
        .card-header h2 { margin: 0; color: var(--text-dark); font-size: 22px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .card-body { padding: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #4b5563; font-size: 14px; }
        select, input[type="text"], input[type="number"], input[type="date"], textarea, input[type="file"] { width: 100%; padding: 12px 15px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; color: var(--text-dark); background-color: #f9fafb; transition: all 0.3s ease; box-sizing: border-box; }
        select:focus, input:focus, textarea:focus { outline: none; border-color: var(--primary-gold); box-shadow: 0 0 0 3px rgba(214, 158, 46, 0.2); background-color: #ffffff; }
        input[readonly] { background-color: #e5e7eb; color: #6b7280; cursor: not-allowed; border-color: #d1d5db; }
        .file-hint { display: block; font-size: 12px; color: #ef4444; margin-top: 5px; font-weight: 500; }
        .submit-btn { width: 100%; padding: 14px; background-color: var(--primary-gold); color: #ffffff; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s ease; margin-top: 10px; text-transform: uppercase; }
        .submit-btn:hover { background-color: var(--hover-gold); }
        .required-star { color: #ef4444; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #ffffff; padding: 30px; border-radius: 10px; text-align: center; max-width: 400px; width: 90%; box-shadow: 0 10px 25px rgba(0,0,0,0.2); border-top: 6px solid var(--primary-gold); animation: popIn 0.3s; }
        .modal-btn { background-color: var(--primary-gold); color: white; border: none; padding: 10px 30px; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <div class="helpdesk-card">
        <div class="card-header">
            <h2>🎧 RAISE NEW TICKET</h2>
        </div>
        <div class="card-body">
            <form id="ticketForm" onsubmit="submitTicket(event)">
                <div class="form-group">
                    <label for="serviceSelect">Select Service <span class="required-star">*</span></label>
                    <select id="serviceSelect" onchange="loadIssues()" required>
                        <option value="">-- Choose Service --</option>
                        <option value="IRCTC">IRCTC</option>
                        <option value="REDBUS">REDBUS</option>
                        <option value="AIRWAYS">AIRWAYS</option>
                        <option value="APSRTC">APSRTC</option>
                    </select>
                </div>
                <div class="form-group" id="issueDiv" style="display:none;">
                    <label for="issueSelect">Issue Category <span class="required-star">*</span></label>
                    <select id="issueSelect" onchange="loadFields()" required>
                        <option value="">-- Choose Issue --</option>
                    </select>
                </div>
                <div id="dynamicFields"></div>
                <button type="submit" class="submit-btn" id="submitBtn" style="display:none;">Submit Ticket</button>
            </form>
        </div>
    </div>

    <div id="successModal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <div style="font-size: 50px; margin-bottom: 10px;">✅</div>
            <h3 style="color: #374151; margin-top: 0;">Ticket Raised Successfully!</h3>
            <p style="color: #4b5563; font-size: 16px; font-weight: bold; margin: 10px 0;">Ticket No: <span style="color: #d69e2e;">VSP-IRC-1001</span></p>
            <p style="color: #6b7280; font-size: 13px;">Please save this for future reference.</p>
            <button type="button" onclick="closeModal()" class="modal-btn">OK</button>
        </div>
    </div>

    <script>
        const loggedInVLE = { cscId: "510873980010", irctcId: "WCSCEGL144398", vleName: "Bonela Prasada Rao", mobile: "9391212079" };

        const helpdeskData = {
            "IRCTC": {
                "New Registration Done - But ID not generated": [
                    { label: "CSC ID", type: "text", required: true, autoFillKey: "cscId" },
                    { label: "Date of Registration", type: "date", required: true }
                ],
                "Password Reset": [
                    { label: "Agent ID (IRCTC ID)", type: "text", required: true, autoFillKey: "irctcId" },
                    { label: "CSC ID", type: "text", required: true, autoFillKey: "cscId" }
                ],
                "Mobile No / Email Change": [
                    { label: "Agent ID", type: "text", required: true, autoFillKey: "irctcId" },
                    { label: "Old Mobile No", type: "number", required: true },
                    { label: "New Mobile No", type: "number", required: true },
                    { label: "Old Email ID", type: "text", required: true },
                    { label: "New Email ID", type: "text", required: true }
                ],
                "No Refund after Cancellation": [
                    { label: "PNR No", type: "text", required: true },
                    { label: "Amount", type: "number", required: true },
                    { label: "Date of Cancellation", type: "date", required: true }
                ],
                "Wrong Mobile No - OTP Not Received": [
                    { label: "PNR No", type: "text", required: true },
                    { label: "Passenger Name", type: "text", required: true },
                    { label: "Mobile No on PNR", type: "number", required: true },
                    { label: "Correct Mobile No", type: "number", required: true },
                    { label: "Upload Passenger Form", type: "file", hint: "Max 100 KB", required: true },
                    { label: "Upload ID Proof", type: "file", hint: "Full Aadhaar only - Max 100 KB", required: true }
                ],
                "General": [
                    { label: "Date of Transaction", type: "date", required: true },
                    { label: "Amount", type: "number", required: true },
                    { label: "Issue Description", type: "textarea", required: true },
                    { label: "Upload Screenshot", type: "file", hint: "Max 100 KB", required: true }
                ]
            },
            "REDBUS": {
                "No Refund After Cancellation": [
                    { label: "PNR No", type: "text", required: true },
                    { label: "Ticket No", type: "text", required: true },
                    { label: "Date of Cancellation", type: "date", required: true },
                    { label: "Amount", type: "number", required: true }
                ],
                "Service Cancelled by Operator": [
                    { label: "PNR No", type: "text", required: true },
                    { label: "Ticket No", type: "text", required: true },
                    { label: "Date of Journey", type: "date", required: true },
                    { label: "Amount", type: "number", required: true },
                    { label: "Bus Travels Name", type: "text", required: true }
                ],
                "Amount Debited Ticket Not Confirmed": [
                    { label: "Date of Transaction", type: "date", required: true },
                    { label: "Amount Debited", type: "number", required: true },
                    { label: "Upload Screenshot", type: "file", hint: "Max 100 KB", required: true }
                ]
            },
            "AIRWAYS": {
                "No Refund After Cancellation": [
                    { label: "Cart No", type: "text", required: true },
                    { label: "PNR No", type: "text", required: true },
                    { label: "Date of Cancellation", type: "date", required: true },
                    { label: "Amount", type: "number", required: true },
                    { label: "Upload Cancellation Proof", type: "file", hint: "Max 100 KB", required: true }
                ],
                "Flight Cancelled": [
                    { label: "Cart No", type: "text", required: true },
                    { label: "PNR No", type: "text", required: true },
                    { label: "Date of Journey", type: "date", required: true },
                    { label: "Amount", type: "number", required: true },
                    { label: "Airline Name", type: "text", required: true },
                    { label: "Upload Cancellation Proof", type: "file", hint: "Max 100 KB", required: true }
                ],
                "Amount Debited Ticket Not Confirmed": [
                    { label: "Date of Transaction", type: "date", required: true },
                    { label: "Amount Debited", type: "number", required: true },
                    { label: "Upload Screenshot", type: "file", hint: "Max 100 KB", required: true }
                ]
            },
            "APSRTC": {
                "No Refund After Cancellation": [
                    { label: "PNR No", type: "text", required: true },
                    { label: "Ticket No", type: "text", required: true },
                    { label: "Date of Cancellation", type: "date", required: true },
                    { label: "Amount", type: "number", required: true }
                ],
                "Service Cancelled by Operator": [
                    { label: "PNR No", type: "text", required: true },
                    { label: "Ticket No", type: "text", required: true },
                    { label: "Date of Journey", type: "date", required: true },
                    { label: "Amount", type: "number", required: true },
                    { label: "Bus Service Name", type: "text", required: true }
                ],
                "Amount Debited Ticket Not Confirmed": [
                    { label: "Date of Transaction", type: "date", required: true },
                    { label: "Amount Debited", type: "number", required: true },
                    { label: "Upload Screenshot", type: "file", hint: "Max 100 KB", required: true }
                ]
            }
        };

        function loadIssues() {
            const service = document.getElementById("serviceSelect").value;
            const issueSelect = document.getElementById("issueSelect");
            const issueDiv = document.getElementById("issueDiv");
            const dynamicFields = document.getElementById("dynamicFields");
            const submitBtn = document.getElementById("submitBtn");

            issueSelect.innerHTML = '<option value="">-- Choose Issue --</option>';
            dynamicFields.innerHTML = '';
            submitBtn.style.display = "none";

            if (service && helpdeskData[service]) {
                issueDiv.style.display = "block";
                Object.keys(helpdeskData[service]).forEach(issue => {
                    issueSelect.appendChild(new Option(issue, issue));
                });
            } else {
                issueDiv.style.display = "none";
            }
        }

        function loadFields() {
            const service = document.getElementById("serviceSelect").value;
            const issue = document.getElementById("issueSelect").value;
            const dynamicFields = document.getElementById("dynamicFields");
            const submitBtn = document.getElementById("submitBtn");

            dynamicFields.innerHTML = ''; 
            if (service && issue && helpdeskData[service][issue]) {
                helpdeskData[service][issue].forEach(field => {
                    const div = document.createElement("div"); 
                    div.className = "form-group";
                    
                    let autoFillAttr = '', autoFillValue = '';
                    if (field.autoFillKey && loggedInVLE[field.autoFillKey]) {
                        autoFillValue = `value="${loggedInVLE[field.autoFillKey]}"`;
                        autoFillAttr = 'readonly';
                    }
                    
                    let inputHTML = '';
                    if (field.type === "textarea") {
                        inputHTML = `<textarea rows="3" ${field.required ? 'required' : ''}></textarea>`;
                    } else if (field.type === "file") {
                        inputHTML = `<input type="file" ${field.required ? 'required' : ''} accept=".jpg,.jpeg,.png,.pdf">`;
                    } else {
                        inputHTML = `<input type="${field.type}" ${autoFillValue} ${autoFillAttr} ${field.required ? 'required' : ''}>`;
                    }

                    const hintHTML = field.hint ? `<span class="file-hint">${field.hint}</span>` : '';
                    div.innerHTML = `<label>${field.label} ${field.required ? '<span class="required-star">*</span>' : ''}</label>${inputHTML}${hintHTML}`;
                    dynamicFields.appendChild(div);
                });
                submitBtn.style.display = "block";
            } else {
                submitBtn.style.display = "none";
            }
        }

        function submitTicket(event) {
            event.preventDefault();
            document.getElementById('successModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('successModal').style.display = 'none';
            document.getElementById('ticketForm').reset();
            document.getElementById('dynamicFields').innerHTML = '';
            document.getElementById('issueDiv').style.display = 'none';
            document.getElementById('submitBtn').style.display = 'none';
        }
    </script>
</body>
</html>
