<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>body { background-color: #f8fafc; padding: 20px; font-family: 'Segoe UI', Tahoma, sans-serif; }</style>
</head>
<body>
  
  <div class="card shadow-sm border-0 border-top border-4 mb-4" style="border-top-color: #6d28d9 !important;">
    <div class="card-body p-3 p-md-4">
      <h5 class="fw-bold text-purple mb-3" style="color:#6d28d9;">📊 My Performance & Target Summary</h5>
      <div class="table-responsive">
        <table class="table table-bordered text-center align-middle mb-0" style="font-size: 13px;">
          <thead class="table-light">
            <tr>
              <th class="text-secondary">Issued Stock</th>
              <th class="text-success">₹ 10</th>
              <th class="text-info">₹ 20</th>
              <th class="text-warning">₹ 50</th>
              <th class="text-primary">₹ 100</th>
              <th class="text-secondary">Others</th>
              <th class="text-dark">DSD</th>
              <th class="text-primary">Used Stock</th>
              <th class="text-primary">Avail. Stock</th>
              <th class="text-primary">Target (₹)</th>
              <th class="text-success">Total Sales(₹)</th>
              <th class="text-danger">Pending (₹)</th>
            </tr>
          </thead>
          <tbody>
            <tr id="myPerformanceRow"><td colspan="12" class="text-muted fw-bold py-3">లోడ్ అవుతోంది... దయచేసి వేచి ఉండండి.</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="card shadow-sm border-0 border-top border-4 border-success">
    <div class="card-body p-3 p-md-4">
      <h5 class="fw-bold text-success mb-4">📝 Enter Daily Sales Details</h5>
      
      <div class="row g-2 align-items-end mb-4 bg-light p-3 rounded border">
        <div class="col-md-5">
          <label class="form-label fw-bold text-secondary mb-1" style="font-size: 13px;">Serial Number</label>
          <input type="text" id="serialNo" class="form-control" placeholder="Ex: AP-A0001">
        </div>
        <div class="col-md-5">
          <label class="form-label fw-bold text-secondary mb-1" style="font-size: 13px;">Amount (₹)</label>
          <select id="stampAmount" class="form-select" onchange="checkCustomAmount()">
            <option value="10">10</option>
            <option value="20">20</option>
            <option value="50">50</option>
            <option value="100">100</option>
            <option value="DSD">DSD</option>
            <option value="custom">Other</option>
          </select>
          <input type="number" id="customAmount" class="form-control mt-2" style="display: none;" placeholder="Enter Amount (₹)">
        </div>
        <div class="col-md-2">
          <button class="btn btn-success w-100 fw-bold" onclick="addSaleRow()">➕ Add</button>
        </div>
      </div>

      <div class="table-responsive mb-4">
        <table class="table table-hover text-center align-middle">
          <thead class="table-light"><tr><th>Serial No</th><th>Amount</th><th>Action</th></tr></thead>
          <tbody id="salesBody"></tbody>
        </table>
      </div>

      <button id="btnSubmitSales" class="btn btn-success w-100 fw-bold py-2 fs-5" onclick="submitSales()">🚀 Submit Sales Report</button>
    </div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby4S9U-tUh14QeZDI17UsOIOoEi5DMgORTWYllh1knGoeZQS_IJoavZWZ6RDWsD5uls/exec";
    let loggedInId = localStorage.getItem("userId") || "";
    let loggedInUser = localStorage.getItem("userName") || "";
    let vleSalesCart = [];

    window.onload = function() { loadPerformance(); };

    function checkCustomAmount() { 
        var val = document.getElementById('stampAmount').value; 
        document.getElementById('customAmount').style.display = (val === 'custom' || val === 'DSD') ? 'block' : 'none'; 
        if(val === 'DSD') { document.getElementById('customAmount').placeholder = "Enter DSD Amount (₹)"; }
        else { document.getElementById('customAmount').placeholder = "Enter Custom Amount (₹)"; }
    }

    function loadPerformance() {
        fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "getVleMySalesSummary", userId: loggedInId }) })
        .then(res => res.json()).then(res => {
            if(res.success) {
                let d = res.data;
                let otherHtml = d.other > 0 ? `<span class="text-secondary">${d.other}</span> <br><span style="font-size:10px;" class="text-primary">(₹${d.otherAmt.toLocaleString('en-IN')})</span>` : `<span class="text-muted">0</span>`;
                let dsdHtml = d.dsd > 0 ? `<span class="text-dark fw-bold">₹ ${d.dsd.toLocaleString('en-IN')}</span>` : `<span class="text-muted">0</span>`;
                let pendingHtml = d.pending > 0 ? `<span class="text-danger fw-bold text-nowrap">₹ ${d.pending.toLocaleString('en-IN')}</span>` : `<span class="text-success fw-bold">Achieved 🎉</span>`;
                
                document.getElementById("myPerformanceRow").innerHTML = `
                    <td class="fw-bold text-secondary text-nowrap">${d.issued}</td>
                    <td class="fw-bold text-success">${d.d10}</td>
                    <td class="fw-bold text-info">${d.d20}</td>
                    <td class="fw-bold text-warning">${d.d50}</td>
                    <td class="fw-bold" style="color:#6d28d9;">${d.d100}</td>
                    <td class="fw-bold">${otherHtml}</td>
                    <td class="fw-bold">${dsdHtml}</td>
                    <td class="fw-bold text-primary text-nowrap">${d.used}</td>
                    <td class="fw-bold text-primary text-nowrap" style="font-size:14px;">${d.avail}</td>
                    <td class="fw-bold text-primary text-nowrap">₹ ${d.target.toLocaleString('en-IN')}</td>
                    <td class="fw-bold text-success text-nowrap" style="font-size:14px;">₹ ${d.totalSales.toLocaleString('en-IN')}</td>
                    <td>${pendingHtml}</td>
                `;
            } else {
                document.getElementById("myPerformanceRow").innerHTML = `<td colspan="12" class="text-danger fw-bold py-3">Error: ${res.message}</td>`;
            }
        }).catch(err => { document.getElementById("myPerformanceRow").innerHTML = `<td colspan="12" class="text-danger fw-bold py-3">డేటా లోడ్ అవ్వలేదు. ఇంటర్నెట్ చెక్ చేయండి. (${err.message})</td>`; });
    }

    function addSaleRow() {
        var serialInput = document.getElementById('serialNo').value.trim().toUpperCase(); 
        var amtType = document.getElementById('stampAmount').value;
        var amtValue = amtType;

        if(amtType === 'custom' || amtType === 'DSD') { 
            let typedAmt = document.getElementById('customAmount').value; 
            if(!typedAmt || typedAmt <= 0) { alert("Please enter a valid amount!"); return; }
            amtValue = (amtType === 'DSD') ? "DSD-" + typedAmt : typedAmt; 
        }

        if(!serialInput) { alert("దయచేసి సీరియల్ నెంబర్ ఎంటర్ చేయండి!"); return; }
        
        var btnAdd = event.target; var originalBtnHtml = btnAdd.innerHTML; 
        btnAdd.innerHTML = "⏳"; btnAdd.disabled = true;
        
        fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "validateSerial", vleId: loggedInId, serial: serialInput }) })
        .then(res => res.json()).then(res => {
            btnAdd.innerHTML = originalBtnHtml; btnAdd.disabled = false;
            if(res.success) {
                if (vleSalesCart.some(item => item.serial === res.fullSerial)) { alert("⚠️ ఈ సీరియల్ నెంబర్ ని ఇప్పటికే యాడ్ చేశారు!"); return; }
                
                let displayAmt = (amtType === 'DSD') ? "DSD (₹" + amtValue.split('-')[1] + ")" : "₹ " + amtValue;
                vleSalesCart.push({serial: res.fullSerial, amount: amtValue, displayAmt: displayAmt}); 
                renderTable();
                
                document.getElementById('serialNo').value = ''; 
                document.getElementById('stampAmount').value = '10'; 
                document.getElementById('customAmount').style.display = 'none'; 
                document.getElementById('customAmount').value = '';
            } else { alert("❌ " + res.message); }
        }).catch(err => { btnAdd.innerHTML = originalBtnHtml; btnAdd.disabled = false; alert("నెట్‌వర్క్ ఎర్రర్!"); });
    }

    function removeRow(index) { vleSalesCart.splice(index, 1); renderTable(); }
    
    function renderTable() { 
        var tbody = document.getElementById('salesBody'); tbody.innerHTML = ""; 
        vleSalesCart.forEach((item, index) => { 
            let showAmt = item.displayAmt ? item.displayAmt : "₹ " + item.amount;
            tbody.innerHTML += `<tr><td class="fw-bold text-secondary">${item.serial}</td><td class="fw-bold text-success">${showAmt}</td><td><button class="btn btn-sm btn-outline-danger fw-bold" onclick="removeRow(${index})">✖ Remove</button></td></tr>`; 
        }); 
    }

    function submitSales() {
        if(vleSalesCart.length === 0) { alert("ముందుగా కనీసం ఒక్క సేల్స్ ఎంట్రీ అయినా చేయండి!"); return; }
        var btn = document.getElementById('btnSubmitSales'); btn.innerText = "⏳ Submitting..."; btn.disabled = true;
        fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: 'vleSubmitSales', vleId: loggedInId, vleName: loggedInUser, salesData: vleSalesCart }) })
        .then(res => res.json()).then(res => { 
            btn.innerText = "🚀 Submit Sales Report"; btn.disabled = false; 
            if(res.success) { alert("✅ " + res.message); vleSalesCart = []; renderTable(); loadPerformance(); } 
            else alert("❌ Error: " + res.message); 
        }).catch(err => { btn.innerText = "🚀 Submit Sales Report"; btn.disabled = false; alert("Network Error!"); });
    }
  </script>
</body>
</html>
