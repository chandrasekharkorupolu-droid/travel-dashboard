<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRCTC Month-wise Activations</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f1f5f9; display: flex; flex-direction: column; height: 100vh; overflow: hidden; padding: 15px; gap: 12px; }

        .top-controls {
            display: flex; justify-content: space-between; align-items: center; background-color: #ffffff; 
            padding: 12px 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; flex-shrink: 0;
        }
        .page-heading { font-size: 18px; color: #ea580c; font-weight: 800; display: flex; align-items: center; gap: 8px; text-transform: uppercase;}
        
        .filter-group { display: flex; gap: 10px; align-items: center; }
        .filter-label { font-size: 13px; font-weight: 800; color: #64748b; margin-right: 5px; }
        .filter-group select { padding: 8px 12px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 13px; outline: none; background-color: #f8fafc; font-weight: 700; cursor: pointer; color: #334155;}
        
        .btn-action { background-color: #f1f5f9; color: #475569; border: 1px solid #cbd5e1; padding: 8px 12px; border-radius: 6px; font-size: 13px; font-weight: 800; cursor: pointer; transition: 0.2s; box-shadow: 0 2px 0 #e2e8f0; display: flex; align-items: center; gap: 5px;}
        .btn-action:active { transform: translateY(2px); box-shadow: 0 0 0 transparent; }
        .btn-action:hover { background-color: #e2e8f0; color: #1e293b;}

        .report-wrapper { 
            flex: 1; 
            background-color: #ffffff; 
            border-radius: 8px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.05); 
            border: 1px solid #e2e8f0; 
            overflow: auto; 
            position: relative;
            display: flex;
            flex-direction: column;
        }
        
        .report-header { 
            text-align: center; 
            border-bottom: 2px dashed #cbd5e1; 
            background-color: #ffffff;
            position: sticky; 
            top: 0; 
            left: 0;
            padding-top: 15px;
            padding-bottom: 10px;
            z-index: 100;
            height: 70px;
            width: 100%;
        }
        .report-header h2 { color: #1e293b; font-size: 20px; font-weight: 900; margin-bottom: 3px; text-transform: uppercase; letter-spacing: 1px; }
        .report-header p { color: #ea580c; font-size: 13px; font-weight: 700; }

        .table-container { 
            width: 100%; 
            padding: 0 20px;
            flex-shrink: 0; 
        }
        table { width: 100%; border-collapse: separate; border-spacing: 0; text-align: center; min-width: 1400px;}
        
        /* Two-level Sticky Headers CSS */
        thead { position: sticky; top: 70px; z-index: 90; }
        thead tr:nth-child(1) th { position: sticky; top: 70px; z-index: 91; height: 46px; border-bottom: 1px solid rgba(255,255,255,0.2); }
        thead tr:nth-child(2) th { position: sticky; top: 116px; z-index: 90; height: 35px; border-bottom: 2px solid #cbd5e1;}

        th { font-size: 11px; text-transform: uppercase; padding: 5px 10px; font-weight: 800; color: white; border-right: 1px solid rgba(255,255,255,0.2); white-space: nowrap; letter-spacing: 0.5px;}
        td { padding: 10px; font-size: 13px; color: #333; border-bottom: 1px solid #f1f5f9; border-right: 1px solid #f1f5f9; font-weight: 700; white-space: nowrap; }
        
        /* కస్టమ్ హెడర్ కలర్స్ */
        .th-dist { background-color: #111827; }
        .th-tot { background-color: #1e293b; }
        .th-act25 { background-color: #334155; }
        .th-tot-act { background-color: #6366f1; }
        .th-yet { background-color: #e11d48; }
        .th-inact { background-color: #020617; }

        /* Sub Headers */
        .th-sub-part { background-color: #ffffff; color: #111827; border-right: 1px solid #e2e8f0; font-weight: 900;}
        .th-sub-old { background-color: #f8fafc; color: #64748b; border-right: 1px solid #e2e8f0; font-weight: 800;}
        .th-sub-new { background-color: #f0fdf4; color: #059669; border-right: 1px solid #e2e8f0; font-weight: 800;}
        .th-sub-uniq { background-color: #f5f3ff; color: #5b21b6; border-right: 1px solid #e2e8f0; font-weight: 900;}

        /* District Column Sticky */
        thead tr:nth-child(1) th:first-child { position: sticky; left: 20px; z-index: 95; border-right: 1px solid rgba(255,255,255,0.2); }
        thead tr:nth-child(2) th:first-child { display: none; }
        td:first-child { position: sticky; left: 20px; background-color: #ffffff; z-index: 10; font-weight: 900; color: #0f172a; border-right: 1px solid #e2e8f0; text-align: left; padding-left: 15px; cursor: pointer;}
        td:first-child:hover { background-color: #fff7ed !important; color: #ea580c; }

        tbody tr:nth-child(even) td:first-child { background-color: #f8fafc; }
        tbody tr:hover td { filter: brightness(0.95); }

        /* Total Row */
        tfoot tr.total-row td { background-color: #fff7ed !important; font-weight: 900; border-top: 2px solid #ea580c; font-size: 13px; position: sticky; bottom: 0; z-index: 20; border-right: 1px solid #ffedd5;}
        tfoot tr.total-row td:first-child { position: sticky; left: 20px; z-index: 30; color: #ea580c;}

        /* ఇమేజ్ డౌన్‌లోడ్ కట్ అవ్వకుండా స్పెషల్ CSS */
        .capture-mode {
            width: max-content !important; height: auto !important; overflow: visible !important;
            padding: 20px !important; background-color: #ffffff !important; display: block !important;
        }
        .capture-mode .table-container { width: max-content !important; overflow: visible !important; border: none !important; box-shadow: none !important;}
        .capture-mode table { width: max-content !important; }
        .capture-mode thead, .capture-mode thead tr:nth-child(1) th, .capture-mode thead tr:nth-child(2) th,
        .capture-mode th:first-child, .capture-mode td:first-child, .capture-mode tfoot tr.total-row td,
        .capture-mode .report-header { position: static !important; }

        .charts-container { display: flex; gap: 20px; margin-top: 20px; padding: 20px; flex-wrap: wrap; justify-content: center; background-color: #f8fafc; border-top: 1px dashed #cbd5e1; }
        .chart-box { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.02); flex: 1; min-width: 400px; max-width: 600px; display: flex; flex-direction: column;}
        .chart-title { text-align: center; font-size: 14px; font-weight: 800; color: #475569; margin-bottom: 15px; text-transform: uppercase;}
        .canvas-wrapper { position: relative; height: 300px; width: 100%; }

        .loader-row td { text-align: center; padding: 40px !important; font-size: 15px; color: #ea580c; font-weight: 700; }
        .spinner { display: inline-block; width: 22px; height: 22px; border: 3px solid #cbd5e1; border-top-color: #ea580c; border-radius: 50%; animation: spin 1s linear infinite; vertical-align: middle; margin-right: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>

<script async src="https://www.googletagmanager.com/gtag/js?id=G-GF2VXY76KN"></script>

  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

</script>
</head>
<body>

    <div class="top-controls">
        <div class="page-heading">📅 Month-wise Activations</div>
        <div class="filter-group">
            <span class="filter-label">Filter:</span>
            <select id="districtType" onchange="updateDistrictsDropdown()">
                <option value="old" selected>Old Districts</option>
                <option value="new">New Districts</option>
            </select>
            <select id="districtName" onchange="renderTable()">
                <option value="All">All Districts</option>
            </select>
            <button class="btn-action" onclick="resetFilters()">↺ Reset</button>
            <button class="btn-action" id="downloadBtn" onclick="downloadReportImage()">📸 Download Image</button>
            <button class="btn-action" id="fullscreenBtn" onclick="toggleFullScreen()">⛶ Full Screen</button>
        </div>
    </div>

    <div id="printableReport" class="report-wrapper">
        <div class="report-header">
            <h2>CSC AP – IRCTC Month-wise Activations (FY 26-27)</h2>
            <p id="reportDate">Report Generated on: Loading...</p>
        </div>

        <div class="table-container">
            <table id="dataTable">
                <thead id="tableHead">
                </thead>
                <tbody id="tableBody">
                    <tr class="loader-row"><td colspan="40"><div class="spinner"></div>Loading Data... Please Wait</td></tr>
                </tbody>
                <tfoot id="tableFooter">
                </tfoot>
            </table>
        </div>

        <div class="charts-container" id="chartsArea" style="display: none;">
            <div class="chart-box">
                <div class="chart-title">Month-over-Month Participation Trend</div>
                <div class="canvas-wrapper">
                    <canvas id="trendChart"></canvas>
                </div>
            </div>
            <div class="chart-box">
                <div class="chart-title">Old vs New VLE Activations</div>
                <div class="canvas-wrapper">
                    <canvas id="breakdownChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        const apiURL = "https://script.google.com/macros/s/AKfycbyAevLoiZZG_ZO2gG0aeHsqpRmlK5l0c__tE6jZe6iFRgTyG-Jn20s5XRze8pa0fSrZ/exec";
        
        let globalActData = [];
        let oldDistrictsSet = new Set();
        let newDistrictsSet = new Set();
        let columnsToShow = []; 
        let trendChartInstance = null;
        let breakdownChartInstance = null;
        
        let userDesignation = localStorage.getItem("userDesignation") || "State Head";
        let loggedInUser = localStorage.getItem("userName") || "";

        function setReportDate() {
            const options = { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' };
            const today = new Date().toLocaleDateString('en-US', options);
            document.getElementById('reportDate').innerText = "Report Generated on: " + today;
        }

        window.onload = function() {
            setReportDate();
            document.getElementById("districtType").value = "old";
            calculateDynamicColumns();
            buildTableHeader();
            loadInitialData(); 
        };

        function calculateDynamicColumns() {
            const d = new Date();
            const currYear = d.getFullYear();
            const currMonth = d.getMonth(); 
            
            let fyMonthIndex = 0;
            if (currYear === 2026 && currMonth >= 3) {
                fyMonthIndex = currMonth - 3; 
            } else if (currYear === 2027 && currMonth <= 2) {
                fyMonthIndex = currMonth + 9; 
            } else if (currYear > 2027 || (currYear === 2027 && currMonth > 2)) {
                fyMonthIndex = 11; 
            }

            const monthDefs = [
                { label: 'APR 26', idx: 0, color: '#3b82f6' }, 
                { label: 'MAY 26', idx: 1, color: '#a855f7' }, 
                { label: 'JUN 26', idx: 2, color: '#ec4899' }, 
                { label: 'JUL 26', idx: 3, color: '#10b981' }, 
                { label: 'AUG 26', idx: 4, color: '#f59e0b' }, 
                { label: 'SEP 26', idx: 5, color: '#06b6d4' }, 
                { label: 'OCT 26', idx: 6, color: '#6366f1' }, 
                { label: 'NOV 26', idx: 7, color: '#f43f5e' }, 
                { label: 'DEC 26', idx: 8, color: '#14b8a6' }, 
                { label: 'JAN 27', idx: 9, color: '#84cc16' }, 
                { label: 'FEB 27', idx: 10, color: '#d946ef' },
                { label: 'MAR 27', idx: 11, color: '#ef4444' } 
            ];

            columnsToShow = [];

            if (fyMonthIndex < 3) {
                for(let i=0; i<=fyMonthIndex; i++) columnsToShow.push({ type: 'month', label: monthDefs[i].label, indices: [i], color: monthDefs[i].color });
            } else if (fyMonthIndex < 6) {
                columnsToShow.push({ type: 'group', label: 'Q1 (APR-JUN)', indices: [0,1,2], color: '#f97316' }); 
                for(let i=3; i<=fyMonthIndex; i++) columnsToShow.push({ type: 'month', label: monthDefs[i].label, indices: [i], color: monthDefs[i].color });
            } else if (fyMonthIndex < 9) {
                columnsToShow.push({ type: 'group', label: 'HALF YEARLY (APR-SEP)', indices: [0,1,2,3,4,5], color: '#4f46e5' }); 
                for(let i=6; i<=fyMonthIndex; i++) columnsToShow.push({ type: 'month', label: monthDefs[i].label, indices: [i], color: monthDefs[i].color });
            } else {
                columnsToShow.push({ type: 'group', label: '9 MONTHS (APR-DEC)', indices: [0,1,2,3,4,5,6,7,8], color: '#0284c7' }); 
                for(let i=9; i<=fyMonthIndex; i++) columnsToShow.push({ type: 'month', label: monthDefs[i].label, indices: [i], color: monthDefs[i].color });
            }
        }

        function buildTableHeader() {
            let theadHtml1 = `<tr>
                <th rowspan="2" class="th-dist" title="Double click to filter">DISTRICT ⇅</th>
                <th rowspan="2" class="th-tot">TOTAL IRCTC IDS</th>
                <th rowspan="2" class="th-act25">ACTIVE<br><small>(FY 25-26)</small></th>`;

            columnsToShow.forEach(col => {
                theadHtml1 += `<th colspan="3" style="background-color: ${col.color}; border-right: 1px solid rgba(255,255,255,0.2);">${col.label}</th>`;
            });

            theadHtml1 += `
                <th colspan="3" class="th-tot-act">TOTAL ACTIVE (FY 26-27)</th>
                <th rowspan="2" class="th-yet">YET TO ACTIVATE<br><small>(FROM FY 25-26)</small></th>
                <th rowspan="2" class="th-inact">TOTAL INACTIVE</th>
            </tr>`;

            // 🌟 ఈసారి మీ కోరిక మేరకు పక్కా ఆర్డర్ సెట్ చేశాను 🌟
            let theadHtml2 = `<tr>`;
            columnsToShow.forEach(() => {
                theadHtml2 += `<th class="th-sub-part">PARTICIPATED</th><th class="th-sub-old">ACT. OLD</th><th class="th-sub-new">ACT. NEW</th>`;
            });
            theadHtml2 += `<th class="th-sub-uniq">UNIQUE TOTAL</th><th class="th-sub-old">OLD</th><th class="th-sub-new">NEW</th></tr>`;

            document.getElementById("tableHead").innerHTML = theadHtml1 + theadHtml2;
        }

        async function loadInitialData() {
            try {
                let cachedData = localStorage.getItem("cscGlobalData");
                if (cachedData) {
                    processActivationData(JSON.parse(cachedData));
                } else {
                    let response = await fetch(apiURL);
                    let rawData = await response.json();
                    localStorage.setItem("cscGlobalData", JSON.stringify(rawData));
                    processActivationData(rawData);
                }
            } catch (error) {
                console.error("Error loading data:", error);
                document.getElementById("tableBody").innerHTML = `<tr><td colspan="${4 + (columnsToShow.length*3) + 3}" style='color:red; text-align:center; padding: 20px;'>❌ Error loading data from server.</td></tr>`;
            }
        }

        function processActivationData(rawData) {
            let cleanHeaders = rawData[0].map(h => h.toString().toLowerCase().replace(/[^a-z0-9]/g, ''));
            
            let idxcscid = cleanHeaders.findIndex(h => h.includes('cscid'));
            let idxirctc = cleanHeaders.findIndex(h => h.includes('irctcid'));
            let idxolddist = cleanHeaders.findIndex(h => h.includes('olddistrict'));
            let idxnewdist = cleanHeaders.findIndex(h => h.includes('newdistrict'));
            let idxempname = cleanHeaders.findIndex(h => h.includes('employeename') || h.includes('empname'));
            let idx26 = cleanHeaders.findIndex(h => h.includes('202526') || h.includes('2526')); 
            
            let mIndices = [];
            let idx27 = -1;
            
            if (idx26 > -1) {
                for (let k = 1; k <= 12; k++) {
                    if (idx26 + k < rawData[0].length) mIndices.push(idx26 + k);
                }
                if (idx26 + 13 < rawData[0].length) idx27 = idx26 + 13;
            }

            globalActData = [];
            oldDistrictsSet.clear();
            newDistrictsSet.clear();

            for(let i=1; i<rawData.length; i++) {
                let row = rawData[i];
                let cscId = idxcscid > -1 ? row[idxcscid] : '';
                let irctcId = idxirctc > -1 ? row[idxirctc] : ''; 
                
                if(!cscId || cscId === '-') continue;

                let oldDist = idxolddist > -1 ? (row[idxolddist] || 'Unknown').trim() : 'Unknown';
                let newDist = idxnewdist > -1 ? (row[idxnewdist] || 'Unknown').trim() : 'Unknown';
                let dmNameStr = idxempname > -1 ? (row[idxempname] || 'District Manager').toString().trim() : 'District Manager';

                if(oldDist !== 'Unknown') oldDistrictsSet.add(oldDist);
                if(newDist !== 'Unknown') newDistrictsSet.add(newDist);

                let fy26 = idx26 > -1 ? (parseInt(row[idx26]) || 0) : 0;
                let isAct26 = fy26 > 0 ? 1 : 0;

                let monthData = [];
                let fy27TotalVal = 0;
                let hasActivatedInFY27 = false; 

                for(let k=0; k<12; k++) {
                    let colIdx = mIndices[k];
                    let mVal = 0;
                    if(colIdx > -1) {
                        let num = parseInt(row[colIdx]) || 0;
                        if(num > 0) {
                            mVal = 1;
                            fy27TotalVal += num;
                        }
                    }
                    
                    let part = mVal > 0 ? 1 : 0;
                    let mOld = 0;
                    let mNew = 0;
                    
                    if (part > 0 && !hasActivatedInFY27) {
                        if (isAct26) { mOld = 1; } else { mNew = 1; }
                        hasActivatedInFY27 = true;
                    }
                    
                    monthData.push({ part: part, old: mOld, new: mNew });
                }

                let fy27TotalCol = idx27 > -1 ? (parseInt(row[idx27]) || 0) : 0;
                let isAct27Unique = (fy27TotalVal > 0 || fy27TotalCol > 0) ? 1 : 0;

                let totOld = (isAct27Unique && isAct26) ? 1 : 0;
                let totNew = (isAct27Unique && !isAct26) ? 1 : 0;

                let yetToAct = (isAct26 && !isAct27Unique) ? 1 : 0;
                let totInact = (!isAct27Unique) ? 1 : 0;

                globalActData.push({
                    hasIrctc: (irctcId && irctcId !== '-') ? 1 : 0,
                    olddist: oldDist,
                    newdist: newDist,
                    dmname: dmNameStr, 
                    isAct26: isAct26,
                    months: monthData, 
                    totUnique: isAct27Unique,
                    totOld: totOld,
                    totNew: totNew,
                    yetToAct: yetToAct,
                    totInact: totInact
                });
            }
            updateDistrictsDropdown();
        }

        function updateDistrictsDropdown() {
            const type = document.getElementById("districtType").value || "old"; 
            const distDropdown = document.getElementById("districtName");

            distDropdown.innerHTML = '<option value="All">All Districts</option>';
            
            let arr = [];
            
            if (userDesignation === "District Manager") {
                let dmOldDists = new Set();
                let dmNewDists = new Set();
                globalActData.forEach(row => {
                    if (row.dmname && row.dmname.toLowerCase().trim() === loggedInUser.toLowerCase().trim()) {
                        if(row.olddist && row.olddist !== 'Unknown') dmOldDists.add(row.olddist.trim());
                        if(row.newdist && row.newdist !== 'Unknown') dmNewDists.add(row.newdist.trim());
                    }
                });
                arr = type === "old" ? Array.from(dmOldDists).sort() : Array.from(dmNewDists).sort();
            } else {
                arr = type === "old" ? Array.from(oldDistrictsSet).sort() : Array.from(newDistrictsSet).sort();
            }
            
            arr.forEach(dist => { if(dist) distDropdown.innerHTML += `<option value="${dist}">${dist}</option>`; });
            
            if(globalActData.length > 0) renderTable(); 
        }

        function renderTable() {
            let distType = document.getElementById('districtType').value;
            let selectedDist = document.getElementById('districtName').value;
            let distKey = distType === 'old' ? 'olddist' : 'newdist';

            let dmAuthorizedOldDistricts = new Set();
            if (userDesignation === "District Manager") {
                globalActData.forEach(row => {
                    if (row.dmname && row.dmname.toLowerCase().trim() === loggedInUser.toLowerCase().trim()) {
                        if (row.olddist && row.olddist !== 'Unknown') dmAuthorizedOldDistricts.add(row.olddist.trim());
                    }
                });
            }
            
            let reportMap = {};
            let gt = { ids: 0, act26: 0, dynamicCols: [], totUniq: 0, totOld: 0, totNew: 0, yet: 0, inact: 0 };
            columnsToShow.forEach(() => gt.dynamicCols.push({part:0, old:0, newAct:0}));

            globalActData.forEach(row => {
                if (userDesignation === "District Manager") {
                    if (distType === "old") {
                        if (!dmAuthorizedOldDistricts.has(row.olddist.trim())) return; 
                    } else {
                        if (!row.dmname || row.dmname.toLowerCase().trim() !== loggedInUser.toLowerCase().trim()) return; 
                    }
                }

                let dist = row[distKey];
                if (!dist) dist = "Unknown";
                
                if (selectedDist !== "All" && dist !== selectedDist) return;
                
                if (!reportMap[dist]) {
                    reportMap[dist] = { ids: 0, act26: 0, dynamicCols: [], totUniq: 0, totOld: 0, totNew: 0, yet: 0, inact: 0 };
                    columnsToShow.forEach(() => reportMap[dist].dynamicCols.push({part:0, old:0, newAct:0}));
                }
                
                let d = reportMap[dist];
                
                d.ids += row.hasIrctc;  gt.ids += row.hasIrctc;
                d.act26 += row.isAct26; gt.act26 += row.isAct26;
                
                columnsToShow.forEach((colDef, cIdx) => {
                    let sumPart = 0, sumOld = 0, sumNew = 0;
                    colDef.indices.forEach(mIdx => {
                        sumPart += row.months[mIdx].part;
                        sumOld += row.months[mIdx].old;
                        sumNew += row.months[mIdx].new;
                    });
                    d.dynamicCols[cIdx].part += sumPart;
                    d.dynamicCols[cIdx].old += sumOld;
                    d.dynamicCols[cIdx].newAct += sumNew;
                    
                    gt.dynamicCols[cIdx].part += sumPart;
                    gt.dynamicCols[cIdx].old += sumOld;
                    gt.dynamicCols[cIdx].newAct += sumNew;
                });

                d.totUniq += row.totUnique; gt.totUniq += row.totUnique;
                d.totOld += row.totOld;     gt.totOld += row.totOld;
                d.totNew += row.totNew;     gt.totNew += row.totNew;
                d.yet += row.yetToAct;      gt.yet += row.yetToAct;
                d.inact += row.totInact;    gt.inact += row.totInact;
            });

            let sortedDistricts = Object.keys(reportMap).sort();
            let tbodyHtml = "";
            let colsCount = 3 + (columnsToShow.length * 3) + 3 + 2;
            
            if(sortedDistricts.length === 0) {
                 tbodyHtml = `<tr><td colspan="${colsCount}" style="padding: 30px; color: #dc2626; font-weight: bold;">No Data Found!</td></tr>`;
                 document.getElementById("tableFooter").innerHTML = "";
                 document.getElementById("chartsArea").style.display = "none";
            } else {
                sortedDistricts.forEach(dist => {
                    let d = reportMap[dist];
                    tbodyHtml += `<tr>
                        <td ondblclick="filterByDistrict('${dist}')" title="Double click to filter">${dist}</td>
                        <td style="color: #0f172a; font-weight: 800;">${d.ids}</td>
                        <td style="color: #c2410c; font-weight: 800;">${d.act26}</td>`;
                    
                    // 🌟 ఇక్కడ కూడా పక్కా ఆర్డర్: PARTICIPATED -> ACT. OLD -> ACT. NEW 🌟
                    d.dynamicCols.forEach(colData => {
                        tbodyHtml += `
                            <td style="font-weight:900; background-color: #ffffff; color: #111827;">${colData.part}</td>
                            <td style="background-color: #f8fafc; color: #64748b; font-weight: 700;">${colData.old}</td>
                            <td style="background-color: #f0fdf4; color: #059669; font-weight: 700;">${colData.newAct}</td>`;
                    });
                    
                    tbodyHtml += `
                        <td style="background-color: #f5f3ff; color: #5b21b6; font-weight: 800;">${d.totUniq}</td>
                        <td style="background-color: #f8fafc; color: #64748b; font-weight: 700;">${d.totOld}</td>
                        <td style="background-color: #f0fdf4; color: #059669; font-weight: 700;">${d.totNew}</td>
                        <td style="background-color: #fff1f2; color: #e11d48; font-weight: 800;">${d.yet}</td>
                        <td style="background-color: #f8fafc; color: #0f172a; font-weight: 800;">${d.inact}</td>
                    </tr>`;
                });

                // 🌟 Grand Total కు కూడా ఎగ్జాక్ట్ ఆర్డర్ 🌟
                let tfootHtml = `<tr class="total-row">
                    <td>GRAND TOTAL</td>
                    <td style="color: #0f172a;">${gt.ids}</td>
                    <td style="color: #c2410c;">${gt.act26}</td>`;
                
                gt.dynamicCols.forEach(colData => {
                    tfootHtml += `
                        <td style="background-color: #ffffff; color: #111827; font-weight: 900;">${colData.part}</td>
                        <td style="background-color: #f8fafc; color: #64748b; font-weight: 800;">${colData.old}</td>
                        <td style="background-color: #f0fdf4; color: #059669; font-weight: 800;">${colData.newAct}</td>`;
                });

                tfootHtml += `
                    <td style="background-color: #f5f3ff; color: #5b21b6;">${gt.totUniq}</td>
                    <td style="background-color: #f8fafc; color: #64748b;">${gt.totOld}</td>
                    <td style="background-color: #f0fdf4; color: #059669;">${gt.totNew}</td>
                    <td style="background-color: #fff1f2; color: #e11d48;">${gt.yet}</td>
                    <td style="background-color: #f8fafc; color: #0f172a;">${gt.inact}</td>
                </tr>`;
                
                document.getElementById("tableFooter").innerHTML = tfootHtml;
                
                document.getElementById("chartsArea").style.display = "flex";
                renderCharts(gt);
            }

            document.getElementById("tableBody").innerHTML = tbodyHtml;
        }

        function renderCharts(gt) {
            let labels = columnsToShow.map(c => c.label);
            let partData = gt.dynamicCols.map(c => c.part);
            let oldData = gt.dynamicCols.map(c => c.old);
            let newData = gt.dynamicCols.map(c => c.newAct);

            let ctx1 = document.getElementById('trendChart').getContext('2d');
            if(trendChartInstance) trendChartInstance.destroy();
            trendChartInstance = new Chart(ctx1, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Total Participated VLEs',
                        data: partData,
                        borderColor: '#ea580c',
                        backgroundColor: 'rgba(234, 88, 12, 0.1)',
                        borderWidth: 3,
                        pointBackgroundColor: '#ea580c',
                        pointRadius: 5,
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true } }, plugins: { legend: { display: false } } }
            });

            let ctx2 = document.getElementById('breakdownChart').getContext('2d');
            if(breakdownChartInstance) breakdownChartInstance.destroy();
            breakdownChartInstance = new Chart(ctx2, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Old VLEs (Act. Old)', data: oldData, backgroundColor: '#64748b' },
                        { label: 'New VLEs (Act. New)', data: newData, backgroundColor: '#10b981' }
                    ]
                },
                options: { 
                    responsive: true, maintainAspectRatio: false, 
                    scales: { x: { stacked: true }, y: { stacked: true, beginAtZero: true } },
                    plugins: { legend: { position: 'top', labels: {font: {family: 'Segoe UI', weight: 'bold'}} } }
                }
            });
        }

        function filterByDistrict(distName) {
            let distDropdown = document.getElementById("districtName");
            if (distDropdown.value === distName) { distDropdown.value = "All"; } 
            else { distDropdown.value = distName; }
            renderTable();
        }

        function resetFilters() {
            document.getElementById("districtType").value = "old";
            updateDistrictsDropdown();
        }

        function toggleFullScreen() {
            try {
                let btn = document.getElementById("fullscreenBtn");
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen();
                    btn.innerHTML = "✖ Exit Full Screen";
                    btn.style.backgroundColor = "#ea580c"; btn.style.color = "white"; btn.style.borderColor = "#ea580c";
                } else {
                    if (document.exitFullscreen) {
                        document.exitFullscreen();
                        btn.innerHTML = "⛶ Full Screen";
                        btn.style.backgroundColor = "#f1f5f9"; btn.style.color = "#475569"; btn.style.borderColor = "#cbd5e1";
                    }
                }
            } catch (e) { console.log("Fullscreen not supported"); }
        }

        function downloadReportImage() {
            let reportElement = document.getElementById('printableReport');
            let btn = document.getElementById("downloadBtn");
            let originalText = btn.innerHTML;
            
            btn.innerHTML = "⏳ Processing...";
            btn.style.opacity = "0.7";
            
            reportElement.classList.add('capture-mode');

            setTimeout(() => {
                html2canvas(reportElement, { 
                    scale: 2, 
                    backgroundColor: "#ffffff",
                    windowWidth: reportElement.scrollWidth + 50,
                    windowHeight: reportElement.scrollHeight + 50
                }).then(canvas => {
                    let link = document.createElement('a'); 
                    let typeText = document.getElementById("districtType").value;
                    link.download = `IRCTC_Monthly_Activations_${typeText}.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();

                    reportElement.classList.remove('capture-mode');
                    btn.innerHTML = originalText;
                    btn.style.opacity = "1";
                });
            }, 500);
        }
    </script>
</body>
</html>
