<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8fafc; font-family: 'Segoe UI', Tahoma, sans-serif; padding: 20px; }
    .tracker-box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); max-width: 600px; margin: 0 auto; border-top: 5px solid #6d28d9; }
    .form-control { border-radius: 6px; padding: 12px; font-weight: bold; border: 1px solid #cbd5e1; }
    .btn-track { background-color: #6d28d9; color: white; font-weight: bold; padding: 10px; border-radius: 6px; border: none; width: 100%; font-size: 16px; }
    .btn-track:hover { background-color: #5b21b6; color: white; }
    
    .status-card { border: 1px solid #e2e8f0; border-radius: 8px; padding: 15px; margin-top: 15px; background: #fff; text-align: left; }
    .date-text { font-size: 12px; color: #64748b; font-weight: bold; }
    .qty-text { font-size: 18px; font-weight: 900; color: #1e293b; }
    .remarks-text { font-size: 12px; color: #475569; margin-top: 8px; background: #f1f5f9; padding: 8px; border-radius: 4px; }
    
    /* Status Colors */
    .badge-Pending { background-color: #fef08a; color: #854d0e; }
    .badge-SPOC { background-color: #bae6fd; color: #0369a1; }
    .badge-Approved { background-color: #fed7aa; color: #c2410c; }
    .badge-Dispatched { background-color: #bbf7d0; color: #15803d; }
  </style>
</head>
<body>

  <div class="container text-center">
    <div class="tracker-box">
      <h4 class="fw-bold mb-1" style="color: #6d28d9;">📦 Track Your Request</h4>
      <p class="text-muted" style="font-size: 14px;">Enter your CSC ID to check stationary status</p>
      
      <form onsubmit="trackStatus(event)">
        <div class="mb-3 mt-4 text-start">
          <label class="form-label fw-bold text-secondary">CSC ID / VLE ID</label>
          <input type="text" id="cscIdInput" class="form-control text-uppercase" placeholder="Enter your 12-digit CSC ID" required>
        </div>
        <button type="submit" id="btnTrack" class="btn-track">🔍 Check Status</button>
      </form>

      <div id="resultArea" class="mt-4">
        <!-- Results will appear here -->
      </div>
    </div>
  </div>

  <script>
    // 🌟🌟🌟 కింద మీ గూగుల్ వెబ్ యాప్ లింక్ కచ్చితంగా పేస్ట్ చేయండి 🌟🌟🌟
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby4S9U-tUh14QeZDI17UsOIOoEi5DMgORTWYllh1knGoeZQS_IJoavZWZ6RDWsD5uls/exec";

    function trackStatus(e) {
       e.preventDefault();
       let cscId = document.getElementById("cscIdInput").value.trim().toUpperCase();
       let btn = document.getElementById("btnTrack");
       let resultArea = document.getElementById("resultArea");

       btn.disabled = true;
       btn.innerText = "⏳ Fetching Details...";
       resultArea.innerHTML = "";

       fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "checkVleStatus", vleId: cscId }) })
       .then(res => res.json()).then(res => {
          btn.disabled = false;
          btn.innerText = "🔍 Check Status";

          if(res.success && res.data.length > 0) {
             let html = `<h6 class="fw-bold text-success mb-3 text-start">Recent Requests found for ${cscId}:</h6>`;
             
             res.data.forEach(req => {
                // బ్యాడ్జ్ కలర్ లాజిక్
                let statusClass = "bg-secondary";
                let statusText = req.status;

                if(statusText.includes("Pending with SPOC")) statusClass = "badge-SPOC";
                else if(statusText === "Pending") statusClass = "badge-Pending";
                else if(statusText === "Approved by SPOC") statusClass = "badge-Approved";
                else if(statusText === "Dispatched") statusClass = "badge-Dispatched";

                html += `
                  <div class="status-card shadow-sm">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                      <span class="date-text">📅 ${req.date}</span>
                      <span class="badge ${statusClass} px-2 py-1 border" style="font-size:12px;">${statusText}</span>
                    </div>
                    <div><span class="text-secondary fw-bold" style="font-size:13px;">Requested/Approved:</span> <span class="qty-text">${req.qty} Papers</span></div>
                    <div class="remarks-text">📝 <b>Updates:</b> ${req.remarks}</div>
                  </div>
                `;
             });
             resultArea.innerHTML = html;
          } else {
             resultArea.innerHTML = `<div class="alert alert-danger fw-bold py-2 mt-3">❌ No stock requests found for this CSC ID.</div>`;
          }
       }).catch(e => {
          btn.disabled = false; btn.innerText = "🔍 Check Status";
          resultArea.innerHTML = `<div class="alert alert-danger fw-bold py-2 mt-3">⚠️ Network Error. Try again.</div>`;
       });
    }
  </script>
</body>
</html>
