<!DOCTYPE html>
<html lang="en">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detailed VLE Dispatch Tracking Report</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- 🌟 ఎక్సెల్ ఫైల్ డౌన్‌లోడ్ కోసం SheetJS లైబ్రరీ 🌟 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <style>
    /* 🌟 Master Clean Background 🌟 */
    body { 
        background: #f1f5f9; 
        font-family: 'Inter', 'Segoe UI', Tahoma, sans-serif; 
        padding: 20px 15px; 
        min-height: 100vh;
        color: #334155;
    }

    /* 🌟 Premium Card Container 🌟 */
    .premium-card {
        background: #ffffff;
        border: none;
        border-radius: 16px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        overflow: hidden;
        border-top: 5px solid #6366f1; 
    }
    
    .card-header-custom {
        background: #ffffff;
        padding: 15px 20px;
        border-bottom: 1px solid #e2e8f0;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 10px;
    }
    
    .card-title {
        color: #0f172a;
        font-weight: 900;
        font-size: 18px;
        margin: 0;
    }

    /* 🌟 COMPACT Single-Line Table Design (No Scrolling) 🌟 */
    .table-container { padding: 0; width: 100%; }
    
    /* white-space: nowrap వల్ల సింగిల్ లైన్ లో వస్తుంది */
    .table { margin-bottom: 0; white-space: nowrap; width: 100%; table-layout: auto; }
    
    .table thead th { 
        background: #1e293b !important; 
        color: #ffffff !important; 
        font-size: 11px; 
        font-weight: 800;
        text-transform: uppercase; 
        letter-spacing: 0.5px;
        padding: 12px 10px;
        border: none;
    }
    
    .table tbody tr td { 
        padding: 10px 10px;
        border-bottom: 1px solid #e2e8f0;
        vertical-align: middle;
        font-size: 12.5px; 
    }

    /* 🌟 Zebra Striping 🌟 */
    .table-striped tbody tr:nth-of-type(odd) { background-color: #ffffff; }
    .table-striped tbody tr:nth-of-type(even) { background-color: #f8fafc; }
    
    .table-hover tbody tr:hover td { 
        background-color: #e0e7ff !important; 
        cursor: pointer;
    }

    /* 🌟 Buttons & Search Box 🌟 */
    .btn-action { 
        font-weight: 800; 
        border: none; 
        border-radius: 8px;
        padding: 6px 14px;
        font-size: 12px;
        transition: all 0.3s ease;
        display: inline-flex;
        align-items: center;
        gap: 6px;
    }
    
    .btn-outline-custom { color: #6366f1; background: #eff6ff; border: 1px solid #c7d2fe; }
    .btn-outline-custom:hover { background: #e0e7ff; color: #4f46e5; }
    
    .btn-outline-success-custom { color: #10b981; background: #ecfdf5; border: 1px solid #a7f3d0; }
    .btn-outline-success-custom:hover { background: #d1fae5; color: #047857; }

    .search-box { 
        width: 260px; 
        border: 2px solid #cbd5e1; 
        border-radius: 8px; 
        padding: 6px 14px; 
        outline: none; 
        font-size: 13px; 
        font-weight: 600;
        color: #1e293b;
        background: #f8fafc;
        transition: 0.3s;
    }
    .search-box:focus { border-color: #6366f1; background: #ffffff; box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15); }

    /* 🌟 Badges 🌟 */
    .badge-custom { background: #f3e8ff; color: #7c3aed; font-weight: 800; padding: 4px 10px; border-radius: 6px; font-size: 10px; text-transform: uppercase; border: 1px solid #d8b4fe; }
    .badge-qty { background-color: #ecfdf5; color: #047857; font-size: 12px; font-weight: 800; padding: 4px 10px; border-radius: 6px; border: 1px solid #a7f3d0; }

    /* 🌟 Copy Toast 🌟 */
    #copyToast {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: #1e293b; color: #22c55e; padding: 10px 20px; border-radius: 50px;
      font-weight: 800; font-size: 13px; display: none; z-index: 9999;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2); opacity: 0; transition: all 0.3s;
    }
    
    .copyable-text { cursor: pointer; display: inline-block; transition: all 0.2s; padding: 2px 4px; border-radius: 4px; }
    .copyable-text:hover { background-color: #cbd5e1; color: #0f172a !important; }
    
    /* Scrollbar */
    .table-responsive::-webkit-scrollbar { width: 6px; height: 8px; }
    .table-responsive::-webkit-scrollbar-track { background: #f1f5f9; }
    .table-responsive::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 10px; }
    .table-responsive::-webkit-scrollbar-thumb:hover { background: #64748b; }


/* 📱 MOBILE RESPONSIVE STYLES (మొబైల్ కోసం ప్రత్యేకమైన సెట్టింగ్స్) 📱 */
    @media (max-width: 768px) {
        body { padding: 10px 5px; }
        .page-header { flex-direction: column; align-items: flex-start !important; gap: 15px; }
        .mobile-actions { width: 100%; display: flex; flex-direction: column; gap: 10px; }
        .search-box { width: 100%; }
        .btn-action-group { display: flex; gap: 10px; width: 100%; }
        .btn-action-group .btn-action { flex: 1; justify-content: center; }
        .card-header-custom { flex-direction: column; align-items: flex-start; }
        .table-responsive { max-height: calc(100vh - 220px) !important; }
    }


  </style>
</head>
<body>

  <div id="copyToast">✅ Copied to Clipboard!</div>

 <div class="container-fluid px-2 px-md-3">
    
    <!-- 📱 Mobile Friendly Header 📱 -->
    <div class="d-flex justify-content-between align-items-center mb-3 px-1 page-header">
      <h5 class="fw-bold m-0" style="color: #0f172a;">🚚 VLE Dispatch Tracking</h5>
      
      <div class="mobile-actions d-flex gap-2 align-items-center">
        <input type="text" id="searchInput" class="search-box" placeholder="🔍 Search VLE, ID, Req No..." onkeyup="searchTable()">
        <div class="btn-action-group">
            <button class="btn-action btn-outline-success-custom" onclick="exportToExcel()">📥 Excel</button>
            <button class="btn-action btn-outline-custom" onclick="refreshDispatchReport()">🔄 Refresh</button>
        </div>
      </div>
    </div>

    <div class="premium-card">
      <div class="card-header-custom">
        <div class="card-title">
           <span style="font-size: 16px;">📜 Dispatched Stationary History</span>
           <span style="font-size: 11px; color: #64748b; font-weight: 600; margin-left: 10px; background: #f1f5f9; padding: 4px 8px; border-radius: 6px;">Double-click text to copy</span>
        </div>
        <span class="badge-custom" id="lblScope">-</span>
      </div>
      
      <div class="table-container">
        <div class="table-responsive" style="max-height: calc(100vh - 160px); overflow-y: auto;">
          <table class="table table-hover table-striped align-middle text-center mb-0" id="dispatchTable">
            <thead class="sticky-top">
              <tr>
                <th class="text-start ps-3">Date</th>
                <!-- 🌟 మ్యాజిక్ ఇక్కడే! max-width ఇవ్వడం వల్ల స్క్రీన్ పెరగదు 🌟 -->
                <th class="text-start" style="width: 300px; max-width: 300px;">VLE Name & CSC ID</th>
                <th>District</th>
                <th>Stock Request No</th>
                <th>Serial No. Range</th>
                <th>Dispatched Qty</th>
                <th class="pe-3">Dispatched By</th>
              </tr>
            </thead>
            <tbody id="reportBody">
              <tr><td colspan="7" class="text-muted py-5 fw-bold" style="color: #6366f1 !important;">Loading dispatch history...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby4S9U-tUh14QeZDI17UsOIOoEi5DMgORTWYllh1knGoeZQS_IJoavZWZ6RDWsD5uls/exec";
    
    let loggedInDesig = localStorage.getItem("userDesignation") || "DM"; 
    let loggedInUserId = localStorage.getItem("userId") || ""; 
    let loggedInDistrict = localStorage.getItem("userDistrict") || "";

    let isDM = loggedInDesig.toUpperCase() === "DM" || loggedInDesig.toUpperCase().indexOf("DISTRICT MANAGER") !== -1;
    document.getElementById("lblScope").innerText = isDM ? "District: " + loggedInDistrict.toUpperCase() : "Full State Report";

    window.onload = function() { checkCacheAndLoadDispatch(); };

    function checkCacheAndLoadDispatch() {
       let cachedData = localStorage.getItem("vleDispatchCache");
       let cacheTime = localStorage.getItem("vleDispatchTime");
       let now = new Date().getTime();

       if (cachedData && cacheTime && (now - cacheTime < 120000)) { 
          renderDispatchTable(JSON.parse(cachedData));
       } else {
          fetchDispatchReport();
       }
    }

    function refreshDispatchReport() {
       localStorage.removeItem("vleDispatchCache");
       document.getElementById("reportBody").innerHTML = `<tr><td colspan="7" class="py-5 fw-bold" style="color:#6366f1;">🔄 Refreshing live data...</td></tr>`;
       fetchDispatchReport();
       document.getElementById("searchInput").value = "";
    }

    function fetchDispatchReport() {
       fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "getVleDispatchReport", role: loggedInDesig, userId: loggedInUserId }) })
       .then(res => res.json()).then(res => {
          if(res.success && res.data) {
             localStorage.setItem("vleDispatchCache", JSON.stringify(res.data));
             localStorage.setItem("vleDispatchTime", new Date().getTime().toString());
             renderDispatchTable(res.data);
          } else { 
             renderDispatchTable([]); 
          }
       }).catch(e => { document.getElementById("reportBody").innerHTML = `<tr><td colspan="7" class="text-danger py-5 fw-bold">❌ Network Error. Please refresh.</td></tr>`; });
    }

    function renderDispatchTable(data) {
       const tbody = document.getElementById("reportBody"); 
       tbody.innerHTML = "";
       
       if(data && data.length > 0) {
          data.forEach(item => {
             // 🌟 Truncate Logic: పెద్ద పేర్లు ఉంటే '...' వస్తుంది కానీ కాలమ్ సాగదు, CSC ID మాత్రం కుడివైపు సేఫ్ గా ఉంటుంది 🌟
             tbody.innerHTML += `
               <tr class="data-row">
                 <td class="text-start ps-3" style="color:#64748b; font-weight:600; font-size: 11px;">
                    <span class="copyable-text" title="Double-click to copy Date" ondblclick="copyCellText('${item.date}')">${item.date}</span>
                 </td>
                 
                 <td class="search-target" style="max-width: 300px;">
                    <div class="d-flex justify-content-between align-items-center w-100">
                      <span class="copyable-text fw-bold text-dark text-start text-truncate flex-grow-1" style="min-width: 0;" title="${item.vleName} (Double-click to copy)" ondblclick="copyCellText('${item.vleName}')">${item.vleName}</span>
                      <span class="copyable-text badge bg-light text-primary border border-primary text-end flex-shrink-0 ms-2" style="font-size:11px;" title="Double-click to copy CSC ID" ondblclick="copyCellText('${item.cscId}')">${item.cscId}</span>
                    </div>
                 </td>
                 
                 <td class="search-target">
                    <span class="copyable-text fw-bold text-secondary" title="Double-click to copy District" ondblclick="copyCellText('${item.district}')">${item.district}</span>
                 </td>
                 
                 <td class="search-target fw-bold text-danger">
                    <span class="copyable-text" title="Double-click to copy Request No" ondblclick="copyCellText('${item.reqNo}')">${item.reqNo}</span>
                 </td>
                 
                 <td class="search-target">
                    <span class="copyable-text fw-bold" style="color: #6366f1;" title="Double-click to copy Start Serial" ondblclick="copyCellText('${item.startSerial}')">${item.startSerial}</span> 
                    <span class="text-muted fw-bold mx-1" style="font-size: 10px;">TO</span> 
                    <span class="copyable-text fw-bold text-danger" title="Double-click to copy End Serial" ondblclick="copyCellText('${item.endSerial}')">${item.endSerial}</span>
                 </td>
                 
                 <td>
                    <span class="badge-qty copyable-text" title="Double-click to copy Quantity" ondblclick="copyCellText('${item.qty}')">${item.qty} Papers</span>
                 </td>
                 
                 <td class="pe-3 fw-bold text-secondary search-target">
                    <span class="copyable-text" title="Double-click to copy Dispatched By" ondblclick="copyCellText('${item.assignedBy}')">${item.assignedBy}</span>
                 </td>
               </tr>`;
          });
       } else { 
          tbody.innerHTML = `<tr><td colspan="7" class="text-success py-5 fw-bold fs-6">🎉 No dispatch records found.</td></tr>`; 
       }
    }

    function searchTable() {
       let input = document.getElementById("searchInput").value.toUpperCase();
       let rows = document.querySelectorAll(".data-row");
       
       rows.forEach(row => {
          let match = false;
          let targets = row.querySelectorAll(".search-target");
          
          targets.forEach(cell => {
             if (cell && cell.innerText.toUpperCase().indexOf(input) > -1) {
                match = true;
             }
          });
          
          row.style.display = match ? "" : "none";
       });
    }

    function exportToExcel() {
       let table = document.getElementById("dispatchTable");
       let wb = XLSX.utils.table_to_book(table, {sheet: "Dispatch Report"});
       let today = new Date();
       let dateStr = ("0" + today.getDate()).slice(-2) + "-" + ("0" + (today.getMonth() + 1)).slice(-2) + "-" + today.getFullYear();
       let fileName = "Dispatch_Report_" + dateStr + ".xlsx";
       XLSX.writeFile(wb, fileName);
    }

    function copyCellText(textToCopy) {
       if(!textToCopy || textToCopy === "undefined") return;
       
       if (window.getSelection) { window.getSelection().removeAllRanges(); }
       
       navigator.clipboard.writeText(textToCopy).then(() => {
          let toast = document.getElementById("copyToast");
          toast.style.display = "block";
          
          setTimeout(() => {
             toast.style.opacity = "1";
             toast.style.transform = "translateX(-50%) translateY(0)";
          }, 10);
          
          setTimeout(() => {
             toast.style.opacity = "0";
             toast.style.transform = "translateX(-50%) translateY(20px)";
             setTimeout(() => {
                toast.style.display = "none";
             }, 300); 
          }, 2000); 
       }).catch(err => {
          console.error("Could not copy text: ", err);
       });
    }
  </script>
</body>
</html>
