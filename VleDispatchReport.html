<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8fafc; font-family: 'Segoe UI', Tahoma, sans-serif; padding: 20px; }
    .table-container { background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); overflow: hidden; border: 1px solid #e2e8f0; }
    .table-header { background: linear-gradient(135deg, #10b981, #059669); color: white; padding: 15px 20px; font-weight: bold; font-size: 15px; display: flex; justify-content: space-between; align-items: center; }
    .badge-qty { background-color: #ecfdf5; color: #047857; font-size: 14px; padding: 6px 12px; border-radius: 20px; border: 1px solid #a7f3d0; }
  </style>
</head>
<body>

  <div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h5 class="fw-bold text-success mb-0">🚚 Detailed VLE Dispatch Tracking Report</h5>
      <button class="btn btn-sm btn-outline-success" onclick="refreshDispatchReport()">🔄 Refresh Data</button>
    </div>

    <div class="table-container">
      <div class="table-header">
        <span>📜 Dispatched Stationary History</span>
        <span class="badge bg-light text-dark" id="lblScope">-</span>
      </div>
      <div class="table-responsive">
        <table class="table table-hover align-middle text-center mb-0">
          <thead class="table-light">
            <tr>
              <th>Date</th>
              <th class="text-start ps-3">VLE Details</th>
              <th>District</th>
              <th>Serial No. Range</th>
              <th>Dispatched Qty</th>
              <th>Dispatched By</th>
            </tr>
          </thead>
          <tbody id="reportBody">
            <tr><td colspan="6" class="text-muted py-4">Loading dispatch history...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyAevLoiZZG_ZO2gG0aeHsqpRmlK5l0c__tE6jZe6iFRgTyG-Jn20s5XRze8pa0fSrZ/exec";
    
    let loggedInDesig = localStorage.getItem("userDesignation") || "DM"; 
    let loggedInUserId = localStorage.getItem("userId") || ""; 
    let loggedInDistrict = localStorage.getItem("userDistrict") || "";

    let isDM = loggedInDesig.toUpperCase() === "DM" || loggedInDesig.toUpperCase().indexOf("DISTRICT MANAGER") !== -1;
    document.getElementById("lblScope").innerText = isDM ? "District: " + loggedInDistrict.toUpperCase() : "Full State Report";

    window.onload = function() { 
       checkCacheAndLoadDispatch(); 
    };

    // ⚡ స్మార్ట్ క్యాష్ లాజిక్ (ఒక్కసారి లోడ్ అయితే చాలు, మళ్ళీ మళ్ళీ లోడింగ్ అడగదు) ⚡
    function checkCacheAndLoadDispatch() {
       let cachedData = localStorage.getItem("vleDispatchCache");
       let cacheTime = localStorage.getItem("vleDispatchTime");
       let now = new Date().getTime();

       // 2 నిమిషాల వరకు బ్రౌజర్ మెమరీ లో ఉంచుకుంటుంది, రిపోర్ట్ వెంటనే ఓపెన్ అవుతుంది
       if (cachedData && cacheTime && (now - cacheTime < 120000)) { 
          renderDispatchTable(JSON.parse(cachedData));
       } else {
          fetchDispatchReport();
       }
    }

    // డేటా కొత్తది కావాలంటే (రిఫ్రెష్ బటన్ నొక్కినప్పుడు)
    function refreshDispatchReport() {
       localStorage.removeItem("vleDispatchCache");
       document.getElementById("reportBody").innerHTML = `<tr><td colspan="6" class="text-muted py-4">Refreshing live data...</td></tr>`;
       fetchDispatchReport();
    }

    function fetchDispatchReport() {
       fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "getVleDispatchReport", role: loggedInDesig, userId: loggedInUserId }) })
       .then(res => res.json()).then(res => {
          if(res.success && res.data) {
             // డేటాని బ్రౌజర్ క్యాష్ లో సేవ్ చేస్తున్నాం
             localStorage.setItem("vleDispatchCache", JSON.stringify(res.data));
             localStorage.setItem("vleDispatchTime", new Date().getTime().toString());
             renderDispatchTable(res.data);
          } else { 
             renderDispatchTable([]); 
          }
       }).catch(e => { document.getElementById("reportBody").innerHTML = `<tr><td colspan="6" class="text-danger py-4">Network Error. Please refresh.</td></tr>`; });
    }

    function renderDispatchTable(data) {
       const tbody = document.getElementById("reportBody"); 
       tbody.innerHTML = "";
       
       if(data && data.length > 0) {
          data.forEach(item => {
             tbody.innerHTML += `
               <tr>
                 <td style="font-size:12px; color:#64748b;">${item.date}</td>
                 <td class="text-start ps-3 fw-bold">${item.vleName} <br><span class="text-primary" style="font-size:11px;">${item.cscId}</span></td>
                 <td><span class="badge bg-secondary">${item.district}</span></td>
                 <td><code class="text-dark bg-light px-2 border rounded">${item.startSerial} to ${item.endSerial}</code></td>
                 <td><span class="badge-qty">${item.qty} Papers</span></td>
                 <td style="font-size:12px;" class="fw-bold text-muted">${item.assignedBy}</td>
               </tr>`;
          });
       } else { 
          tbody.innerHTML = `<tr><td colspan="6" class="text-danger py-4 fw-bold">No dispatch records found.</td></tr>`; 
       }
    }
  </script>
</body>
</html>
